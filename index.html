<html lang="de">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>ERP Hero – FLP Lift Parts</title>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50:  '#EAF7FC',
            100: '#CFEEF7',
            200: '#9DDDEF',
            300: '#6CCBE7',
            400: '#3BBADF',
            500: '#1FA8D6',   // Sidebar
            600: '#1B8FB7',
            700: '#157699',   // Active item
            800: '#105D7A',
            900: '#0B445B'
          },
          ink: {
            900: '#0F172A',
            800: '#1E293B',
            700: '#334155',
            500: '#64748B',
            300: '#CBD5E1',
            200: '#E2E8F0',
            100: '#F1F5F9',
            50:  '#F8FAFC'
          }
        },
        boxShadow: {
          card: '0 1px 2px 0 rgb(0 0 0 / 0.04), 0 1px 3px 0 rgb(0 0 0 / 0.06)'
        }
      }
    }
  }
</script>
<style>
  html, body { height: 100%; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(15,23,42,.18); border-radius: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  /* Animated check */
  @keyframes pop { 0%{transform:scale(.6);opacity:0} 70%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .25s ease-out both; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slideUp .25s ease-out both; }
  /* iOS safe-area */
  .pt-safe { padding-top: env(safe-area-inset-top); }
  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body class="bg-brand-500 text-ink-900">

<!-- ========================================================== -->
<!-- LOGIN SCREEN                                                -->
<!-- ========================================================== -->
<div id="loginScreen" class="hidden fixed inset-0 z-40 bg-brand-500 flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center mb-8 select-none">
      <div class="bg-white px-4 py-3 rounded-lg shadow-card">
        <svg class="h-12 block" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-white text-3xl font-bold text-center mb-1">Login</h1>
    <p class="text-brand-50/90 text-center mb-8">Willkommen bei der FLP Lift Parts Repair.</p>

    <!-- Form -->
    <form id="loginForm" class="space-y-4" autocomplete="on">
      <div>
        <label for="loginKey" class="block text-sm font-medium text-white mb-1.5">Persönlicher Key</label>
        <input
          id="loginKey"
          name="loginKey"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••••••"
          class="w-full h-12 rounded-lg bg-white text-ink-900 placeholder-ink-300 px-4 outline-none ring-0 focus:ring-2 focus:ring-white/60 transition"
        />
        <p id="loginHint" class="text-xs text-brand-50/80 mt-1.5">Den Key bekommst du vom Admin.</p>
      </div>

      <button id="loginBtn" type="submit"
        class="w-full h-12 rounded-lg bg-ink-900 hover:bg-ink-800 active:bg-black text-white font-semibold transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
        <span id="loginBtnLabel">Login</span>
        <svg id="loginSpin" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="loginError" class="hidden rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm px-4 py-3"></div>
    </form>

    <p class="text-center text-brand-50/70 text-xs mt-8">
      ERP Hero <span id="loginVersionLabel"></span> · FLP Lift Parts GmbH
    </p>
  </div>
</div>

<!-- ========================================================== -->
<!-- BOOT SPLASH (gezeigt während tryAutoLogin)                 -->
<!-- ========================================================== -->
<div id="bootScreen" class="fixed inset-0 z-50 bg-brand-500 flex items-center justify-center">
  <div class="flex flex-col items-center gap-6">
    <div class="flex items-center gap-1">
      <div class="w-10 h-10 rounded-md bg-ink-800 text-white grid place-items-center font-bold text-xl">F</div>
      <div class="w-10 h-10 rounded-md bg-white text-ink-800 grid place-items-center font-bold text-xl">L</div>
      <div class="w-10 h-10 rounded-md bg-white text-ink-800 grid place-items-center font-bold text-xl">P</div>
    </div>
    <svg class="w-7 h-7 text-white animate-spin" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
      <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- ========================================================== -->
<!-- APP SHELL (Sidebar + Topbar + Content)                      -->
<!-- ========================================================== -->
<div id="appShell" class="hidden min-h-screen bg-brand-500">
  <!-- Mobile-Drawer-Overlay -->
  <div id="drawerBackdrop" class="hidden lg:hidden fixed inset-0 z-30 bg-ink-900/40 backdrop-blur-sm" onclick="closeDrawer()"></div>

  <div class="flex min-h-screen">
    <!-- ============================== SIDEBAR ============================== -->
    <aside id="sidebar"
      class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-brand-500 text-white flex flex-col
             -translate-x-full lg:translate-x-0 transition-transform duration-300 pt-safe pb-safe">

      <!-- Logo -->
      <div class="px-5 pt-5 pb-3 flex items-center justify-between">
        <div class="flex items-center gap-1 select-none">
          <div class="bg-white px-2 py-1.5 rounded">
            <svg class="h-6 block" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
          </div>
        </div>
        <!-- Close (mobile) -->
        <button onclick="closeDrawer()" class="lg:hidden p-2 -mr-2 text-white/90 hover:text-white">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Mandanten-Switcher -->
      <div id="mandantWrap" class="px-4 pb-4 relative">
        <button id="mandantBtn" type="button" onclick="toggleMandantenMenu()"
          class="w-full h-10 rounded-lg bg-brand-600/40 hover:bg-brand-600/60 text-white text-sm flex items-center justify-between px-3 transition">
          <span id="mandantLabel" class="truncate">–</span>
          <i data-lucide="chevron-down" class="w-4 h-4 shrink-0"></i>
        </button>
        <div id="mandantMenu" class="hidden absolute left-4 right-4 top-11 bg-white rounded-lg shadow-card overflow-hidden z-50 max-h-64 overflow-y-auto">
          <!-- per JS gefüllt -->
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto px-3 scrollbar-thin">
        <!-- Stammdaten -->
        <div class="mb-1">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="stammdaten">
            <span class="text-sm font-semibold tracking-wide">Stammdaten</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5">
            <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-route="kunden">
              <i data-lucide="user-round" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Kunden</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed" data-route="lieferanten">
              <i data-lucide="truck" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Lieferanten</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.1</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed" data-route="artikel">
              <i data-lucide="package" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Artikel</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.1</span>
            </button>
          </div>
        </div>

        <!-- Verkauf -->
        <div class="mb-1">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="verkauf">
            <span class="text-sm font-semibold tracking-wide">Verkauf</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5 hidden">
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="file-text" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Angebote</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.2</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="file-check-2" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Aufträge</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.3</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="send" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Lieferscheine</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.3</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="euro" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Rechnungen</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.3</span>
            </button>
          </div>
        </div>

        <!-- Einkauf -->
        <div class="mb-1">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="einkauf">
            <span class="text-sm font-semibold tracking-wide">Einkauf</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5 hidden">
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="mail-search" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Preisanfragen</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.4</span>
            </button>
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="folder" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Bestellungen</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.4</span>
            </button>
          </div>
        </div>

        <!-- Statistiken -->
        <div class="mb-1">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="statistiken">
            <span class="text-sm font-semibold tracking-wide">Statistiken</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5 hidden">
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="bar-chart-3" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Auswertungen</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.5</span>
            </button>
          </div>
        </div>

        <!-- Administration (nur für Admins) -->
        <div id="navAdmin" class="mb-1 hidden mt-4 pt-4 border-t border-white/15">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="administration">
            <span class="text-sm font-semibold tracking-wide flex items-center gap-2"><i data-lucide="shield" class="w-3.5 h-3.5"></i> Administration</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>

const _TKP2 = '69fae5d9fa4b94c266b426dadd71a51f574945d840b33569058ab5e9d89ebef3';
const APP_CONFIG = {
  AIRTABLE_READ_KEY: _TKP1 + '.' + _TKP2,

/* ============================================================
   AIRTABLE: AUTH
   ============================================================ */
async function loginWithUserKey(userKey) {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };

  // 1. User in App-Base/User suchen
  const formula = "AND({api_key}='" + userKey.replace(/'/g, "\\'") + "',{status}='aktiv')";
  const userRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/User?filterByFormula=' + encodeURIComponent(formula),
    { headers }
  );
  if (!userRes.ok) throw new Error('Verbindung zu Airtable fehlgeschlagen');
  const userData = await userRes.json();
  if (!userData.records || !userData.records.length) throw new Error('Ungültiger Key oder Account inaktiv');
  APP_KEYS.user = { ...userData.records[0].fields, _id: userData.records[0].id };

  // 2. Projekt-Keys laden
  const projectKeysRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + '/Keys?filterByFormula=' + encodeURIComponent("{project_id}='" + APP_CONFIG.PROJECT_ID + "'"),
    { headers }
  );
  if (projectKeysRes.ok) {
    const projectKeysData = await projectKeysRes.json();
    (projectKeysData.records || []).forEach(rec => {
      const f = rec.fields || {};
      if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      if (f.key_name === 'airtableWriteKey') APP_KEYS.airtableWriteKey = f.key_value;
      if (f.key_name === 'airtableBaseId') APP_KEYS.appBaseId = f.key_value;
    });
  }

  // 3. Globale Fallback-Keys (anthropicKey)
  if (!APP_KEYS.anthropicKey) {
    const globalKeysRes = await fetch(
      'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + "/Keys?filterByFormula=" + encodeURIComponent("{project_id}='GLOBAL'"),
      { headers }
    );
    if (globalKeysRes.ok) {
      const globalKeysData = await globalKeysRes.json();
      (globalKeysData.records || []).forEach(rec => {
        const f = rec.fields || {};
        if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      });
    }
  }

  // 4. Firmen laden (gefiltert auf user.allowed_companies, Admin sieht alle)
  await loadCompanies();

  // 5. Key persistieren
  localStorage.setItem('user_key_' + APP_CONFIG.PROJECT_ID, userKey);
  return APP_KEYS.user;
}

/* ============================================================
   COMPANY (MANDANT) STATE
   ============================================================ */
async function loadCompanies() {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + "/Company?filterByFormula=" + encodeURIComponent("{status}='aktiv'");
  const res = await fetch(url, { headers });
  if (!res.ok) { APP_KEYS.companies = []; APP_KEYS.currentCompanyId = null; return; }
  const data = await res.json();
  const all = (data.records || []).map(r => ({ id: r.id, name: r.fields.name || '–' }))
    .sort((a, b) => a.name.localeCompare(b.name, 'de'));

  if (APP_KEYS.user?.is_admin) {
    APP_KEYS.companies = all;
  } else {
    const allowed = new Set(APP_KEYS.user?.allowed_companies || []);
    APP_KEYS.companies = all.filter(c => allowed.has(c.id));
  }

  const savedKey = 'current_company_' + APP_CONFIG.PROJECT_ID;
  const saved = localStorage.getItem(savedKey);
  if (saved && APP_KEYS.companies.find(c => c.id === saved)) {
    APP_KEYS.currentCompanyId = saved;
  } else {
    APP_KEYS.currentCompanyId = APP_KEYS.companies[0]?.id || null;
    if (APP_KEYS.currentCompanyId) localStorage.setItem(savedKey, APP_KEYS.currentCompanyId);
    else localStorage.removeItem(savedKey);
  }
}

function getCurrentCompany() {
  return APP_KEYS.companies.find(c => c.id === APP_KEYS.currentCompanyId) || null;
}

function setCurrentCompany(companyId) {
  if (!APP_KEYS.companies.find(c => c.id === companyId)) return;
  APP_KEYS.currentCompanyId = companyId;
  localStorage.setItem('current_company_' + APP_CONFIG.PROJECT_ID, companyId);
  document.getElementById('mandantMenu')?.classList.add('hidden');
  renderMandantenSwitcher();
  toast('Mandant gewechselt: ' + getCurrentCompany().name, 'success');
  // Datenviews neu rendern
  if (_currentRoute === 'kunden') renderCustomers();
}

function renderMandantenSwitcher() {
  const label = document.getElementById('mandantLabel');
  const menu = document.getElementById('mandantMenu');
  if (!label || !menu) return;
  const cur = getCurrentCompany();
  label.textContent = cur ? cur.name : '– keine Firma –';
  if (APP_KEYS.companies.length === 0) {
    menu.innerHTML = '<p class="px-3 py-2 text-xs text-ink-500">Keine Firmen verfügbar.</p>';
  } else {
    menu.innerHTML = APP_KEYS.companies.map(c => `
      <button type="button" onclick="setCurrentCompany('${c.id}')" class="w-full text-left px-3 py-2 text-sm hover:bg-ink-100 ${c.id === APP_KEYS.currentCompanyId ? 'bg-brand-50 font-medium text-brand-700' : 'text-ink-900'}">
        ${escapeHtml(c.name)}
      </button>
    `).join('');
  }
}

function toggleMandantenMenu() {
  document.getElementById('mandantMenu')?.classList.toggle('hidden');
}

async function tryAutoLogin() {
  const savedKey = localStorage.getItem('user_key_' + APP_CONFIG.PROJECT_ID);
  if (!savedKey) return false;
  try {
    await loginWithUserKey(savedKey);
    return true;
  } catch (e) {
    localStorage.removeItem('user_key_' + APP_CONFIG.PROJECT_ID);
    return false;
  }
}

function logout() {
  localStorage.removeItem('user_key_' + APP_CONFIG.PROJECT_ID);
  for (const k in APP_KEYS) APP_KEYS[k] = null;
  location.reload();
}

/* ============================================================
   AIRTABLE: CRUD (Helpers für nächste Phasen)
   ============================================================ */
async function readData(table, filter, opts = {}) {
  let url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const params = new URLSearchParams();
  if (filter) params.set('filterByFormula', filter);
  if (opts.sort) opts.sort.forEach((s, i) => {
    params.set(`sort[${i}][field]`, s.field);
    if (s.direction) params.set(`sort[${i}][direction]`, s.direction);
  });
  if (opts.maxRecords) params.set('maxRecords', String(opts.maxRecords));
  if (opts.pageSize) params.set('pageSize', String(opts.pageSize));
  const qs = params.toString();
  if (qs) url += '?' + qs;
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY } });
  if (!res.ok) throw new Error('Lesen fehlgeschlagen: ' + res.status);
  const data = await res.json();
  return data.records || [];
}

async function writeData(table, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Schreiben fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  return await res.json();
}

async function updateData(table, recordId, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table) + '/' + recordId;
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) throw new Error('Update fehlgeschlagen: ' + res.status);
  return await res.json();
}

async function deleteData(table, recordId) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table) + '/' + recordId;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey }
  });
  if (!res.ok) throw new Error('Löschen fehlgeschlagen: ' + res.status);
  return await res.json();
}

async function ensureTable(tableName, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const metaRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    { headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey } }
  );
  if (!metaRes.ok) throw new Error('Meta-API nicht erreichbar');
  const meta = await metaRes.json();
  const exists = (meta.tables || []).find(t => t.name === tableName);
  if (exists) return exists;
  const createRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: tableName, fields })
    }
  );
  if (!createRes.ok) {
    const err = await createRes.json().catch(() => ({}));
    throw new Error('Tabelle anlegen fehlgeschlagen: ' + (err.error?.message || createRes.status));
  }
  return await createRes.json();
}

async function uploadFileToRecord(recordId, attachmentField, file) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  if (file.size > 5 * 1024 * 1024) throw new Error('Datei zu groß (max 5 MB)');
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const url = 'https://content.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + recordId + '/' + attachmentField + '/uploadAttachment';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ contentType: file.type, file: base64, filename: file.name })
  });
  if (!res.ok) throw new Error('Upload fehlgeschlagen');
  return await res.json();
}

/* ============================================================
   ANTHROPIC AI (für spätere Phasen)
   ============================================================ */
async function askAI(prompt, opts = {}) {
  if (!APP_KEYS.anthropicKey) throw new Error('KI nicht verfügbar (Anthropic-Key fehlt)');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': APP_KEYS.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: opts.model || 'claude-sonnet-4-5-20250929',
      max_tokens: opts.maxTokens || 1024,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('AI-Anfrage fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return (data.content && data.content[0]) ? data.content[0].text : '';
}

/* ============================================================
   UI: TOAST
   ============================================================ */
function toast(msg, type = 'info', timeout = 3200) {
  const wrap = document.getElementById('toastWrap');
  const colors = {
    info:    'bg-ink-900 text-white',
    success: 'bg-emerald-600 text-white',
    error:   'bg-red-600 text-white',
    warn:    'bg-amber-500 text-white'
  };
  const icons = { info: 'info', success: 'check-circle-2', error: 'alert-circle', warn: 'triangle-alert' };
  const el = document.createElement('div');
  el.className = `pointer-events-auto ${colors[type] || colors.info} rounded-xl shadow-lg px-4 py-3 text-sm flex items-center gap-3 slide-up`;
  el.innerHTML = `<i data-lucide="${icons[type] || 'info'}" class="w-4 h-4 shrink-0"></i><span class="flex-1">${msg}</span>`;
  wrap.appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => {
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    setTimeout(() => el.remove(), 260);
  }, timeout);
}

    <div class="rounded-xl border border-ink-200 bg-white p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg ${ok ? 'bg-emerald-50 text-emerald-600' : 'bg-ink-100 text-ink-500'} grid place-items-center">
        <i data-lucide="${icon}" class="w-4 h-4"></i>
      </div>

        <p class="text-xs text-ink-500">${label}</p>
        <p class="text-sm font-semibold ${ok ? 'text-ink-900' : 'text-ink-500'} truncate">${value}</p>
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalBackdrop').classList.remove('hidden');
  if (window.lucide) lucide.createIcons();
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.add('hidden');
  document.getElementById('modalBox').innerHTML = '';
}

/* ============================================================
   ROUTING (Sidebar Nav-Items)
   ============================================================ */
let _currentRoute = 'welcome';
function dispatchRoute(route) {
  _currentRoute = route;
  closeDrawer();
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('bg-brand-700', b.dataset.route === route));
  switch (route) {
    case 'kunden':          renderCustomers(); break;
    case 'admin-companies': renderAdminCompanies(); break;
    case 'admin-users':     renderAdminUsers(); break;
    default:                renderWelcome();
  }
}
function initNavRouting() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    if (btn.classList.contains('disabled')) return;
    if (btn.dataset._wired) return;
    btn.dataset._wired = '1';
    btn.addEventListener('click', () => {
      const route = btn.dataset.route;
      if (route) dispatchRoute(route);
    });
  });
}

  const fd = new FormData(e.target);

  try {
    if (id) await updateData('Company', id, fields);
    else    await writeData('Company', fields);
    closeModal();
    await loadCompanies();
    renderMandantenSwitcher();
    renderAdminCompanies();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleCompanyArchive(id, archive) {

    await updateData('Company', id, { status: archive ? 'archiviert' : 'aktiv' });

    renderMandantenSwitcher();
    renderAdminCompanies();
    toast(archive ? 'Archiviert' : 'Aktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

function generateApiKey() {
  const a = 'abcdefghijklmnopqrstuvwxyz0123456789';
  const arr = new Uint8Array(24);
  crypto.getRandomValues(arr);
  let s = '';
  for (let i = 0; i < 24; i++) s += a[arr[i] % a.length];
  return s;
}

async function saveUser(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const fields = {
    name:      (fd.get('name') || '').trim(),
    role:      (fd.get('role') || '').trim(),
    api_key:   (fd.get('api_key') || '').trim(),
    status:    fd.get('status') || 'aktiv',
    is_admin:  fd.get('is_admin') === 'on',
    allowed_companies: fd.getAll('allowed_companies')
  };
  if (!fields.name)    return toast('Name fehlt', 'error');
  if (!fields.api_key) return toast('API-Key fehlt', 'error');
  if (!id) fields.created = new Date().toISOString().slice(0,10);
  try {
    if (id) await updateData('User', id, fields);
    else    await writeData('User', fields);
    closeModal();
    renderAdminUsers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleUserStatus(id, currentlyInactive) {
  try {
    await updateData('User', id, { status: currentlyInactive ? 'aktiv' : 'inaktiv' });
    renderAdminUsers();
    toast(currentlyInactive ? 'Aktiviert' : 'Deaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

const _customerListState = { search: '', sort: 'name', showArchived: false };
let _customerSearchTimer = null;

async function nextCustomerNo(companyId) {
  const all = await readData('Customer');
  const inCo = all.filter(c => (c.fields.company_id || []).includes(companyId));
  let max = 1000;
  inCo.forEach(c => {
    const m = (c.fields.customer_no || '').match(/^K-(\d+)$/);
    if (m) {
      const n = parseInt(m[1], 10);
      if (n > max) max = n;
    }
  });
  return 'K-' + (max + 1);
}

async function renderCustomers() {
  setPageTitle('Kunden');
  const cur = getCurrentCompany();
  if (!cur) {
    document.getElementById('pageContent').innerHTML = `
      <div class="max-w-3xl mx-auto">
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-amber-900">
          Kein Mandant ausgewählt. Bitte links eine Firma wählen.
        </div>
      </div>
    `;
    return;
  }
  document.getElementById('pageContent').innerHTML = '<p class="text-ink-500 text-sm">Lade Kunden…</p>';

  let all = [];
  try { all = await readData('Customer'); } catch (e) { toast(e.message, 'error'); }

  let list = all.filter(c => (c.fields.company_id || []).includes(cur.id));
  if (!_customerListState.showArchived) list = list.filter(c => (c.fields.status || 'aktiv') !== 'archiviert');

  const q = _customerListState.search.trim().toLowerCase();
  if (q) {
    list = list.filter(c => {
      const f = c.fields;
      return [f.name1, f.name2, f.customer_no, f.city, f.contact_name, f.email]
        .some(v => (v || '').toLowerCase().includes(q));
    });
  }

  const sortKey = _customerListState.sort;
  list.sort((a, b) => {
    if (sortKey === 'customer_no') {
      const av = parseInt((a.fields.customer_no || '').replace(/\D/g, ''), 10) || 0;
      const bv = parseInt((b.fields.customer_no || '').replace(/\D/g, ''), 10) || 0;
      return av - bv;
    }
    const av = (a.fields[sortKey === 'city' ? 'city' : 'name1'] || '').toLowerCase();
    const bv = (b.fields[sortKey === 'city' ? 'city' : 'name1'] || '').toLowerCase();
    return av.localeCompare(bv, 'de');
  });

  document.getElementById('pageContent').innerHTML = `
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold text-ink-900">Kunden</h2>
          <p class="text-xs text-ink-500 mt-0.5">${escapeHtml(cur.name)} · ${list.length} Einträge</p>
        </div>
        <button onclick="openCustomerModal()" class="bg-brand-500 text-white rounded-lg px-3 py-2 text-sm font-medium hover:bg-brand-600 flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i> Neuer Kunde
        </button>
      </div>
      <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px]">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input id="customerSearch" type="search" value="${escapeHtml(_customerListState.search)}" placeholder="Suchen…" oninput="onCustomerSearchInput(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          </div>
          <label class="text-xs text-ink-500">Sortierung:</label>
          <select onchange="_customerListState.sort=this.value;renderCustomers()" class="text-sm border border-ink-200 rounded-lg px-2 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            <option value="name" ${sortKey==='name'?'selected':''}>Name</option>
            <option value="customer_no" ${sortKey==='customer_no'?'selected':''}>Kundennr.</option>
            <option value="city" ${sortKey==='city'?'selected':''}>Ort</option>
          </select>
          <label class="flex items-center gap-2 text-xs text-ink-700 ml-1">
            <input type="checkbox" ${_customerListState.showArchived?'checked':''} onchange="_customerListState.showArchived=this.checked;renderCustomers()" class="w-4 h-4 rounded border-ink-300">
            <span>auch archivierte</span>
          </label>
        </div>
        <div class="divide-y divide-ink-100">
          ${list.length === 0
            ? `<div class="p-10 text-center text-ink-500 text-sm">${q || _customerListState.showArchived ? 'Keine Treffer.' : 'Noch keine Kunden für diesen Mandanten. Lege den ersten an mit „+ Neuer Kunde".'}</div>`
            : list.map(customerRow).join('')}
        </div>
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

function onCustomerSearchInput(value) {
  _customerListState.search = value;
  clearTimeout(_customerSearchTimer);
  _customerSearchTimer = setTimeout(() => renderCustomers(), 200);
}

      </div>
      <div class="flex gap-1 shrink-0 ml-2" onclick="event.stopPropagation()">
        <button onclick="openCustomerModal('${rec.id}')" class="p-2 text-ink-500 hover:text-ink-900 hover:bg-ink-100 rounded" title="Bearbeiten">
          <i data-lucide="pencil" class="w-4 h-4"></i>

        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Kundennummer</label>
          <input name="customer_no" value="${escapeHtml(f.customer_no || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Status</label>
          <select name="status" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            <option value="aktiv" ${(f.status||'aktiv')==='aktiv'?'selected':''}>aktiv</option>
            <option value="archiviert" ${f.status==='archiviert'?'selected':''}>archiviert</option>
          </select>
        </div>
      </div>

      <h4 class="mt-5 mb-2 text-xs font-semibold text-ink-500 uppercase tracking-wider">Adresse</h4>
      <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12"><input name="street" placeholder="Straße + Nr." value="${escapeHtml(f.street || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div class="col-span-3"><input name="zip" placeholder="PLZ" value="${escapeHtml(f.zip || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div class="col-span-9"><input name="city" placeholder="Ort" value="${escapeHtml(f.city || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div class="col-span-12"><input name="country" placeholder="Land" value="${escapeHtml(f.country || 'Deutschland')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
      </div>

      <h4 class="mt-5 mb-2 text-xs font-semibold text-ink-500 uppercase tracking-wider">Ansprechpartner</h4>
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2"><input name="contact_name" placeholder="Name" value="${escapeHtml(f.contact_name || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div><input name="email" type="email" placeholder="E-Mail" value="${escapeHtml(f.email || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div><input name="phone" placeholder="Telefon" value="${escapeHtml(f.phone || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
        <div class="col-span-2"><input name="website" placeholder="Website" value="${escapeHtml(f.website || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30"></div>
      </div>

      <h4 class="mt-5 mb-2 text-xs font-semibold text-ink-500 uppercase tracking-wider">Buchhaltung</h4>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">USt-IdNr</label>
          <input name="vat_id" value="${escapeHtml(f.vat_id || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Zahlungsziel</label>
          <input name="payment_terms" placeholder="14 Tage netto" value="${escapeHtml(f.payment_terms || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <h4 class="mt-5 mb-2 text-xs font-semibold text-ink-500 uppercase tracking-wider">Notizen</h4>
      <textarea name="notes" rows="3" class="w-full px-3 py-2 border border-ink-200 rounded-lg mb-5 focus:outline-none focus:ring-2 focus:ring-brand-500/30">${escapeHtml(f.notes || '')}</textarea>

      <div class="flex justify-end gap-2">
        <button type="button" onclick="closeModal()" class="px-3 py-2 text-sm rounded-lg border border-ink-200 hover:bg-ink-50">Abbrechen</button>
        <button type="submit" class="px-3 py-2 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600">Speichern</button>
      </div>
    </form>
  `);
}

async function saveCustomer(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  const fd = new FormData(e.target);
  const fields = {};
  ['name1','name2','customer_no','street','zip','city','country','contact_name','email','phone','website','vat_id','payment_terms','status','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  try {
    if (id) await updateData('Customer', id, fields);
    else    await writeData('Customer', fields);
    closeModal();
    renderCustomers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleCustomerArchive(id, archive) {
  try {
    await updateData('Customer', id, { status: archive ? 'archiviert' : 'aktiv' });
    renderCustomers();
    toast(archive ? 'Archiviert' : 'Reaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

/* ============================================================
   UI: LOGIN HANDLER
   ============================================================ */
function showLoginScreen() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;
  setTimeout(() => document.getElementById('loginKey')?.focus(), 50);
}

function showApp() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('sidebarUserName').textContent = APP_KEYS.user?.name || '–';
  document.getElementById('sidebarUserRole').textContent = APP_KEYS.user?.role || '';
  document.getElementById('topbarVersion').textContent = APP_VERSION;
  if (APP_KEYS.user?.is_admin) document.getElementById('navAdmin')?.classList.remove('hidden');
  initNavSections();
  initNavRouting();
  renderMandantenSwitcher();
  renderWelcome();
  if (window.lucide) lucide.createIcons();
}

function forceAppUpdate() {
  // Lokale Caches leeren (App-State, Update-Banner-Status etc.) + Hard-Reload mit Cache-Buster
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('cache_')) localStorage.removeItem(k);
    });
  } catch (e) {}
  const url = new URL(location.href);
  url.searchParams.set('_v', Date.now().toString());
  location.replace(url.toString());
}

// Klick außerhalb schließt das Mandanten-Menü
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('mandantWrap');
  if (!wrap || wrap.contains(e.target)) return;
  document.getElementById('mandantMenu')?.classList.add('hidden');
});

function setLoginLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const spin = document.getElementById('loginSpin');
  btn.disabled = loading;
  spin.classList.toggle('hidden', !loading);
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearLoginError() {
  document.getElementById('loginError').classList.add('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearLoginError();
  const key = document.getElementById('loginKey').value.trim();
  if (!key) return showLoginError('Bitte Key eingeben.');
  setLoginLoading(true);
  try {
    await loginWithUserKey(key);
    toast('Willkommen zurück, ' + (APP_KEYS.user?.name || 'Kollege') + '!', 'success');
    showApp();
  } catch (err) {
    showLoginError(err.message || 'Login fehlgeschlagen');
  } finally {
    setLoginLoading(false);
  }
});

/* ============================================================
   UPDATE-CHECK (GitHub Releases)
   ============================================================ */
async function checkForUpdate() {
  try {
    const r = await fetch('https://api.github.com/repos/' + APP_CONFIG.GITHUB_REPO + '/releases/latest');
    if (!r.ok) return;
    const d = await r.json();
    if (d.tag_name && d.tag_name !== APP_VERSION) {
      document.getElementById('updateVersion').textContent = d.tag_name;
      document.getElementById('updateBanner').classList.remove('hidden');
      if (window.lucide) lucide.createIcons();
    }
  } catch (e) { /* still */ }
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  if (window.lucide) lucide.createIcons();
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;

  // Auto-Login
  const ok = await tryAutoLogin();
  if (ok) showApp();
  else showLoginScreen();

  // Update-Check (nach UI ready, nicht-blockierend)
  setTimeout(checkForUpdate, 1500);
}

document.addEventListener('DOMContentLoaded', init);
</script>
