function _saveCurrentInqWizStep() {
  const w = _inquiryWizard;
  if (w.step === 1) {
    // Schritt 1 = nur Bilder, kein State außer _inquiryImages (wird live in Array geschrieben)
  } else if (w.step === 2) {
    w.data.voice_text = (document.getElementById('inq_voice_text')?.value || '').trim();
    w.data.raw_text   = (document.getElementById('inq_raw_text')?.value   || '').trim();
  } else if (w.step === 3) {
    w.data.title       = (document.getElementById('iw_title')?.value      || '').trim();
    w.data.ticket_no   = (document.getElementById('iw_ticket_no')?.value  || '').trim();
    w.data.channel     = document.getElementById('iw_channel')?.value     || w.data.channel;
    w.data.customer_id = document.getElementById('iw_customer_id')?.value || '';
    w.data.contact_id  = document.getElementById('iw_contact_id')?.value  || '';
    w.data.ai_summary  = (document.getElementById('iw_ai_summary')?.value || '').trim();
  } else if (w.step === 4) {
    w.data.notes       = (document.getElementById('iw_notes')?.value      || '').trim();
  }
}

function inqWizNext() {
  const w = _inquiryWizard;
  _saveCurrentInqWizStep();
  if (_inquirySpeech) { try { _inquirySpeech.stop(); } catch(e){} _inquirySpeech = null; }
  if (w.step < w.totalSteps) {
    w.step++;
    renderInquiryWizardStep();
    // Beim Eintritt in Schritt 3: automatisch analysieren wenn Eingaben vorhanden + noch keine Analyse
    if (w.step === 3 && !w.data.ai_summary && (w.data.raw_text || w.data.voice_text || _inquiryImages.length > 0)) {
      setTimeout(() => analyzeInquiryWizard(), 150);
    }
  }
}

function inqWizBack() {
  const w = _inquiryWizard;
  _saveCurrentInqWizStep();
  if (_inquirySpeech) { try { _inquirySpeech.stop(); } catch(e){} _inquirySpeech = null; }
  if (w.step > 1) { w.step--; renderInquiryWizardStep(); }
}

function onInqWizCustomerChange() {
  const w = _inquiryWizard;
  const cid = document.getElementById('iw_customer_id')?.value || '';
  w.data.customer_id = cid;
  // Hauptansprechpartner vorbelegen
  w.data.contact_id = cid ? findPrimaryContactId(w.contacts || [], cid, 'customer') : '';
  const select = document.getElementById('iw_contact_id');
  if (!select) return;
  if (!cid) { select.innerHTML = '<option value="">— nicht zugeordnet —</option>'; return; }
  const list = (w.contacts || []).filter(c => (c.fields.customer_id || []).includes(cid));
  select.innerHTML = '<option value="">— nicht zugeordnet —</option>' +
    list.map(c => `<option value="${c.id}" ${w.data.contact_id === c.id ? 'selected' : ''}>${escapeHtml(contactDisplayName(c.fields))}${c.fields.role ? ' · ' + escapeHtml(c.fields.role) : ''}</option>`).join('');
}

async function analyzeInquiryWizard() {
  const w = _inquiryWizard;
  _saveCurrentInqWizStep();
  if (!w.data.raw_text && !w.data.voice_text && _inquiryImages.length === 0) {
    return toast('Bitte erst Text, Sprache oder Bilder hinzufügen', 'warn');
  }
  if (!APP_KEYS.anthropicKey) {
    return toast('KI nicht verfügbar — Anthropic-Key fehlt', 'error');
  }
  const btn = document.getElementById('inq_analyze_btn');
  const lbl = document.getElementById('inq_analyze_label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'analysiert…';
  try {
    const cur = getCurrentCompany();
    const raw = await askAI(_inquiryAiPrompt(w.data), {
      images: _inquiryImages.map(i => ({ mediaType: i.mediaType, data: i.base64 })),
      maxTokens: 2048
    });
    const parsed = _parseInquiryAiResponse(raw);
    // Wizard-State aktualisieren
    if (parsed.title)     w.data.title     = parsed.title;
    if (parsed.ticket_no) w.data.ticket_no = parsed.ticket_no;
    if (parsed.channel)   w.data.channel   = parsed.channel;
    w.data.ai_summary = parsed.summary || raw;
    w.aiHints = { customer: parsed.customer_hint, contact: parsed.contact_hint };
    // Auto-Match
    const matchedCustomer = _matchCustomerByHint(parsed.customer_hint, w.customers, cur.id);
    if (matchedCustomer) {
      w.data.customer_id = matchedCustomer;
      const matchedContact = _matchContactByHint(parsed.contact_hint, w.contacts, matchedCustomer);
      if (matchedContact) w.data.contact_id = matchedContact;
    }
    // Schritt 3 neu rendern damit alle Felder befüllt erscheinen
    renderInquiryWizardStep();
    toast('Analyse fertig — Felder vorbefüllt' + (matchedCustomer ? ' · Kunde erkannt' : ''), 'success');
  } catch (err) {
    toast(err.message, 'error');
    if (btn) btn.disabled = false;
    if (lbl) lbl.textContent = w.data.ai_summary ? 'Erneut analysieren' : 'Mit KI analysieren';
  }
}

async function _persistInquiryFromWizard() {
  const w = _inquiryWizard;
  _saveCurrentInqWizStep();
  if (!w.data.title) throw new Error('Betreff fehlt — bitte zurück zu Schritt 3');
  const cur = getCurrentCompany();
  const fields = {
    inquiry_no: w.data.inquiry_no,
    title:      w.data.title,
    ticket_no:  w.data.ticket_no,
    channel:    w.data.channel,
    status:     w.data.status || 'in_bearbeitung',
    raw_text:   w.data.raw_text,
    voice_text: w.data.voice_text,
    ai_summary: w.data.ai_summary,
    notes:      w.data.notes,
    company_id: [cur.id]
  };
  if (w.data.customer_id) fields.customer_id = [w.data.customer_id];
  if (w.data.contact_id)  fields.contact_id  = [w.data.contact_id];
  if (_inquirySpeech) { try { _inquirySpeech.stop(); } catch(e){} _inquirySpeech = null; }
  return await writeData('Inquiry', fields);
}

async function inqWizSaveAsInquiryOnly() {
  try {
    await _persistInquiryFromWizard();
    closeModal();
    renderInquiries();
    toast('Anfrage gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function inqWizCreateQuote() {
  const w = _inquiryWizard;
  try {
    const inquiry = await _persistInquiryFromWizard();
    const cur = getCurrentCompany();
    const quoteNo = await nextQuoteNo(cur.id);
    const today = new Date();
    const validUntil = new Date(today); validUntil.setDate(validUntil.getDate() + 30);
    const iso = d => d.toISOString().slice(0, 10);
    const quoteFields = {
      quote_no:    quoteNo,
      title:       w.data.title,
      description: w.data.ai_summary,
      inquiry_id:  [inquiry.id],
      company_id:  [cur.id],
      date:        iso(today),
      valid_until: iso(validUntil),
      status:      'Entwurf'
    };
    if (w.data.customer_id) quoteFields.customer_id = [w.data.customer_id];
    if (w.data.contact_id)  quoteFields.contact_id  = [w.data.contact_id];
    const created = await writeData('Quote', quoteFields);
    closeModal();
    toast('Angebot ' + quoteNo + ' angelegt — öffne Editor zum Befüllen', 'success', 3500);
    setTimeout(() => openQuoteModal(created.id), 200);
  } catch (err) { toast(err.message, 'error'); }
}

function quoteStatusBadge(status) {
  const map = {
    'Entwurf':     ['bg-ink-100 text-ink-700', 'Entwurf'],
    'versendet':   ['bg-blue-100 text-blue-700', 'versendet'],
    'angenommen':  ['bg-emerald-100 text-emerald-700', 'angenommen'],
    'abgelehnt':   ['bg-red-100 text-red-700', 'abgelehnt'],
    'abgelaufen':  ['bg-amber-100 text-amber-700', 'abgelaufen'],
    'archiviert':  ['bg-ink-200 text-ink-600', 'archiviert']
  };
  const [cls, label] = map[status] || map['Entwurf'];
  return `<span class="text-[10px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded ${cls}">${label}</span>`;
}

function calcQuoteSums(items) {
  let subtotal_net = 0, vat_total = 0, ek_total = 0;
  items.forEach(it => {
    const f = it.fields || it;
    const qty   = +(f.qty || 0);
    const price = +(f.unit_price_net || 0);
    const disc  = +(f.discount_pct || 0);
    const vat   = +(f.vat_rate || 0);
    const ek    = +(f.purchase_price || 0);
    const lineNet = qty * price * (1 - disc / 100);
    const lineVat = lineNet * vat / 100;
    subtotal_net += lineNet;
    vat_total    += lineVat;
    ek_total     += qty * ek;
  });
  const margin = subtotal_net - ek_total;
  return {
    subtotal_net: Math.round(subtotal_net * 100) / 100,
    vat_total:    Math.round(vat_total    * 100) / 100,
    total_gross:  Math.round((subtotal_net + vat_total) * 100) / 100,
    ek_total:     Math.round(ek_total     * 100) / 100,
    margin:       Math.round(margin       * 100) / 100,
    margin_pct:   subtotal_net > 0 ? Math.round((margin / subtotal_net) * 1000) / 10 : 0
  };
}

function calcLineNet(qty, price, disc) {
  return Math.round(((qty || 0) * (price || 0) * (1 - (disc || 0) / 100)) * 100) / 100;
}

}

  Allgemein:    []

function substituteVariables(text, docType, ctx) {
  if (!text) return '';
  const vars = TEMPLATE_VARIABLES[docType] || [];
  let out = String(text);
  vars.forEach(v => {
    const placeholder = '{{' + v.name + '}}';
    if (out.includes(placeholder)) {
      try { out = out.split(placeholder).join(String(v.resolve(ctx) ?? '')); } catch(e) {}
    }
  });
  // Custom-Variablen aus ctx.customFields nachrücken (vom Admin definiert + per Doc gefüllt)
  const cf = ctx?.customFields || {};
  Object.keys(cf).forEach(k => {
    const placeholder = '{{' + k + '}}';
    if (out.includes(placeholder)) {
      out = out.split(placeholder).join(String(cf[k] ?? ''));
    }
  });
  return out;
}

function quoteTemplatePicker(fieldName, sectionLabel, currentTplId) {
  const tpls = (window._quoteTemplates || []).filter(t => (t.fields.section || '') === sectionLabel);
  if (tpls.length === 0) return '<span class="text-xs text-ink-400 italic">— keine Vorlage —</span>';
  const sorted = [...tpls].sort((a, b) => {
    const ad = a.fields.is_default ? 0 : 1;
    const bd = b.fields.is_default ? 0 : 1;
    if (ad !== bd) return ad - bd;
    return (a.fields.name || '').localeCompare(b.fields.name || '', 'de');
  });
  return `
    <div class="flex items-center gap-1">
      <select data-tpl-field="${fieldName}" onchange="onTemplatePicked(this, '${fieldName}', 'Angebot')" class="text-xs border border-ink-200 rounded-md px-2 py-1 max-w-[220px]">
        <option value="">— keine Vorlage —</option>
        ${sorted.map(t => `<option value="${t.id}" ${t.id===currentTplId?'selected':''}>${t.fields.is_default ? '★ ' : ''}${escapeHtml(t.fields.name || '–')}</option>`).join('')}
      </select>
      <button type="button" onclick="refreshTemplate('${fieldName}', 'Angebot')" title="Vorlage neu anwenden / Werte aktualisieren" class="p-1 text-ink-500 hover:text-brand-600 hover:bg-brand-50 rounded">
        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
      </button>
    </div>
  `;
}

function refreshTemplate(fieldName, docType) {
  const select = document.querySelector(`#modalBox select[data-tpl-field="${fieldName}"]`);
  const tplId = select?.value;
  if (!tplId) { toast('Keine Vorlage ausgewählt', 'warn'); return; }
  const tpl = (window._quoteTemplates || []).find(t => t.id === tplId);
  if (!tpl) return;
  buildQuoteVariableContext().then(ctx => {
    setQuoteFieldValue(fieldName, substituteVariables(tpl.fields.content || '', docType, ctx));
    if (typeof updateQuotePreview === 'function') updateQuotePreview();
    toast('Aktualisiert', 'success', 1200);
  });
}

async function applyDefaultTemplate(fieldName, section) {
  const current = (getQuoteFieldValue(fieldName) || '').replace(/<[^>]+>/g, '').trim();
  if (current) return; // nur wenn Feld leer ist
  const tpl = (window._quoteTemplates || []).find(t =>
    (t.fields.section || '') === section && t.fields.is_default
  );
  if (!tpl) return;
  const ctx = await buildQuoteVariableContext();
  setQuoteFieldValue(fieldName, substituteVariables(tpl.fields.content || '', 'Angebot', ctx));
}

async function buildQuoteVariableContext() {
  const form = document.querySelector('#modalBox form');
  if (!form) return {};
  const fd = new FormData(form);
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  const cache  = window._quoteCustomerCache || {};
  const customer = cache.byId?.[cidSel];
  const contact  = cache.contacts?.find(c => c.id === conSel)?.fields;
  const company  = window._quoteCompanyCache || {};
  // Adressen auflösen
  const customerObj = cidSel ? { id: cidSel, fields: customer || {} } : null;
  const addresses = cache.addresses || [];
  const deliveryAddrId = (fd.get('delivery_address_id') || '').trim();
  const invoiceAddrId  = (fd.get('invoice_address_id')  || '').trim();
  const deliveryAddress = resolveAddress({ customer: customerObj, addresses, addressId: deliveryAddrId, kind: 'delivery' });
  const invoiceAddress  = resolveAddress({ customer: customerObj, addresses, addressId: invoiceAddrId,  kind: 'billing'  });
  return {
    quote: {
      quote_no:       (fd.get('quote_no') || '').trim(),
      quote_title:    (fd.get('quote_title') || '').trim(),
      date:           (fd.get('date') || '').trim(),
      valid_until:    (fd.get('valid_until') || '').trim(),
      payment_terms:  (fd.get('payment_terms') || '').trim(),
      delivery_terms: (fd.get('delivery_terms') || '').trim(),
      layout_variant: (fd.get('layout_variant') || 'standard').trim(),
      force_closing_new_page: fd.get('force_closing_new_page') === 'on',
      layout_offsets: (fd.get('layout_offsets') || '').trim(),
      delivery_address_id: deliveryAddrId,
      invoice_address_id:  invoiceAddrId
    },
    customer, contact, company, deliveryAddress, invoiceAddress,
    user: APP_KEYS.user || {},
    customFields: collectCustomValues()
  };
}

// Vergleicht zwei Adressen, ob sie effektiv identisch sind (für "nur eine zeigen wenn gleich").
function addressesEqual(a, b) {
  if (!a || !b) return false;
  return (a.street || '') === (b.street || '')
      && (a.zip || '')    === (b.zip || '')
      && (a.city || '')   === (b.city || '')
      && (a.country || '') === (b.country || '')
      && (a.recipient || '') === (b.recipient || '');
}

/* Lazy-Load Quill-Lib einmalig. Verspricht erst, wenn window.Quill verfügbar ist. */
async function ensureQuillLoaded() {
  if (window.Quill) return;
  await new Promise((resolve) => {
    if (!document.getElementById('quillCss')) {
      const css = document.createElement('link');
      css.id = 'quillCss';
      css.rel = 'stylesheet';
      css.href = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css';
      document.head.appendChild(css);
    }
    if (document.querySelector('script[data-quill]')) {
      // schon im Laden
      const wait = () => window.Quill ? resolve() : setTimeout(wait, 50);
      wait();
      return;
    }
    const script = document.createElement('script');
    script.dataset.quill = '1';
    script.src = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js';
    script.onload = resolve;
    script.onerror = resolve;
    document.head.appendChild(script);
  });
}

/* Generischer Quill-Editor-Initializer:
   - bindet an Container-ID
   - synct HTML in versteckten Input (name=hiddenInputName) bei jeder Änderung
   - akzeptiert plain text oder HTML als initialContent */
async function initSimpleQuillEditor(containerId, hiddenInputName, initialContent, placeholder) {
  await ensureQuillLoaded();
  const container = document.getElementById(containerId);
  if (!container || !window.Quill) return null;
  registerQuillCustomSizes();
  const q = new window.Quill(container, {
    theme: 'snow',
    placeholder: placeholder || '',
    modules: { toolbar: quillStandardToolbar() }
  });
  if (initialContent) {
    if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(initialContent)) {
      q.root.innerHTML = initialContent;
    } else {
      q.setText(initialContent);
    }
  }
  const hidden = document.querySelector(`#modalBox input[name="${hiddenInputName}"], #modalBox2 input[name="${hiddenInputName}"]`);
  const sync = () => { if (hidden) hidden.value = q.root.innerHTML; };
  q.on('text-change', sync);
  sync();
  return q;
}

/* Custom Schriftgrößen 5-12pt für alle Quill-Editoren. Muss EINMAL nach Quill-Load registriert werden. */
function registerQuillCustomSizes() {
  if (!window.Quill || window._quillSizesRegistered) return;
  try {
    const SizeStyle = window.Quill.import('attributors/style/size');
    SizeStyle.whitelist = ['5pt','6pt','7pt','8pt','9pt','10pt','11pt','12pt'];
    window.Quill.register(SizeStyle, true);
    window._quillSizesRegistered = true;
  } catch (e) { console.warn('Quill size registration failed:', e); }
}

/* Standard-Toolbar-Konfig für alle Quill-Editoren (Templates, Quote-Felder, Vollbild). */
function quillStandardToolbar() {
  return [
    [{ header: [1, 2, 3, false] }],
    [{ size: ['5pt','6pt','7pt','8pt','9pt','10pt','11pt','12pt'] }],
    ['bold', 'italic', 'underline'],
    [{ list: 'ordered' }, { list: 'bullet' }],
    [{ align: [] }],
    ['link', 'clean']
  ];
}

/* Quill-Editoren für Einleitung + Schlusstext im Quote-Modal.
   Lazy-Load Quill bei Bedarf, Init beider Editoren auf den im Modal vorhandenen Containern.
   Hidden-Inputs (name="description"/"notes") werden bei jeder Änderung syncronisiert. */
async function initQuoteEditors() {
  // Quill bei Bedarf nachladen
  if (!window.Quill) {
    await new Promise((resolve, reject) => {
      if (!document.getElementById('quillCss')) {
        const css = document.createElement('link');
        css.id = 'quillCss';
        css.rel = 'stylesheet';
        css.href = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css';
        document.head.appendChild(css);
      }
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    }).catch(()=>{});
  }
  if (!window.Quill) return;
  registerQuillCustomSizes();
  window._quoteQuills = {};
  const toolbar = quillStandardToolbar();
  const setupOne = (containerId, fieldName, placeholder) => {
    const el = document.getElementById(containerId);
    if (!el) return null;
    const hidden = document.querySelector(`#modalBox input[name="${fieldName}"]`);
    const initial = hidden?.value || '';
    const q = new window.Quill(el, {
      theme: 'snow',
      placeholder,
      modules: { toolbar },
    });
    if (initial) {
      if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(initial)) {
        q.root.innerHTML = initial;
      } else {
        q.setText(initial);
      }
    }
    const sync = () => {
      if (hidden) hidden.value = q.root.innerHTML;
      // Live-Preview triggern
      if (typeof updateQuotePreview === 'function') {
        clearTimeout(window._quoteEditorPreviewTimer);
        window._quoteEditorPreviewTimer = setTimeout(updateQuotePreview, 250);
      }
    };
    q.on('text-change', sync);
    sync();
    return q;
  };
  window._quoteQuills.description = setupOne('quote_intro_editor', 'description', 'Sehr geehrte Damen und Herren, …');
  window._quoteQuills.notes       = setupOne('quote_notes_editor', 'notes',       'z.B. Grußformel, Bankverbindung, Hinweise…');
}

/* Lese/Schreibe einheitlich aus Quote-Quill ODER Hidden-Input */
function getQuoteFieldValue(fieldName) {
  const q = window._quoteQuills?.[fieldName];
  if (q) return q.root.innerHTML;
  const el = document.querySelector(`#modalBox [name="${fieldName}"]`);
  return el ? el.value : '';
}
function setQuoteFieldValue(fieldName, value) {
  const q = window._quoteQuills?.[fieldName];
  if (q) {
    if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(value)) {
      q.root.innerHTML = value || '';
    } else {
      q.setText(value || '');
    }
    const hidden = document.querySelector(`#modalBox input[name="${fieldName}"]`);
    if (hidden) hidden.value = q.root.innerHTML;
    return;
  }
  const el = document.querySelector(`#modalBox [name="${fieldName}"]`);
  if (el) el.value = value || '';
}

/* === Layout-Anpassen-Modus ===
   - Toggle "Layout"-Button → Modus aktiv
   - Klick auf data-adjustable Block → selektiert (alle Klone in allen Sheets bekommen Highlight)
   - Pfeiltasten verschieben die Selection (Shift = 1px-Schritt, ohne = 5px)
   - Esc → Selection aufheben
   - "Speichern" persistiert in Quote.layout_offsets
   - "Reset" verwirft alle Verschiebungen
   - Während des Modus wird kein Canvas-Capture erzwungen (HTML-Sheets bleiben sichtbar) */
window._layoutAdjustActive = false;
window._layoutOffsets = {};
let _selectedAdjustKey = null;

function toggleLayoutAdjust() {
  if (window._layoutAdjustActive) {
    // Modus deaktivieren
    window._layoutAdjustActive = false;
    document.body.classList.remove('layout-adjust-mode');
    document.removeEventListener('keydown', _onAdjustKey, true);
    const target = document.getElementById('quotePreview');
    if (target) target.removeEventListener('click', _onAdjustClick, true);
    _selectedAdjustKey = null;
    _deselectAllBlocks();
    document.getElementById('layoutSaveBtn')?.style.setProperty('display', 'none');
    document.getElementById('layoutResetBtn')?.style.setProperty('display', 'none');
    // HTML-Vorschau bleibt sichtbar — kein Canvas-Replace mehr nötig
  } else {
    // Modus aktivieren — Offsets aus Hidden-Input laden
    const hidden = document.querySelector('#modalBox input[name="layout_offsets"]');
    try { window._layoutOffsets = JSON.parse(hidden?.value || '{}') || {}; } catch (e) { window._layoutOffsets = {}; }
    window._layoutAdjustActive = true;
    document.body.classList.add('layout-adjust-mode');
    document.addEventListener('keydown', _onAdjustKey, true);
    const target = document.getElementById('quotePreview');
    if (target) target.addEventListener('click', _onAdjustClick, true);
    document.getElementById('layoutSaveBtn').style.display = '';
    document.getElementById('layoutResetBtn').style.display = '';
    // Falls Canvas-Pages aktuell angezeigt werden, neu rendern damit data-adjustable klickbar ist
    if (typeof updateQuotePreview === 'function') updateQuotePreview();
    toast('Layout-Anpassen aktiv. Block anklicken → Pfeiltasten verschieben (Shift = 1px)', 'info', 4000);
  }
}

function _onAdjustClick(e) {
  if (!window._layoutAdjustActive) return;
  const block = e.target.closest('[data-adjustable]');
  if (!block) return;
  e.preventDefault();
  e.stopPropagation();
  _selectedAdjustKey = block.dataset.adjustable;
  _deselectAllBlocks();
  document.querySelectorAll(`#quotePreview [data-adjustable="${_selectedAdjustKey}"]`).forEach(el => {
    el.classList.add('layout-block-selected');
  });
}

function _deselectAllBlocks() {
  document.querySelectorAll('#quotePreview .layout-block-selected').forEach(el => {
    el.classList.remove('layout-block-selected');
  });
}

function _onAdjustKey(e) {
  if (!window._layoutAdjustActive) return;
  if (e.key === 'Escape') {
    _selectedAdjustKey = null;
    _deselectAllBlocks();
    return;
  }
  if (!_selectedAdjustKey) return;
  if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
  const step = e.shiftKey ? 1 : 5;
  const k = _selectedAdjustKey;
  if (!window._layoutOffsets[k]) window._layoutOffsets[k] = { x: 0, y: 0 };
  switch (e.key) {
    case 'ArrowUp':    window._layoutOffsets[k].y -= step; break;
    case 'ArrowDown':  window._layoutOffsets[k].y += step; break;
    case 'ArrowLeft':  window._layoutOffsets[k].x -= step; break;
    case 'ArrowRight': window._layoutOffsets[k].x += step; break;
  }
  e.preventDefault();
  _applyLiveOffsets();
}

function _applyLiveOffsets() {
  Object.entries(window._layoutOffsets).forEach(([key, ofs]) => {
    document.querySelectorAll(`#quotePreview [data-adjustable="${key}"]`).forEach(el => {
      el.style.transform = `translate(${ofs.x || 0}px, ${ofs.y || 0}px)`;
    });
  });
}

async function saveLayoutOffsets() {
  const json = JSON.stringify(window._layoutOffsets || {});
  // Hidden-Input syncen (wird beim Speichern des Angebots persistiert)
  const hidden = document.querySelector('#modalBox input[name="layout_offsets"]');
  if (hidden) hidden.value = json;
  // Direkt in Airtable speichern wenn Quote schon existiert
  const id = window._currentQuoteIdInModal;
  if (id) {
    try {
      await updateData('Quote', id, { layout_offsets: json });
      toast('Layout gespeichert', 'success');
    } catch (e) { toast('Speichern fehlgeschlagen: ' + e.message, 'error'); }
  } else {
    toast('Layout wird mit dem Angebot gespeichert', 'info');
  }
}

function resetLayoutOffsets() {
  if (!confirm('Alle Layout-Anpassungen verwerfen?')) return;
  window._layoutOffsets = {};
  // Inline transforms aus DOM entfernen
  document.querySelectorAll('#quotePreview [data-adjustable]').forEach(el => {
    el.style.transform = '';
  });
  const hidden = document.querySelector('#modalBox input[name="layout_offsets"]');
  if (hidden) hidden.value = '';
  toast('Layout zurückgesetzt — speichern nicht vergessen', 'warn', 3000);
}

/* Toggle für die optionalen Bereiche (Kopfzeile/Einleitung/Schluss/Anhänge).
   Standardmäßig ausgeblendet — werden i.d.R. aus dem Vorlagenpaket übernommen. */

  if (btn) {
    const icon = btn.querySelector('[data-lucide]');

    if (window.lucide) lucide.createIcons();

/* === Live-Layout-Anpassung per KI (Admin-only, im Quote-Modal-Toolbar) ===
   - öffnet zweites Modal
   - zeigt aktuelle Config (vom aktuell aktiven Layout — Standard/Klassisch/Custom)
   - User beschreibt eine Änderung → AI generiert NEUE Config (incrementell)
   - User kann iterieren — jedes Mal wird die Vorschau live aktualisiert
   - Speichern-Optionen: in bestehendes Custom-Layout schreiben ODER neues anlegen */
let _liveLayoutState = null;

function _activeLayoutConfig() {
  const hidden = document.querySelector('#modalBox input[name="layout_variant"]');
  const lv = hidden?.value || 'standard';
  if (lv.startsWith('layout:')) {
    const id = lv.slice('layout:'.length);
    const layout = (window._quoteLayouts || []).find(l => l.id === id);
    if (layout) {
      try { return { source: 'custom', id, name: layout.fields.name || '', config: { ...LAYOUT_DEFAULT_CONFIG, ...JSON.parse(layout.fields.config_json || '{}') } }; } catch(e) {}
    }
  }
  // Standard / Klassisch — beide nutzen das Default-Schema als Ausgangspunkt
  if (lv === 'klassisch') {
    return { source: 'preset', id: null, name: 'Klassisch (abgeleitet)', config: {
      ...LAYOUT_DEFAULT_CONFIG, fontBase:'14px', fontSmall:'12px', fontTable:'13px', fontTitle:'34px', titleWeight:'700', metaLabelBold:true, bezeichnungBold:true,
    }};
  }
  return { source: 'preset', id: null, name: 'Standard (abgeleitet)', config: { ...LAYOUT_DEFAULT_CONFIG } };
}

async function applyLayoutLiveAdjust() {
  if (!_liveLayoutState) return;
  const inp = document.getElementById('liveLayoutInput');
  const desc = (inp?.value || '').trim();
  if (!desc) return;
  const btn = document.getElementById('liveLayoutBtn');
  const lbl = document.getElementById('liveLayoutBtnLbl');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = '…';

  const currentJson = JSON.stringify(_liveLayoutState.config, null, 2);
  const prompt = `Du bist Designer für Geschäftsdokumente. Hier ist die AKTUELLE Layout-Konfiguration:

${currentJson}

Wende folgende Änderung darauf an: "${desc}"

Antworte NUR mit dem aktualisierten JSON-Objekt — gleiche Keys wie im aktuellen, alle erforderlich. Werte sind:
- fontBase, fontSmall, fontTable, fontTitle: CSS-Größen mit "px"
- titleWeight, tableHeaderWeight: 100-900 als String
- titleColor, bodyColor, accentColor, tableHeaderColor: Hex-Farben "#xxxxxx"
- titleAlign: "left" | "center" | "right"
- colsGap, sectionGap: CSS-Werte z.B. "1.5rem"
- metaLabelBold, bezeichnungBold, totalBold: true/false
- tableHeaderBg: Hex oder "transparent"

Nur die Keys, kein Text drumherum, keine Code-Blöcke.`;

  try {
    const result = await askAI(prompt, { maxTokens: 1200 });
    let cleaned = result.trim().replace(/^```(?:json)?\n?/i, '').replace(/\n?```$/, '').trim();
    const parsed = JSON.parse(cleaned);
    console.log('[Layout-AI] Vor:', { ..._liveLayoutState.config });
    console.log('[Layout-AI] AI-Output:', parsed);
    _liveLayoutState.config = { ...LAYOUT_DEFAULT_CONFIG, ..._liveLayoutState.config, ...parsed };
    console.log('[Layout-AI] Nach:', { ..._liveLayoutState.config });
    // Live in Vorschau anwenden — temporäres Custom-Layout
    window._liveLayoutPreview = _liveLayoutState.config;
    if (typeof updateQuotePreview === 'function') updateQuotePreview();
    // History anzeigen
    const hist = document.getElementById('liveLayoutHistory');
    if (hist) {
      const item = document.createElement('div');
      item.className = 'p-1.5 bg-white rounded border border-ink-200';
      item.innerHTML = `<div class="text-amber-700 font-medium text-[11px]">› ${escapeHtml(desc)}</div>`;
      hist.appendChild(item);
    }
    // JSON-Textarea aktualisieren
    const ta = document.getElementById('liveLayoutJson');
    if (ta) ta.value = JSON.stringify(_liveLayoutState.config, null, 2);
    if (inp) inp.value = '';
    inp?.focus();
  } catch (err) {
    toast('Anpassung fehlgeschlagen: ' + err.message, 'error', 4000);
  } finally {
    if (btn) btn.disabled = false;
    if (lbl) lbl.textContent = 'Anpassen';
  }
}

async function saveLiveLayoutInPlace() {
  if (!_liveLayoutState || _liveLayoutState.source !== 'custom') return;

  try {

    if (ta) _liveLayoutState.config = JSON.parse(ta.value || '{}');
  } catch (e) { return toast('JSON ungültig: ' + e.message, 'error'); }
  try {
    await updateData('Layout', _liveLayoutState.id, { config_json: JSON.stringify(_liveLayoutState.config) });

    const layout = (window._quoteLayouts || []).find(l => l.id === _liveLayoutState.id);

    toast('Layout gespeichert', 'success');

}

  } catch (e) { return toast('JSON ungültig: ' + e.message, 'error'); }

/* Wird vom Bundle-Picker aufgerufen — übernimmt das Paket in die Quote-Form */
async function onQuoteBundlePick(bundleId) {
  if (!bundleId) return;
  const hasContent = ['quote_title','description','notes'].some(n => {
    const el = document.querySelector(`#modalBox [name="${n}"]`);
    return el && el.value && el.value.trim();
  });
  if (hasContent) {
    if (!confirm('Aktuelle Eingaben durch das Paket ersetzen?')) {
      // Bundle-Auswahl wieder zurücksetzen auf altes
      const sel = document.querySelector('#modalBox select[name="bundle_id"]');
      if (sel) sel.value = sel.dataset.prev || '';
      return;
    }
  }
  await applyQuoteBundle(bundleId);
  const sel = document.querySelector('#modalBox select[name="bundle_id"]');
  if (sel) sel.dataset.prev = bundleId;
}

/* Wendet ein Vorlagenpaket auf die geöffnete Quote-Form an: Titel + Einleitung + Schluss
   + Anhänge + Layout. */
async function applyQuoteBundle(bundleId, opts = {}) {
  const bundle = (window._quoteBundles || []).find(b => b.id === bundleId);
  if (!bundle) return;
  const f = bundle.fields || {};
  const ctx = await buildQuoteVariableContext();
  // Hilfsfunktion: Template-ID → Inhalt befüllen + Picker-Select setzen
  const apply = (tplId, fieldName, hiddenName) => {
    const tpl = (window._quoteTemplates || []).find(t => t.id === tplId);
    const sel = document.querySelector(`#modalBox select[data-tpl-field="${fieldName}"]`);
    if (sel) sel.value = tplId || '';
    const hidden = document.querySelector(`#modalBox input[name="${hiddenName}"]`);
    if (hidden) hidden.value = tplId || '';
    if (!tpl) return;
    setQuoteFieldValue(fieldName, substituteVariables(tpl.fields.content || '', 'Angebot', ctx));
  };
  if (f.title_template_id)   apply(f.title_template_id,   'quote_title',  'title_template_id');
  if (f.intro_template_id)   apply(f.intro_template_id,   'description',  'intro_template_id');
  if (f.closing_template_id) apply(f.closing_template_id, 'notes',        'closing_template_id');
  // Layout-Variante: Hidden-Field UND Toolbar-Select syncen
  if (f.layout_variant) {
    const layoutHidden = document.querySelector('#modalBox input[name="layout_variant"]');
    if (layoutHidden) layoutHidden.value = f.layout_variant;
    const layoutTop = document.getElementById('quoteLayoutTopSelect');
    if (layoutTop) layoutTop.value = f.layout_variant;
  }
  // Schlusstext-auf-neuer-Seite-Checkbox aus Bundle übernehmen
  const forceCb = document.querySelector('#modalBox input[name="force_closing_new_page"]');
  if (forceCb) forceCb.checked = !!f.force_closing_new_page;
  // Anhänge: Checkboxen umsetzen
  try {
    const ids = JSON.parse(f.attachment_ids || '[]');
    document.querySelectorAll('#modalBox [data-attachment-id]').forEach(cb => {
      cb.checked = ids.includes(cb.dataset.attachmentId);
    });
  } catch (e) {}
  // Variablen-Werte: Custom-Field-Inputs vorbefüllen (überschreibt vorhandene Werte)
  try {
    const vars = JSON.parse(f.variable_values || '{}');
    Object.entries(vars).forEach(([key, val]) => {
      // Custom-Field-Inputs in der Quote-Form haben data-cv-name="<key>" (siehe customFieldsSection)
      const inp = document.querySelector(`#modalBox [data-cv-name="${key}"]`);
      if (!inp) return;
      if (inp.type === 'checkbox') {
        inp.checked = (val === 'true' || val === true);
      } else {
        inp.value = val;
      }
    });
  } catch (e) { console.warn('[Bundle] variable_values konnten nicht angewendet werden:', e); }
  // Live-Vorschau aktualisieren
  if (typeof updateQuotePreview === 'function') updateQuotePreview();
  if (!opts.silent) toast('Paket „' + (f.name || '–') + '" angewendet', 'success', 1500);
}

/* Vollbild-Editor für lange Texte (Einleitung/Schlusstext) — Quill mit voller Toolbar. */
function expandTextField(fieldName, label) {
  const initialHtml = getQuoteFieldValue(fieldName) || '';
  const html = `
    <form onsubmit="event.preventDefault();applyExpandedField('${fieldName}');" class="p-4 sm:p-6 flex flex-col" style="height:88vh;max-height:720px;">

      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" onclick="closeModal2()" class="px-3 py-2.5 text-sm rounded-lg border border-ink-200 hover:bg-ink-50">Abbrechen</button>
        <button type="submit" class="px-3 py-2.5 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600">Übernehmen</button>
      </div>
    </form>
  `;
  openModal2(html);
  setTimeout(async () => {
    if (!window.Quill) {
      await new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js';
        s.onload = resolve; s.onerror = resolve;
        document.head.appendChild(s);
      });
    }
    if (!window.Quill) return;
    registerQuillCustomSizes();
    const q = new window.Quill(document.getElementById('expandedQuillEditor'), {
      theme: 'snow',
      modules: { toolbar: quillStandardToolbar() }
    });
    if (initialHtml) {
      if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(initialHtml)) {
        q.root.innerHTML = initialHtml;
      } else {
        q.setText(initialHtml);
      }
    }
    q.focus();
    window._expandedQuill = q;
  }, 80);
}

function applyExpandedField(fieldName) {
  const q = window._expandedQuill;
  if (q) {
    setQuoteFieldValue(fieldName, q.root.innerHTML);
    if (typeof updateQuotePreview === 'function') updateQuotePreview();
    window._expandedQuill = null;
  }
  closeModal2();
}

function onTemplatePicked(selectEl, fieldName, docType) {
  const tplId = selectEl.value;
  // Hidden-Feld für Speicherung mitführen (verschiedene Sections nutzen verschiedene Hidden-Felder)
  const hiddenName = fieldName === 'description' ? 'intro_template_id'
                   : fieldName === 'notes'       ? 'closing_template_id'
                   : fieldName === 'quote_title' ? 'title_template_id'
                   : null;
  if (hiddenName) {
    const hidden = document.querySelector(`#modalBox input[name="${hiddenName}"]`);
    if (hidden) hidden.value = tplId || '';
  }
  if (!tplId) return; // keine Vorlage
  const tpl = (window._quoteTemplates || []).find(t => t.id === tplId);
  if (!tpl) return;
  const currentText = (getQuoteFieldValue(fieldName) || '').replace(/<[^>]+>/g, '').trim();
  if (currentText && !confirm('Aktuellen Text durch Vorlage ersetzen?')) {
    // Auswahl behalten, aber Text nicht überschreiben
    return;
  }
  buildQuoteVariableContext().then(ctx => {
    setQuoteFieldValue(fieldName, substituteVariables(tpl.fields.content || '', docType, ctx));
    // Live-Vorschau anstoßen
    if (typeof updateQuotePreview === 'function') updateQuotePreview();
  });
}

async function openQuoteModal(id) {

  // (statt linked record) — einfacher und reicht für unsere Zwecke.

    { name: 'quote_title',             type: 'singleLineText' },

    { name: 'layout_variant',          type: 'singleLineText' },

  ensureTable('Address', [

  ]).catch(()=>{});
  ensureFields('Address', [
    { name: 'customer_id', type: 'singleLineText' },
    { name: 'kind',        type: 'singleLineText' },
    { name: 'is_primary',  type: 'checkbox', options: { color: 'blueBright', icon: 'check' } },
    { name: 'street',      type: 'singleLineText' },
    { name: 'zip',         type: 'singleLineText' },
    { name: 'city',        type: 'singleLineText' },
    { name: 'country',     type: 'singleLineText' },
    { name: 'recipient',   type: 'singleLineText' },
    { name: 'notes',       type: 'multilineText' },
  ]).catch(()=>{});
  // Brand-Color für die blaue Linie unten — pro Mandant in Company hinterlegt
  ensureFields('Company', [
    { name: 'brand_color', type: 'singleLineText' },
  ]).catch(()=>{});
  let f = {}, items = [], allCustomers = [], allContacts = [], allTemplates = [], allCompanies = [], allCustomFields = [], allPaymentTerms = [], allDeliveryTerms = [], allAttachments = [], allAddresses = [];
  try {
    [allCustomers, allContacts, allTemplates, allCompanies, allCustomFields, allPaymentTerms, allDeliveryTerms, allAttachments, allAddresses] = await Promise.all([
      readData('Customer'), readData('Contact'), readData('Textemplate'), readData('Company'), readData('CustomField'),

  } catch (e) { toast(e.message, 'error'); return; }
  const attachments = allAttachments.filter(a => (a.fields.company_id || []).includes(cur.id) && (a.fields.status || 'aktiv') === 'aktiv').sort((a,b)=>(a.fields.name||'').localeCompare(b.fields.name||'','de'));

  const selectedAttachmentIds = f.attachment_ids || [];
  // Template-Cache für die Vorlagen-Picker

    (t.fields.company_id || []).includes(cur.id) &&
    (t.fields.doc_type === 'Angebot') &&
    (t.fields.status || 'aktiv') === 'aktiv'
  );
  // Company-Cache für Variablen-Substitution

  // Custom Fields für Angebot, dieser Mandant
  window._quoteCustomFields = allCustomFields.filter(cf =>
    (cf.fields.company_id || []).includes(cur.id) &&
    (cf.fields.doc_type === 'Angebot') &&
    (cf.fields.status || 'aktiv') === 'aktiv'
  ).sort((a,b) => (a.fields.label || a.fields.name || '').localeCompare(b.fields.label || b.fields.name || '', 'de'));

  // Default-Templates für Auto-Auswahl bei neuen Dokumenten
  const defaultTitleTpl   = (window._quoteTemplates || []).find(t => (t.fields.section || '') === 'Titel'       && t.fields.is_default);
  const defaultIntroTpl   = (window._quoteTemplates || []).find(t => (t.fields.section || '') === 'Einleitung'  && t.fields.is_default);

  // Vorlagenpakete (Bundles) laden — pro Mandant
  let allBundles = [];

  const currentCustomerId = (f.customer_id || [])[0] || '';
  let   currentContactId  = (f.contact_id  || [])[0] || '';
  // Bei Neuanlage (oder wenn noch kein Kontakt gesetzt): Hauptansprechpartner des Kunden vorbelegen
  if (!currentContactId && currentCustomerId) {
    currentContactId = findPrimaryContactId(allContacts, currentCustomerId, 'customer');
  }
  const sums = calcQuoteSums(items);

  // Combobox-Items
  const customerItems = customersInCompany.map(c => ({
    id: c.id,
    label: c.fields.name1 || '–',
    secondary: [c.fields.customer_no, c.fields.city].filter(Boolean).join(' · ')
  }));
  const contactItemsFor = (cid) => allContacts
    .filter(c => (c.fields.customer_id || []).includes(cid))
    .map(c => ({

  const box = document.getElementById('modalBox');

    box.classList.remove('max-w-lg', 'max-w-3xl', 'max-w-5xl');
    box.classList.add('max-w-7xl');
    const applyResponsiveScroll = () => {
      const isLg = window.matchMedia('(min-width: 1024px)').matches;
      if (isLg) {
        box.classList.remove('max-h-[88vh]', 'overflow-y-auto');
      } else {
        box.classList.add('max-h-[90vh]', 'overflow-y-auto');
      }
    };
    applyResponsiveScroll();
    const _mq = window.matchMedia('(min-width: 1024px)');
    if (_mq.addEventListener) _mq.addEventListener('change', applyResponsiveScroll);
    else if (_mq.addListener) _mq.addListener(applyResponsiveScroll);
  }

        await applyDefaultTemplate('quote_title', 'Titel');
        await applyDefaultTemplate('description', 'Einleitung');
        await applyDefaultTemplate('notes', 'Schlusstext');
      }
    }, 80);
  }

  // Live-Vorschau initial befüllen + Listener für Änderungen
  _quotePreviewZoom = 1; // Reset bei Modal-Open
  setTimeout(async () => {
    // Quill-Editoren für Einleitung + Schluss initialisieren

    updateQuotePreview();
    attachPinchZoom();
    applyQuoteZoom();
    const form = document.querySelector('#modalBox form');
    if (form) {
      let dbTimer = null;
      const trigger = () => { clearTimeout(dbTimer); dbTimer = setTimeout(updateQuotePreview, 250); };
      form.addEventListener('input', trigger);
      form.addEventListener('change', trigger);
    }
  }, 150);
}

async function updateQuotePreview() {
  const target = document.getElementById('quotePreview');
  if (!target) return;
  // Mobile: Live-Vorschau überspringen, solange nicht explizit erzwungen (PDF-Export setzt data-mobile-show).
  const pane = document.getElementById('quotePreviewPane');
  if (pane && pane.dataset.mobileHidden === 'true' && pane.dataset.mobileShow !== '1') {
    if (window.matchMedia && window.matchMedia('(max-width: 1023px)').matches) return;
  }
  const ctx = await buildQuoteVariableContext();
  // Form-Werte für intro/notes ergänzen + items laden
  const form = document.querySelector('#modalBox form');
  const fd = form ? new FormData(form) : null;
  const intro   = fd ? (fd.get('description') || '') : '';
  const closing = fd ? (fd.get('notes')       || '') : '';
  const cur = getCurrentCompany();
  let items = [];
  const qid = window._currentQuoteIdInModal;
  if (qid) {
    try {
      const all = await readData('QuoteItem');
      items = all.filter(it => (it.fields.quote_id || []).includes(qid))
        .sort((a,b) => (+(a.fields.pos || 0)) - (+(b.fields.pos || 0)));
    } catch (e) {}
  }
  // Article-Map (id → article_no) für Tabellenspalte 'Artikelnr.'
  let articleMap = {};
  try {
    const articles = await readData('Article');
    articles.forEach(a => {
      articleMap[a.id] = {
        article_no: a.fields.article_no || '',
        manufacturer_no: a.fields.manufacturer_no || '',
        name1: a.fields.name1 || '',
        name2: a.fields.name2 || ''
      };
    });
  } catch (e) {}
  target.innerHTML = renderQuotePreviewHtml(ctx, items, intro, closing, articleMap);
  // Erst nach Render in Multi-Page-Sheets paginieren
  paginatePreview();
  // KEIN Canvas-Capture-Replace mehr — HTML-Vorschau bleibt klickbar/zoom-fähig.
  // Canvases werden bei Bedarf in exportQuoteAsPdf on-the-fly generiert.
  if (window.lucide) lucide.createIcons();
}

// Footer-Daten aus Company (mit FLP_BRAND als Fallback). Wird vom Preview UND vom PDF genutzt.
function buildQuoteFooterData(c) {
  c = c || {};
  const cityLine = (c.zip && c.city) ? `D - ${c.zip} ${c.city}` : (c.city ? `D - ${c.city}` : FLP_BRAND.cityLine);
  const senderParts = [c.name || FLP_BRAND.companyName, c.street || FLP_BRAND.street, [c.zip, c.city].filter(Boolean).join(' '), 'DE'].filter(Boolean);
  // Brand-Color: aus Company.brand_color oder Default-Brand-Blau (#1FA8D6).
  // Akzeptiert "#hex" oder reine "hex" Werte.
  let brandColor = (c.brand_color || '').trim();
  if (brandColor && !brandColor.startsWith('#')) brandColor = '#' + brandColor;
  if (!/^#[0-9A-Fa-f]{3,8}$/.test(brandColor)) brandColor = '#1FA8D6';
  return {
    taglineTop: FLP_BRAND.taglineTop, // bleibt brand-default; kann später eigenes Company-Feld werden
    companyName: c.name || FLP_BRAND.companyName,
    managingDirector: c.managing_director ? `Geschäftsführer ${c.managing_director}` : FLP_BRAND.managingDirector,
    street: c.street || FLP_BRAND.street,
    cityLine,
    ustId: c.vat_id ? `USt.Id.-Nr.: ${c.vat_id}` : FLP_BRAND.ustId,
    email: c.email || FLP_BRAND.email,
    web: c.web || FLP_BRAND.web,
    tel: c.phone || FLP_BRAND.tel,
    fax: c.fax || FLP_BRAND.fax,
    hrb: c.hrb || FLP_BRAND.hrb,
    ag: c.ag || FLP_BRAND.ag,
    bankName: c.bank_name || FLP_BRAND.bankName,
    iban: c.iban || FLP_BRAND.iban,
    bic: c.bic || FLP_BRAND.bic,
    blz: c.blz || FLP_BRAND.blz,
    senderAddressLine: senderParts.join(' · '),

  };
}

// Zerlegt eine Position-Beschreibung in Bezeichnung (erste Zeile, plain text) und Body.
// Quill liefert HTML wie "<p>Title</p><p><br></p><p>Body line 1</p>…".
// Plain text: erste nicht-leere Zeile = Bezeichnung, Rest = Body.
function splitDescriptionTitleAndBody(rawDesc) {
  const out = { title: '', titleHtml: '', bodyHtml: '', bodyText: '', isHtml: false };
  if (!rawDesc) return out;
  const isHtml = /<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(rawDesc);
  out.isHtml = isHtml;
  if (isHtml) {
    const tmp = document.createElement('div');
    tmp.innerHTML = rawDesc;
    // Erstes Top-Level-Kind mit nicht-leerem Textinhalt = Bezeichnung
    let titleEl = null;
    for (const child of Array.from(tmp.children)) {
      const t = (child.textContent || '').trim();
      if (t) { titleEl = child; out.title = t; out.titleHtml = child.innerHTML; break; }
    }
    if (titleEl) titleEl.remove();
    // Führende leere Absätze entfernen ("<p><br></p>" etc.)
    while (tmp.firstElementChild && !(tmp.firstElementChild.textContent || '').trim()) {
      tmp.firstElementChild.remove();
    }
    out.bodyHtml = tmp.innerHTML.trim();
    out.bodyText = (tmp.textContent || '').trim();
    // Wenn keine Tags im Title-HTML, gleicher Text wie titleHtml
    if (!out.title) out.title = (rawDesc.replace(/<[^>]+>/g, '') || '').trim();
  } else {
    const lines = rawDesc.split('\n').map(l => l.trim()).filter(Boolean);
    out.title = lines[0] || '';
    out.titleHtml = '';
    const rest = lines.slice(1).join('\n');
    out.bodyHtml = ''; // plain text
    out.bodyText = rest;
  }
  return out;
}

function renderQuotePreviewHtml(ctx, items, introRaw, closingRaw, articleMap) {

  const offsetsSource = (window._layoutAdjustActive && window._layoutOffsets) ? window._layoutOffsets : persistedOffsets;
  const ofs = (key) => {

    return (o.x || o.y) ? `transform:translate(${o.x}px,${o.y}px);` : '';

    : '';

  // Wir liefern Header / Body / Footer als data-Attribute zurück, damit der Pager
  // beim Multi-Page-Aufbau jeden Block einzeln nutzen kann.
  return `
    <div data-quote-doc data-quote-no="${escapeHtml(q.quote_no || '')}">
      <div data-quote-header>${header}</div>
      <div data-quote-header-page1 style="display:none;">${leftLogosBlock}</div>
      ${body}
      ${closingExtraHtml ? `<div data-closing-extra-wrap style="display:none;">${closingExtraHtml}</div>` : ''}
      <div data-quote-footer-html style="display:none;">${renderQuoteFooterHtml(footer)}</div>
    </div>
  `;
}

/* Pager: zerlegt das gerenderte Quote-Doc in echte A4-Sheets, jedes mit Header oben + Footer unten.
   Pixel-genau bei 794×1123 (A4 @ 96dpi). Skaliert visuell mit CSS zoom auf die Container-Breite. */
function paginatePreview() {
  const target = document.getElementById('quotePreview');
  if (!target) return;
  const docEl = target.querySelector('[data-quote-doc]');
  if (!docEl) return;
  const headerEl = docEl.querySelector('[data-quote-header]');
  const headerPage1El = docEl.querySelector('[data-quote-header-page1]');
  const bodyEl   = docEl.querySelector('[data-quote-body]');
  const closingExtraWrap = docEl.querySelector('[data-closing-extra-wrap]');
  const footerWrap = docEl.querySelector('[data-quote-footer-html]');
  if (!headerEl || !bodyEl || !footerWrap) return;
  const headerHtml      = headerEl.innerHTML;
  const headerPage1Html = headerPage1El ? headerPage1El.innerHTML.trim() : '';
  const bodyHtml        = bodyEl.outerHTML;
  const closingExtra    = closingExtraWrap ? closingExtraWrap.innerHTML.trim() : '';
  const footerHtml      = footerWrap.innerHTML;

  // A4 @ 96dpi
  const A4_W = 794, A4_H = 1123;
  const PAD_T = 36, PAD_LR = 50, PAD_B = 24;
  const HEADER_H = 60, FOOTER_H = 92, GAP = 0;
  // Logos-Höhe nur reservieren wenn welche existieren (sonst 0) — 70px Logos
  const LOGOS_H = headerPage1Html ? 72 : 0;
  // usableH ist konstant — auf jeder Seite gleich. Logos-Bereich auf Seite 2+ bleibt einfach leer.
  const usableH = A4_H - PAD_T - HEADER_H - LOGOS_H - GAP - FOOTER_H - PAD_B;

  // Body bei Referenz-Breite messen (gleicher CSS-Kontext wie im Sheet)
  const measure = document.createElement('div');
  measure.style.cssText = `position:fixed;top:-9999px;left:0;width:${A4_W - 2*PAD_LR}px;visibility:hidden;font-family:Inter,system-ui,sans-serif;`;
  measure.innerHTML = bodyHtml;
  document.body.appendChild(measure);
  const bodyEl2 = measure.firstElementChild;
  const bodyHpx = bodyEl2 ? bodyEl2.scrollHeight : measure.scrollHeight;
  document.body.removeChild(measure);

  const numBodyPages = Math.max(1, Math.ceil(bodyHpx / usableH));
  const hasClosingPage = !!closingExtra;
  const numPages = numBodyPages + (hasClosingPage ? 1 : 0);

  let html = '<div data-pages-wrap>';
  for (let i = 0; i < numBodyPages; i++) {
    const offset = -i * usableH;
    const isPage1 = i === 0;
    const contentTop = PAD_T + HEADER_H + LOGOS_H + GAP;
    html += `
      <div class="quote-sheet" style="
        position:relative;
        width:${A4_W}px;
        height:${A4_H}px;
        background:#FFFFFF;
        box-shadow:0 6px 24px rgba(0,0,0,0.12);
        margin:0 auto 18px auto;
        overflow:hidden;
        font-family:Inter,system-ui,sans-serif;
        color:#0F172A;
      ">
        <!-- Header (jede Seite) -->
        <div style="position:absolute;top:${PAD_T}px;left:${PAD_LR}px;right:${PAD_LR}px;height:${HEADER_H}px;">
          ${headerHtml}
        </div>
        ${isPage1 && headerPage1Html ? `
          <!-- Logos (nur Seite 1) -->
          <div style="position:absolute;top:${PAD_T + HEADER_H}px;left:${PAD_LR}px;right:${PAD_LR}px;height:${LOGOS_H}px;">
            ${headerPage1Html}
          </div>
        ` : ''}
        <!-- Content-Slice -->
        <div style="position:absolute;top:${contentTop}px;left:${PAD_LR}px;right:${PAD_LR}px;height:${usableH}px;overflow:hidden;">
          <div style="transform:translateY(${offset}px);">${bodyHtml}</div>
        </div>
        <!-- Footer (jede Seite) -->
        <div style="position:absolute;bottom:${PAD_B}px;left:${PAD_LR}px;right:${PAD_LR}px;">
          ${footerHtml}
        </div>
        <!-- Seitenzahl: ganz oben rechts in der weißen Zone, z-index über Logo -->
        ${numPages > 1 ? `<div style="position:absolute;top:6px;right:${PAD_LR}px;font-size:9px;color:#94A3B8;z-index:5;background:#FFFFFF;padding:2px 4px;">Seite ${i+1} von ${numPages}</div>` : ''}
      </div>
    `;
  }
  // Extra-Seite für erzwungenen Schlusstext (force_closing_new_page)
  if (hasClosingPage) {
    const i = numBodyPages;
    html += `
      <div class="quote-sheet" style="
        position:relative;
        width:${A4_W}px;
        height:${A4_H}px;
        background:#FFFFFF;
        box-shadow:0 6px 24px rgba(0,0,0,0.12);
        margin:0 auto 18px auto;
        overflow:hidden;
        font-family:Inter,system-ui,sans-serif;
        color:#0F172A;
      ">
        <!-- Header (gleich wie auf den anderen Seiten — ohne Logos) -->
        <div style="position:absolute;top:${PAD_T}px;left:${PAD_LR}px;right:${PAD_LR}px;height:${HEADER_H}px;">
          ${headerHtml}
        </div>
        <!-- Schlusstext-Inhalt -->
        <div style="position:absolute;top:${PAD_T + HEADER_H + GAP}px;left:${PAD_LR}px;right:${PAD_LR}px;bottom:${PAD_B + 100}px;overflow:hidden;">
          ${closingExtra}
        </div>
        <!-- Footer -->
        <div style="position:absolute;bottom:${PAD_B}px;left:${PAD_LR}px;right:${PAD_LR}px;">
          ${footerHtml}
        </div>
        <!-- Seitenzahl -->
        <div style="position:absolute;top:6px;right:${PAD_LR}px;font-size:9px;color:#94A3B8;z-index:5;background:#FFFFFF;padding:2px 4px;">Seite ${i+1} von ${numPages}</div>
      </div>
    `;
  }
  html += '</div>';
  target.innerHTML = html;
  applyQuoteSheetScale();
}

/* Skaliert alle .quote-sheet via CSS zoom auf die verfügbare Breite des Containers.
   zoom (im Gegensatz zu transform) verändert die effektive Layout-Box → kein Leerraum unten. */
function applyQuoteSheetScale() {
  const wraps = document.querySelectorAll('[data-pages-wrap]');
  wraps.forEach(wrap => {
    const parent = wrap.parentElement;
    const cw = parent ? parent.clientWidth : 794;
    // Nur runterskalieren — nie hochskalieren über die echte Größe
    const scale = Math.min(1, Math.max(0.2, cw / 794));
    wrap.querySelectorAll('.quote-sheet').forEach(s => { s.style.zoom = scale; });
  });
}

// Bei Resize neu skalieren (debounced)
let _quoteScaleTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_quoteScaleTimer);
  _quoteScaleTimer = setTimeout(applyQuoteSheetScale, 80);
});

/* === Zoom / Pinch-Zoom === */
let _quotePreviewZoom = 1;
function applyQuoteZoom() {
  const wrap = document.getElementById('quotePreviewZoom');
  if (!wrap) return;
  wrap.style.transform = `scale(${_quotePreviewZoom})`;
  // Width gleichzeitig invertiert skalieren, damit der Container nicht horizontal scrollt
  // wenn Zoom < 1; bei Zoom > 1 erlauben wir Scroll.
  wrap.style.width = _quotePreviewZoom < 1 ? '100%' : `${100 / _quotePreviewZoom}%`;
  const lbl = document.getElementById('quoteZoomLabel');
  if (lbl) lbl.textContent = Math.round(_quotePreviewZoom * 100) + '%';
}
function zoomQuotePreview(delta) {
  if (delta === 0) { _quotePreviewZoom = 1; }
  else { _quotePreviewZoom = Math.max(0.5, Math.min(3, _quotePreviewZoom + delta)); }
  applyQuoteZoom();
}

// Pinch-Zoom auf Touch-Geräten innerhalb des Preview-Bereichs
function attachPinchZoom() {
  const scroll = document.getElementById('quotePreviewScroll');
  if (!scroll || scroll._pinchAttached) return;
  scroll._pinchAttached = true;
  let initialDist = 0;
  let initialZoom = 1;
  scroll.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      initialDist = Math.hypot(dx, dy);
      initialZoom = _quotePreviewZoom;
    }
  }, { passive: true });
  scroll.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && initialDist > 0) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const ratio = dist / initialDist;
      _quotePreviewZoom = Math.max(0.5, Math.min(3, initialZoom * ratio));
      applyQuoteZoom();
      e.preventDefault();
    }
  }, { passive: false });
  scroll.addEventListener('touchend', () => { initialDist = 0; });
}

/* === Echte PDF-Vorschau ===
   Nach dem HTML-Rendering werden alle .quote-sheet Elemente via html2canvas zu echten
   Bildern gemacht und ersetzt. Das ist exakt das, was im PDF landet — also wirklich eine
   PDF-Vorschau, kein HTML-Approximation. Eliminiert Mobile-Rendering-Bugs. */
let _quoteCanvasTimer = null;
let _quoteCanvasRunning = false;

function scheduleQuoteCanvasRefresh() {
  clearTimeout(_quoteCanvasTimer);
  // Während Layout-Anpassen-Modus kein Canvas-Capture — HTML-Sheets bleiben klickbar
  if (window._layoutAdjustActive) return;
  _quoteCanvasTimer = setTimeout(refreshQuoteCanvasPreview, 600);
}

async function refreshQuoteCanvasPreview() {
  // NEU: Generiert Canvases NUR — ersetzt nicht mehr das DOM.
  // HTML-Vorschau bleibt sichtbar. Canvases werden in window._quoteCanvases gecached
  // und vom PDF-Export gelesen.
  if (_quoteCanvasRunning) return;
  const target = document.getElementById('quotePreview');
  if (!target) return;
  const sheets = Array.from(target.querySelectorAll('.quote-sheet'));
  if (!sheets.length) return;
  _quoteCanvasRunning = true;

  // Loading-Badge
  let badge = target.querySelector('[data-canvas-loading]');
  if (!badge) {
    if (getComputedStyle(target).position === 'static') target.style.position = 'relative';
    badge = document.createElement('div');
    badge.setAttribute('data-canvas-loading', '');
    badge.style.cssText = 'position:absolute;top:8px;right:8px;background:rgba(15,23,42,0.85);color:#fff;font-size:10px;padding:4px 10px;border-radius:99px;z-index:50;font-family:Inter,sans-serif;display:flex;align-items:center;gap:6px;';
    badge.innerHTML = '<span style="width:10px;height:10px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:pdfspin 0.7s linear infinite;display:inline-block;"></span>PDF wird vorbereitet';
    target.appendChild(badge);
  }

  try {
    await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e) {} }

    const canvases = [];
    for (const sheet of sheets) {
      if (!sheet.parentNode) break;
      const origZoom = sheet.style.zoom;
      sheet.style.zoom = '1';
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      try {
        const c = await window.html2canvas(sheet, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#FFFFFF',
          logging: false,
          width: 794,
          height: 1123,
          windowWidth: 794,
        });
        canvases.push(c);
      } finally {
        if (sheet.parentNode) sheet.style.zoom = origZoom;
      }
    }
    window._quoteCanvases = canvases;
    // KEIN DOM-Replace mehr — HTML-Sheets bleiben sichtbar
  } catch (e) {
    console.error('Canvas-Generierung fehlgeschlagen:', e);
  } finally {
    _quoteCanvasRunning = false;
    const b = target.querySelector('[data-canvas-loading]');
    if (b && b.parentNode) b.remove();
  }
}

function onQuoteCustomerChange(value) {
  const cid = value || document.getElementById('qc_customer_value')?.value || '';
  const cache = window._quoteCustomerCache || {};
  const contacts = cache.contacts || [];
  // 1) Ansprechpartner-Combobox auf den neuen Kunden filtern
  const list = !cid ? [] : contacts.filter(c => (c.fields.customer_id || []).includes(cid));
  const items = list.map(c => ({
    id: c.id,
    label: contactDisplayName(c.fields),
    secondary: [c.fields.role, c.fields.email].filter(Boolean).join(' · ')
  }));
  _comboboxData['qc_contact'] = items;
  // Aktuelle Auswahl ggf. zurücksetzen, falls dieser Kontakt nicht mehr zum Kunden gehört
  const contactValueEl = document.getElementById('qc_contact_value');
  const contactSearchEl = document.getElementById('qc_contact_search');
  if (contactValueEl && !items.find(i => i.id === contactValueEl.value)) {
    contactValueEl.value = '';
    if (contactSearchEl) contactSearchEl.value = '';
  }
  // Hauptansprechpartner automatisch vorbelegen (überschreibt nur leere Auswahl)
  if (cid && contactValueEl && !contactValueEl.value) {
    const primaryId = findPrimaryContactId(contacts, cid, 'customer');
    if (primaryId) {
      const primaryItem = items.find(i => i.id === primaryId);
      if (primaryItem) {
        contactValueEl.value = primaryId;
        if (contactSearchEl) contactSearchEl.value = primaryItem.label;
      }
    }
  }
  // 2) Defaults aus Customer (nur wenn Felder leer; Select wird per Wert gesetzt)
  if (cid) {
    const cFields = cache.byId?.[cid] || {};
    const ptSel = document.querySelector('#modalBox select[name="payment_terms"]');
    if (ptSel && !ptSel.value) {
      const want = cFields.payment_terms || '14 Tage netto';
      const opt = Array.from(ptSel.options).find(o => o.value === want);
      if (opt) ptSel.value = want;
    }
    const dtSel = document.querySelector('#modalBox select[name="delivery_terms"]');
    if (dtSel && !dtSel.value) {
      const want = cFields.delivery_terms || 'EXW Fellbach';
      const opt = Array.from(dtSel.options).find(o => o.value === want);
      if (opt) dtSel.value = want;
    }
    // 3) Standardvorlagen mit aktuellem Kunden-Kontext nach-substituieren (sofern Felder noch leer)
    setTimeout(() => {
      applyDefaultTemplate('description', 'Einleitung');
      applyDefaultTemplate('notes', 'Schlusstext');
    }, 50);
    // 4) Adressen: bei Kundenwechsel auf Hauptadressen des neuen Kunden zurücksetzen
    const addresses = cache.addresses || [];
    const dlvEl = document.getElementById('qc_delivery_address_id');
    const invEl = document.getElementById('qc_invoice_address_id');
    if (dlvEl) dlvEl.value = findPrimaryAddressId(addresses, cid, 'delivery');
    if (invEl) invEl.value = findPrimaryAddressId(addresses, cid, 'billing');
    refreshQuoteAddressButton('delivery');
    refreshQuoteAddressButton('billing');
  } else {
    // Kein Kunde → Adressen leeren
    const dlvEl = document.getElementById('qc_delivery_address_id');
    const invEl = document.getElementById('qc_invoice_address_id');
    if (dlvEl) dlvEl.value = '';
    if (invEl) invEl.value = '';
    refreshQuoteAddressButton('delivery');
    refreshQuoteAddressButton('billing');
  }
}

function _formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

async function addAttachmentWithFile() {
  const cur = getCurrentCompany();
  const nameInp = document.getElementById('newAttName');
  const fileInp = document.getElementById('newAttFile');
  const name = (nameInp?.value || '').trim();
  const file = fileInp?.files?.[0];
  if (!name) return toast('Name fehlt', 'error');
  if (file && file.size > 5 * 1024 * 1024) return toast('Datei zu groß (max 5 MB)', 'error');
  try {
    const created = await writeData('Attachment', { name, company_id: [cur.id], status: 'aktiv' });
    if (file && created?.id) {
      toast('Datei wird hochgeladen …', 'info', 1500);
      await uploadFileToRecord(created.id, 'file', file);
    }
    if (nameInp) nameInp.value = '';
    if (fileInp) fileInp.value = '';
    toast('Angelegt' + (file ? ' + Datei hochgeladen' : ''), 'success');
    await openAttachmentManagement(_attMgmtModal2);
  } catch (err) { toast(err.message, 'error'); }
}

async function addAttachmentFile(attachmentId, inputEl) {
  const file = inputEl?.files?.[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) return toast('Datei zu groß (max 5 MB)', 'error');
  try {
    toast('Datei wird hochgeladen …', 'info', 1500);
    await uploadFileToRecord(attachmentId, 'file', file);
    toast('Datei hochgeladen', 'success');
    await openAttachmentManagement(_attMgmtModal2);
  } catch (err) { toast('Upload fehlgeschlagen: ' + err.message, 'error'); }
}

async function removeAttachmentFile(attachmentId, fileIndex) {
  if (!confirm('Diese Datei aus dem Anhang entfernen?')) return;
  try {
    const all = await readData('Attachment');
    const rec = all.find(r => r.id === attachmentId);
    const files = (rec?.fields?.file || []).slice();
    files.splice(fileIndex, 1);
    // Airtable braucht fürs Update das ganze Array minus die Datei mit { id } pro Eintrag
    const updatedFiles = files.map(f => ({ id: f.id }));
    await updateData('Attachment', attachmentId, { file: updatedFiles });
    toast('Datei entfernt', 'success');
    await openAttachmentManagement(_attMgmtModal2);
  } catch (err) { toast('Entfernen fehlgeschlagen: ' + err.message, 'error'); }
}

async function renameAttachment(id, currentName) {

  if (!trimmed) return toast('Name fehlt', 'error');

async function deleteAttachment(id) {

   ============================================================ */
function _loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (Array.from(document.scripts).some(s => s.src === src)) return resolve();
    const sc = document.createElement('script');
    sc.src = src;
    sc.onload = () => resolve();
    sc.onerror = () => reject(new Error('Script konnte nicht geladen werden: ' + src));
    document.head.appendChild(sc);
  });
}

function collectSelectedAttachments() {
  const ids = [];
  document.querySelectorAll('#modalBox input[data-attachment-id]:checked').forEach(el => {
    const id = el.getAttribute('data-attachment-id');
    if (id) ids.push(id);
  });
  return ids;
}

function _safeFilename(s) {
  return String(s || '').replace(/[^a-zA-Z0-9_.\- ]/g, '_').replace(/\s+/g, '_').replace(/_+/g, '_').slice(0, 80);
}

// Liefert das FLP-Logo als komplett selbst-tragendes inline SVG (ohne <use>-Verweis)
function flpLogoInlineSvg(heightPx) {
  const symbol = document.getElementById('flp-logo');
  const inner = symbol ? symbol.innerHTML : '';
  const viewBox = symbol?.getAttribute('viewBox') || '50.2 112.3 319.9 73.5';
  // CSS-Klassen .st0/.st1/.st2 aus dem Original-Logo inline einbetten,
  // damit das SVG auch isoliert (in PDF-Capture / off-screen) korrekt rendert.
  const styleBlock = `<style>.st0{fill:#007EAC;}.st1{fill:#575756;}.st2{fill:#F6F6F6;}</style>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" style="height:${heightPx}px;width:auto;display:block;">${styleBlock}${inner}</svg>`;
}

/* Logo-HTML für Quote-Header. Bevorzugt Company.logo (Airtable Attachment),
   fällt zurück auf das eingebaute FLP-SVG. */
function buildQuoteLogoHtml(company, heightPx) {
  const logo = (company?.logo || [])[0];
  if (logo && logo.url) {
    return `<img src="${escapeHtml(logo.url)}" crossorigin="anonymous" style="height:${heightPx}px;width:auto;display:block;margin-left:auto;" alt="Logo">`;
  }
  return flpLogoInlineSvg(heightPx);
}

      ${q.delivery_terms ? `<p class="pdf-terms"><strong>Lieferung:</strong> ${escapeHtml(q.delivery_terms)}</p>` : ''}
      ${q.payment_terms  ? `<p class="pdf-terms"><strong>Zahlungsbedingungen:</strong> ${escapeHtml(q.payment_terms)}</p>` : ''}
      ${closing ? `<div class="pdf-text" style="margin-top:22px;">${escapeHtml(closing)}</div>` : ''}
    </div>
  `;
}

async function exportQuoteAsPdf() {
  const previewEl = document.getElementById('quotePreview');
  if (!previewEl) {
    toast('Vorschau nicht gefunden — bitte Modal neu öffnen', 'error');
    return;
  }

  const ctx = await buildQuoteVariableContext();
  const customer = ctx.customer || {};
  const quoteNo = ctx.quote?.quote_no || 'Entwurf';
  const filename = _safeFilename('Angebot_' + quoteNo + (customer.name1 ? '_' + customer.name1 : '')) + '.pdf';

  // Mobile: Vorschau-Pane temporär aktivieren (sonst wurde sie nie gerendert) und Caches löschen.
  const pane = document.getElementById('quotePreviewPane');
  const wasMobileHidden = pane && pane.dataset.mobileHidden === 'true' &&
    window.matchMedia && window.matchMedia('(max-width: 1023px)').matches;
  if (wasMobileHidden) {
    pane.dataset.mobileShow = '1';
    window._quoteCanvases = null; // Cache invalidieren — Pane war vorher offscreen
  }

  // Frische Vorschau erzwingen (User könnte gerade etwas geändert haben — Debounce abwarten + neu rendern)
  try { await updateQuotePreview(); } catch(e) {}

  // Loading-Overlay (deckt nur visuell ab, die Vorschau bleibt im DOM gerendert)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:Inter,system-ui,sans-serif;font-size:14px;color:#0F172A;';
  overlay.innerHTML = `
    <div style="width:48px;height:48px;border:4px solid #E2E8F0;border-top-color:#1FA8D6;border-radius:50%;animation:pdfspin 0.8s linear infinite;"></div>
    <div style="font-weight:600;">PDF wird erstellt …</div>
    <style>@keyframes pdfspin{to{transform:rotate(360deg);}}</style>
  `;
  document.body.appendChild(overlay);

  try {
    await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js');

    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e) {} }

    // Schritt 1: Wenn noch keine Canvases gecached sind, jetzt explizit erzeugen
    if (!window._quoteCanvases || !window._quoteCanvases.length) {
      clearTimeout(_quoteCanvasTimer);
      // Sheets müssen vorhanden sein — falls nicht: paginatePreview hat noch nicht gelaufen
      const sheetsExist = previewEl.querySelectorAll('.quote-sheet').length > 0;
      if (!sheetsExist) {
        // Vorschau erst aufbauen (paginatePreview → HTML-Sheets)
        // updateQuotePreview wurde oben schon aufgerufen, aber paginatePreview könnte noch laufen
        await new Promise(r => setTimeout(r, 120));
      }
      await refreshQuoteCanvasPreview();
    }

    // PDF mit pdf-lib zusammenbauen
    const { PDFDocument, rgb, StandardFonts } = window.PDFLib;
    const pdfDoc = await PDFDocument.create();
    const A4_W = 595.28, A4_H = 841.89;

    const canvases = window._quoteCanvases || [];
    if (canvases.length) {
      for (const c of canvases) {
        const imgData = c.toDataURL('image/png');
        const pngImg = await pdfDoc.embedPng(imgData);
        const page = pdfDoc.addPage([A4_W, A4_H]);
        page.drawImage(pngImg, { x: 0, y: 0, width: A4_W, height: A4_H });
      }
    } else {
      // Letzter Fallback: ganzen Preview-Container capturen (gestreckte Page)
      const canvas = await window.html2canvas(previewEl, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#FFFFFF', logging: false, width: previewEl.scrollWidth, height: previewEl.scrollHeight });
      const imgData = canvas.toDataURL('image/png');
      const pngImg = await pdfDoc.embedPng(imgData);
      const widthScale = A4_W / pngImg.width;
      const drawH = pngImg.height * widthScale;
      const pageH = Math.max(A4_H, drawH);
      const page = pdfDoc.addPage([A4_W, pageH]);
      page.drawImage(pngImg, { x: 0, y: pageH - drawH, width: A4_W, height: drawH });
    }

    // Anhang-Liste als separate Seite (falls Anhänge ausgewählt)
    const attIds = collectSelectedAttachments();
    if (attIds.length) {
      try {
        const all = await readData('Attachment');
        const sel = all.filter(r => attIds.includes(r.id));
        if (sel.length) {
          const attPage = pdfDoc.addPage([A4_W, A4_H]);
          const helvetica  = await pdfDoc.embedFont(StandardFonts.Helvetica);
          const helvBold   = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
          const margin = 56;
          let y = A4_H - margin - 18;
          attPage.drawText('Anhänge zum Angebot', { x: margin, y, size: 16, font: helvBold, color: rgb(0.06, 0.09, 0.16) });
          y -= 28;
          for (const s of sel) {
            const cnt = (s.fields.file || []).length;
            const txt = '• ' + (s.fields.name || '–') + (cnt ? ' (' + cnt + ' Datei' + (cnt === 1 ? '' : 'en') + ')' : '');
            attPage.drawText(txt, { x: margin, y, size: 11, font: helvetica, color: rgb(0.06, 0.09, 0.16) });
            y -= 18;
            if (y < margin + 24) break;
          }
          y -= 10;
          attPage.drawText('Diese Dateien sind dieser E-Mail beigefügt.', {
            x: margin, y, size: 9, font: helvetica, color: rgb(0.55, 0.55, 0.55),
          });
        }
      } catch (e) { console.warn('Anhang-Seite fehlgeschlagen:', e); }
    }

    pdfDoc.setTitle('Angebot ' + quoteNo);
    pdfDoc.setAuthor((window._quoteCompanyCache || {}).name || 'FLP Lift Parts GmbH');
    pdfDoc.setCreationDate(new Date());

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    toast('PDF erstellt: ' + filename, 'success', 3000);
  } catch (err) {
    console.error('PDF-Erstellung fehlgeschlagen:', err);
    toast('PDF-Erstellung fehlgeschlagen: ' + (err.message || err), 'error', 5000);
  } finally {
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    // Mobile: Pane wieder offscreen verstecken
    if (wasMobileHidden && pane) {
      delete pane.dataset.mobileShow;
      window._quoteCanvases = null;
    }
  }
}

/* E-Mail vorbereiten — öffnet mailto:-Link mit Empfänger + vorgefülltem Subject + Body. PDF muss vorher heruntergeladen sein. */
// Hilfsfunktion: PDF als Blob erzeugen (nutzt gecachte Canvases aus der Vorschau).
async function buildQuotePdfBlob() {
  await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js');
  if (!window._quoteCanvases || !window._quoteCanvases.length) {
    // Vorschau erst aufbauen
    clearTimeout(_quoteCanvasTimer);
    await refreshQuoteCanvasPreview();
  }
  const canvases = window._quoteCanvases || [];
  if (!canvases.length) return null;
  const { PDFDocument } = window.PDFLib;
  const pdfDoc = await PDFDocument.create();
  const A4_W = 595.28, A4_H = 841.89;
  for (const c of canvases) {
    const imgData = c.toDataURL('image/png');
    const png = await pdfDoc.embedPng(imgData);
    const page = pdfDoc.addPage([A4_W, A4_H]);
    page.drawImage(png, { x: 0, y: 0, width: A4_W, height: A4_H });
  }
  const bytes = await pdfDoc.save();
  return new Blob([bytes], { type: 'application/pdf' });
}

async function emailQuote() {
  const ctx = await buildQuoteVariableContext();
  const customer = ctx.customer || {};
  const contact  = ctx.contact  || {};
  const quote    = ctx.quote    || {};
  const recipient = contact.email || customer.email || '';
  const quoteNo = quote.quote_no || '';
  const datum   = formatDeDate(quote.date) || '';
  const sal = (() => { const g = contact?.gender; return g === 'männlich' ? 'Sehr geehrter Herr ' : g === 'weiblich' ? 'Sehr geehrte Frau ' : 'Sehr geehrte Damen und Herren'; })();
  const greeting = (sal.trim() === 'Sehr geehrte Damen und Herren') ? sal : sal + (contact.last_name || '');
  const company = (window._quoteCompanyCache || {}).name || 'FLP';
  const subject = `Angebot ${quoteNo} vom ${datum}`;
  const body = `${greeting},\n\nanbei senden wir Ihnen unser Angebot ${quoteNo} vom ${datum} als PDF.\n\nFür Rückfragen stehen wir jederzeit zur Verfügung.\n\nMit freundlichen Grüßen\n${company}`;

  toast('PDF wird erstellt …', 'info', 1500);

  let blob = null;
  try { blob = await buildQuotePdfBlob(); } catch(e) { console.error(e); }

  // Web Share API (mobile + manche Desktop-Browser): PDF als Anhang teilen.
  // Öffnet die System-Share-Sheet inkl. Mail-App mit Datei dran.
  if (blob && navigator.canShare && navigator.share) {
    const fileName = _safeFilename('Angebot_' + (quoteNo || 'Entwurf') + (customer.name1 ? '_' + customer.name1 : '')) + '.pdf';
    const file = new File([blob], fileName, { type: 'application/pdf' });
    try {
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: subject,
          text: body,
        });
        return; // erfolgreich geteilt
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return; // User hat Share abgebrochen
      // sonst Fallback unten
    }
  }

  // Fallback: PDF herunterladen + mailto öffnen mit Hinweis
  if (blob) {
    const fileName = _safeFilename('Angebot_' + (quoteNo || 'Entwurf') + (customer.name1 ? '_' + customer.name1 : '')) + '.pdf';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }
  const bodyWithNote = body + '\n\nP.S. Bitte das soeben heruntergeladene PDF dieser E-Mail anhängen.';
  const url = 'mailto:' + encodeURIComponent(recipient) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(bodyWithNote);
  window.location.href = url;
}
