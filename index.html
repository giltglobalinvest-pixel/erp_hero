function quoteItemRow(quoteId, it) {
  const f = it.fields || {};
  const internalMode = !!window._quoteInternalMode;
  const lineNet = calcLineNet(f.qty, f.unit_price_net, f.discount_pct);
  // HTML aus Quill-Editor sauber als Text rendern (erste nicht-leere Zeile)
  const split = splitDescriptionTitleAndBody(f.description || '');
  const desc = split.title || '–';
  const ek = +(f.purchase_price || 0);
  const lineEk = (+(f.qty || 0)) * ek;
  const margin = lineNet - lineEk;
  const grossLine = (+(f.qty || 0)) * (+(f.unit_price_net || 0));
  const discAbs = grossLine * ((+(f.discount_pct || 0)) / 100);
  const meta = [
    (f.qty || 0) + (f.unit ? ' ' + f.unit : ''),
    '× ' + formatPrice(f.unit_price_net || 0) + ' €',
    discAbs > 0 ? 'Rabatt: −' + formatPrice(discAbs) + ' €' : '',
    'MwSt ' + (f.vat_rate || 0) + '%'
  ].filter(Boolean).join(' · ');
  const internalLine = internalMode
    ? `<p class="text-xs text-amber-700 mt-1 font-mono">EK: ${formatPrice(ek)} € · Zeile-EK: ${formatPrice(lineEk)} € · Marge: <span class="${margin >= 0 ? 'text-emerald-700' : 'text-red-700'} font-semibold">${formatPrice(margin)} €</span></p>`
    : '';
  return `
    <div class="p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0 flex-1">
          <div class="flex items-baseline gap-2">
            <span class="text-xs font-mono text-ink-500">Pos. ${f.pos || '?'}</span>
            <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(desc)}</p>
          </div>
          <p class="text-xs text-ink-500 mt-1 font-mono">${escapeHtml(meta)}</p>
          ${internalLine}
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="font-mono text-sm tabular-nums text-ink-900">${formatPrice(lineNet)} €</span>
          <button type="button" onclick="showQuoteItemInlineForm('${quoteId}','${it.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
            <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
          </button>
          <button type="button" onclick="deleteQuoteItemInline('${quoteId}','${it.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
    </div>
  `;
}

async function _silentSaveQuoteHeader() {
  // Speichert den Quote-Header still im Hintergrund und gibt die neue ID zurück.
  const cur = getCurrentCompany();
  if (!cur) return null;
  const form = document.querySelector('#modalBox form');
  if (!form) return null;
  const fd = new FormData(form);
  const fields = {};
  ['quote_no','description','date','valid_until','status','payment_terms','delivery_terms','notes','quote_title','layout_variant','bundle_id','delivery_address_id','invoice_address_id'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  fields.customer_id = cidSel ? [cidSel] : [];
  fields.contact_id  = conSel ? [conSel] : [];
  fields.status = fields.status || 'Entwurf';
  fields.company_id = [cur.id];
  const introTpl   = (fd.get('intro_template_id') || '').trim();
  const closingTpl = (fd.get('closing_template_id') || '').trim();
  const titleTpl   = (fd.get('title_template_id')  || '').trim();
  if (introTpl)   fields.intro_template_id   = [introTpl];
  if (closingTpl) fields.closing_template_id = [closingTpl];
  if (titleTpl)   fields.title_template_id   = titleTpl;
  const cv = collectCustomValues();
  if (Object.keys(cv).length) fields.custom_values = JSON.stringify(cv);
  try {
    const created = await writeData('Quote', fields);
    return created.id;
  } catch (err) {
    toast(err.message, 'error');
    return null;
  }
}

async function showQuoteItemInlineForm(quoteId, itemId) {
  if (document.querySelector('#qiFormWrap [data-qi-form]')) return;
  // Auto-Save bei neuem Angebot: Header still im Hintergrund speichern, ohne Modal zu schließen
  if (!quoteId) {
    const newId = await _silentSaveQuoteHeader();
    if (!newId) return;
    quoteId = newId;
    window._currentQuoteIdInModal = newId;
    // Items-Wrap mit der neuen ID neu rendern, damit Buttons die richtige ID haben
    const wrap = document.getElementById('quoteItemsWrap');
    if (wrap) {
      wrap.innerHTML = renderQuoteItems(newId, []);
      if (window.lucide) lucide.createIcons();
    }
    toast('Angebot ' + (document.querySelector('#modalBox input[name="quote_no"]')?.value || '') + ' angelegt', 'success', 1500);
  }
  const cur = getCurrentCompany();
  let f = {};
  try {
    if (itemId) {
      const all = await readData('QuoteItem');
      f = all.find(r => r.id === itemId)?.fields || {};
    } else {
      // Default: nächste Position berechnen
      const all = await readData('QuoteItem');
      const peers = all.filter(r => (r.fields.quote_id || []).includes(quoteId));
      const maxPos = peers.reduce((m, r) => Math.max(m, +(r.fields.pos || 0)), 0);

    <div data-qi-form data-fid="${fid}" class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-3 sm:p-4 space-y-3">
      <p class="text-sm font-semibold text-brand-700">${itemId ? 'Position bearbeiten' : 'Neue Position'}</p>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-2">
        <div class="lg:col-span-1">

        </div>
        <div class="lg:col-span-2">
          <label class="block text-xs font-medium text-ink-700 mb-1">Artikel (suchen oder leer = freie Position)</label>

      <div>

        <input type="hidden" id="${fid}_description" name="${fid}_description_hidden" value="${escapeHtml(f.description || '')}">
        <div id="${fid}_description_editor" class="bg-white border border-ink-200 rounded-lg" style="min-height:120px;"></div>
      </div>

          </select>
        </div>

      if (initial) {

          q.root.innerHTML = initial;

// Wird vom Article-Combobox aufgerufen (value, comboboxId)
function onQiArticleChange(value, comboboxId) {
  const articleId = value || '';
  const fid = (comboboxId || '').replace(/_article$/, '');
  // Lieferanten-Picker neu befüllen aus Cache
  const supSel = document.getElementById(fid + '_supplier');
  if (supSel) {
    const list = (window._qiArticleSupplierCache || {})[articleId] || [];
    supSel.innerHTML = '<option value="">— kein Lieferant —</option>' +
      list.map(s => `<option value="${s.supplierId}" data-ek="${s.ek}" ${s.isDefault ? 'selected' : ''}>${s.isDefault ? '★ ' : ''}${escapeHtml(s.supplierName)}${s.supplierNo ? ' (' + escapeHtml(s.supplierNo) + ')' : ''}</option>`).join('');
    // Wenn Default-Lieferant existiert: EK-Preis übernehmen
    const def = list.find(s => s.isDefault);
    if (def) {
      const ekEl = document.getElementById(fid + '_purchase_price');
      if (ekEl) ekEl.value = def.ek;
    }
  }
  if (!articleId) return;
  const a = (window._qiArticleCacheById || {})[articleId];
  if (!a) return;
  const descEl = document.getElementById(fid + '_description');
  const quill  = (window._qiQuillByFid || {})[fid];
  // Quill als Wahrheit nehmen — leer-Test = nur "<p><br></p>" oder garnix
  const isEmpty = (() => {
    if (quill) {
      const txt = (quill.getText() || '').replace(/\s/g, '');
      return !txt;
    }
    return !(descEl?.value || '').trim();
  })();
  if (isEmpty) {
    // Layout: Erste Zeile = name1 (fett, automatisch). name2 + Hersteller-Artikelnr werden
    // im Render aus Article-Daten ergänzt (kursiv). Description-Body folgt darunter.
    const titleLine = (a.name1 || '').trim();
    const descRest  = (a.desc || '').trim();
    if (quill) {
      const titleHtml = titleLine ? `<p>${escapeHtml(titleLine)}</p>` : '';
      const bodyHtml  = descRest
        ? descRest.split('\n').map(l => `<p>${escapeHtml(l) || '<br>'}</p>`).join('')
        : '';
      quill.root.innerHTML = titleHtml + bodyHtml;
      if (descEl) descEl.value = quill.root.innerHTML;
    } else if (descEl) {
      descEl.value = [titleLine, descRest].filter(Boolean).join('\n');
    }
  }
  const priceEl = document.getElementById(fid + '_unit_price_net');
  if (priceEl) priceEl.value = a.price;
  const unitEl = document.getElementById(fid + '_unit');
  if (unitEl) unitEl.value = a.unit;
  const vatEl = document.getElementById(fid + '_vat_rate');
  if (vatEl) vatEl.value = a.vat;
  recalcQiPreview(fid);
}

// Lieferanten-Wahl: EK-Preis aus dem ausgewählten Optionseintrag übernehmen
function onQiSupplierChange(fid) {
  const supSel = document.getElementById(fid + '_supplier');
  if (!supSel) return;
  const opt = supSel.options[supSel.selectedIndex];
  const ek = opt?.getAttribute('data-ek');
  if (ek !== null && ek !== undefined && ek !== '') {
    const ekEl = document.getElementById(fid + '_purchase_price');
    if (ekEl) ekEl.value = ek;
  }
}

function recalcQiPreview(fid) {
  const qty   = parseDecimal(document.getElementById(fid + '_qty')?.value);
  const price = parseDecimal(document.getElementById(fid + '_unit_price_net')?.value);
  const disc  = parseDecimal(document.getElementById(fid + '_discount_pct')?.value);
  const net = calcLineNet(qty, price, disc);
  const el = document.getElementById(fid + '_preview');
  if (el) el.textContent = formatPrice(net) + ' €';
}

async function saveQuoteItemInline(quoteId, itemId) {
  const fid = 'qif_' + (itemId || 'new');
  const $v = id => (document.getElementById(fid + '_' + id)?.value || '').trim();
  // Combobox: value-Element heißt jetzt fid + '_article_value'
  const articleId = document.getElementById(fid + '_article_value')?.value || '';
  let desc = $v('description');
  // Quill liefert "<p><br></p>" als leeren Wert — als leer behandeln
  const split = splitDescriptionTitleAndBody(desc);
  if (!split.title) return toast('Beschreibung fehlt', 'error');
  // Wenn der HTML-Inhalt nur eine leere "<p><br></p>"-Zeile ist: als leer speichern, sonst wie eingegeben
  if (!split.title && !(split.bodyText || split.bodyHtml)) desc = '';
  const pos = parseInt($v('pos'), 10) || 1;
  const qty = parseDecimal($v('qty')) || 0;
  const price = parseDecimal($v('unit_price_net')) || 0;
  const disc = parseDecimal($v('discount_pct')) || 0;
  const vat = parseDecimal($v('vat_rate')) || 0;
  const fields = {
    pos, qty,
    unit:           $v('unit'),
    unit_price_net: price,
    discount_pct:   disc,
    vat_rate:       vat,
    description:    desc,
    line_total_net: calcLineNet(qty, price, disc),
    label:          'Pos.' + pos + ' · ' + (split.title || '').substring(0, 50)
  };
  fields.article_id = articleId ? [articleId] : [];
  // Lieferant + EK-Preis (Snapshot)
  const supplierId = document.getElementById(fid + '_supplier')?.value || '';
  fields.supplier_id = supplierId ? [supplierId] : [];
  const ek = parseDecimal($v('purchase_price'));
  if (ek !== null) fields.purchase_price = ek;
  if (!itemId) fields.quote_id = [quoteId];
  try {
    if (itemId) await updateData('QuoteItem', itemId, fields);
    else        await writeData('QuoteItem', fields);
    document.getElementById('qiFormWrap').innerHTML = '';
    document.getElementById('addQiBtn')?.classList.remove('hidden');
    await refreshQuoteItemsSection(quoteId);
    toast('Position gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteQuoteItemInline(quoteId, itemId) {
  if (!confirm('Diese Position wirklich löschen?')) return;
  try {
    await deleteData('QuoteItem', itemId);
    await refreshQuoteItemsSection(quoteId);
    toast('Position gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshQuoteItemsSection(quoteId) {
  const wrap = document.getElementById('quoteItemsWrap');
  if (!wrap) return;
  try {
    const all = await readData('QuoteItem');
    const items = all.filter(it => (it.fields.quote_id || []).includes(quoteId));
    wrap.innerHTML = renderQuoteItems(quoteId, items);
    const sumsEl = document.getElementById('quoteSums');
    if (sumsEl) sumsEl.innerHTML = quoteSumsHtml(calcQuoteSums(items));
    if (window.lucide) lucide.createIcons();
    // Live-Vorschau ebenfalls aktualisieren
    updateQuotePreview();
  } catch (e) { toast(e.message, 'error'); }
}

let _pendingPostQuoteAction = null;

async function saveQuote(e, id, keepOpen) {
  if (e && e.preventDefault) e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Falls inzwischen ein Silent-Save passiert ist, Tracking-Global hat Vorrang
  if (!id && window._currentQuoteIdInModal) id = window._currentQuoteIdInModal;
  const form = e?.target?.tagName === 'FORM' ? e.target : (e?.target?.closest?.('form') || document.querySelector('#modalBox form'));
  if (!form) return;
  const fd = new FormData(form);
  const fields = {};
  ['quote_no','description','date','valid_until','status','payment_terms','delivery_terms','notes','quote_title','layout_variant','bundle_id','layout_offsets','delivery_address_id','invoice_address_id'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  fields.force_closing_new_page = fd.get('force_closing_new_page') === 'on';
  // Template-IDs (für persistente Auswahl beim Wieder-Öffnen)
  const introTpl   = (fd.get('intro_template_id') || '').trim();
  const closingTpl = (fd.get('closing_template_id') || '').trim();
  const titleTpl   = (fd.get('title_template_id')  || '').trim();
  fields.intro_template_id   = introTpl   ? [introTpl]   : [];
  fields.closing_template_id = closingTpl ? [closingTpl] : [];
  fields.title_template_id   = titleTpl;  // singleLineText, kein Array
  // Individuelle Felder als JSON
  const cv = collectCustomValues();
  fields.custom_values = Object.keys(cv).length ? JSON.stringify(cv) : '';
  // Anhang-Auswahl
  fields.attachment_ids = collectSelectedAttachments();
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  fields.customer_id = cidSel ? [cidSel] : [];
  fields.contact_id  = conSel ? [conSel] : [];
  fields.status = fields.status || 'Entwurf';
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }

  // Summen aus aktuellen Positionen
  if (id) {
    try {
      const all = await readData('QuoteItem');
      const items = all.filter(it => (it.fields.quote_id || []).includes(id));
      const sums = calcQuoteSums(items);
      fields.subtotal_net = sums.subtotal_net;
      fields.vat_total    = sums.vat_total;
      fields.total_gross  = sums.total_gross;
    } catch (e) {}
  }
  try {
    let savedId = id;
    if (id) {
      await updateData('Quote', id, fields);
    } else {
      const created = await writeData('Quote', fields);
      savedId = created.id;
    }
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    window._currentQuoteIdInModal = savedId;
    if (keepOpen) {
      toast('Gespeichert', 'success');
      // Modal NICHT schließen — Inhalt direkt mit aktualisierter ID neu rendern (Backdrop bleibt sichtbar)
      await openQuoteModal(savedId);
      if (_pendingPostQuoteAction) {
        const act = _pendingPostQuoteAction;
        _pendingPostQuoteAction = null;
        setTimeout(act, 100);
      }
    } else {
      closeModal();
      renderQuotes();
      toast('Gespeichert', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

function renderArticleSuppliers(articleId, junctions) {

  const sorted = [...junctions].sort((a, b) => {
    const ap = a.fields.is_default ? 0 : 1;
    const bp = b.fields.is_default ? 0 : 1;

    return 0;
  });
  const list = sorted.length === 0
    ? '<p class="text-xs text-ink-500 italic px-3 py-2">Noch keine Lieferanten zugeordnet.</p>'

    supplier_id:    [supId],
    delivery_time:  (document.getElementById(fid + '_delivery_time')?.value || '').trim(),
    order_text:     orderText,
    is_default:     document.getElementById(fid + '_is_default')?.checked || false
  };
  if (purchase !== null) fields.purchase_price = purchase;
  if (!junctionId) {
    fields.article_id = [articleId];
    const supName = APP_KEYS.suppliersById?.[supId]?.name1 || '?';
    fields.label = supName; // Primary-Feld: nur als Label sichtbar in Airtable
  }

  try {
    if (fields.is_default) {
      const all = await readData('ArticleSupplier');
      const others = all.filter(j =>
        (j.fields.article_id || []).includes(articleId) &&
        j.fields.is_default &&
        j.id !== junctionId
      );
      for (const o of others) await updateData('ArticleSupplier', o.id, { is_default: false });
    }
    if (junctionId) await updateData('ArticleSupplier', junctionId, fields);
    else            await writeData('ArticleSupplier', fields);
    document.getElementById('artSupplierFormWrap').innerHTML = '';
    document.getElementById('addArtSupplierBtn')?.classList.remove('hidden');
    await refreshArticleSuppliersSection(articleId);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteArticleSupplierInline(articleId, junctionId) {
  if (!confirm('Diesen Lieferant-Eintrag wirklich löschen?')) return;
  try {
    await deleteData('ArticleSupplier', junctionId);
    await refreshArticleSuppliersSection(articleId);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshArticleSuppliersSection(articleId) {
  const wrap = document.getElementById('articleSuppliersWrap');
  if (!wrap) return;
  try {
    const all = await readData('ArticleSupplier');
    const junctions = all.filter(j => (j.fields.article_id || []).includes(articleId));
    wrap.innerHTML = renderArticleSuppliers(articleId, junctions);
    if (window.lucide) lucide.createIcons();

let _lookupMgmtUseModal2 = false;

// Generischer Helper – funktioniert für Category + Manufacturer
async function openLookupManagement(table, articleField, titleSing, titlePlur, useModal2 = false) {
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  _lookupMgmtUseModal2 = useModal2;
  await renderLookupManagement(table, articleField, titleSing, titlePlur);
}

async function renderLookupManagement(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  let all = [], allArticles = [];
  try {
    [all, allArticles] = await Promise.all([readData(table), readData('Article')]);
  } catch (e) { toast(e.message, 'error'); return; }

  const list = all
    .filter(r => (r.fields.company_id || []).includes(cur.id))
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));

  const usage = {};
  allArticles.forEach(a => {
    if (!(a.fields.company_id || []).includes(cur.id)) return;
    (a.fields[articleField] || []).forEach(rid => { usage[rid] = (usage[rid] || 0) + 1; });
  });

  const rows = list.length === 0
    ? `<p class="px-3 py-4 text-sm text-ink-500 italic text-center">Noch keine ${escapeHtml(titlePlur)} für diesen Mandanten.</p>`
    : list.map(r => {
        const count = usage[r.id] || 0;
        const safeName = (r.fields.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
          <div class="flex items-center justify-between p-3 border-b border-ink-100 last:border-b-0">
            <div class="flex-1 min-w-0">
              <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(r.fields.name || '–')}</p>
              <p class="text-xs text-ink-500">${count} Artikel</p>
            </div>
            <div class="flex gap-1 shrink-0">
              <button type="button" onclick="renameLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}','${safeName}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-ink-100 rounded" title="Umbenennen"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
              <button type="button" onclick="deleteLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}', ${count})" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-ink-100 rounded" title="Löschen"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        `;
      }).join('');

  const html = `
    <div class="p-6">
      <div class="flex items-baseline justify-between mb-4">
        <h3 class="text-lg font-bold text-ink-900">${escapeHtml(titlePlur)} verwalten</h3>
        <span class="text-xs text-ink-500">${escapeHtml(cur.name)}</span>
      </div>
      <div class="bg-white border border-ink-200 rounded-lg overflow-hidden mb-4 max-h-72 overflow-y-auto">
        ${rows}
      </div>
      <div class="flex gap-2">
        <input id="newLookupName" type="text" placeholder="Neuer ${escapeHtml(titleSing)}…" onkeydown="if(event.key==='Enter'){event.preventDefault();addLookup('${table}','${articleField}','${titleSing}','${titlePlur}')}" class="flex-1 px-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        <button type="button" onclick="addLookup('${table}','${articleField}','${titleSing}','${titlePlur}')" class="px-3 py-2 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600 flex items-center gap-1.5">
          <i data-lucide="plus" class="w-4 h-4"></i> Hinzufügen
        </button>
      </div>
      <div class="flex justify-end mt-5">
        <button type="button" onclick="${_lookupMgmtUseModal2 ? 'closeModal2()' : 'closeModal()'}" class="px-3 py-2 text-sm rounded-lg border border-ink-200 hover:bg-ink-50">Schließen</button>
      </div>
    </div>
  `;
  if (_lookupMgmtUseModal2) openModal2(html); else openModal(html);
  setTimeout(() => document.getElementById('newLookupName')?.focus(), 50);
}

async function addLookup(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  const input = document.getElementById('newLookupName');
  const name = (input?.value || '').trim();
  if (!name) return toast('Name fehlt', 'error');
  try {
    await writeData(table, { name, company_id: [cur.id], status: 'aktiv' });
    if (input) input.value = '';
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' angelegt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function renameLookup(table, articleField, titleSing, titlePlur, id, currentName) {
  const newName = prompt(titleSing + ' umbenennen:', currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed) return toast('Name fehlt', 'error');
  try {
    await updateData(table, id, { name: trimmed });
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast('Umbenannt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteLookup(table, articleField, titleSing, titlePlur, id, articleCount) {
  if (articleCount > 0) {
    if (!confirm(`Wird von ${articleCount} Artikel${articleCount===1?'':'n'} verwendet. Beim Löschen wird die Zuordnung dort entfernt — die Artikel selbst bleiben. Wirklich löschen?`)) return;
  } else {
    if (!confirm('Wirklich löschen?')) return;
  }
  try {
    await deleteData(table, id);
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

// Aktualisiert ein Dropdown im darunterliegenden Article-Modal nach Lookup-Änderung
async function refreshArticleModalLookupDropdown(fieldName) {
  const select = document.querySelector('#modalBox select[name="' + fieldName + '"]');
  if (!select) return;
  const cur = getCurrentCompany();
  if (!cur) return;
  const table = fieldName === 'category_id' ? 'Category' : 'Manufacturer';
  let all = [];
  try { all = await readData(table); } catch (e) { return; }
  const items = all
    .filter(r => (r.fields.company_id || []).includes(cur.id) && (r.fields.status || 'aktiv') === 'aktiv')
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));
  const currentValue = select.value;
  const placeholder = fieldName === 'category_id' ? '— ohne Kategorie —' : '— ohne Hersteller —';
  select.innerHTML = `<option value="">${placeholder}</option>` +
    items.map(r => `<option value="${r.id}" ${currentValue === r.id ? 'selected' : ''}>${escapeHtml(r.fields.name || '–')}</option>`).join('');
}

function openCategoryManagement(useModal2 = false)     { return openLookupManagement('Category',     'category_id',     'Kategorie',  'Kategorien',  useModal2); }

function renderEntityContacts(entity, entityId, contacts) {
  if (!entityId) {
    const word = entity === 'supplier' ? 'Lieferanten' : 'Kunden';
    return `<p class="text-xs text-ink-500 italic px-3 py-2 bg-ink-50 rounded-lg">Speichere zuerst den ${word} — danach kannst du Ansprechpartner hinzufügen.</p>`;
  }
  const sorted = [...contacts].sort((a, b) => {
    const ap = a.fields.is_primary ? 0 : 1;
    const bp = b.fields.is_primary ? 0 : 1;
    if (ap !== bp) return ap - bp;
    const an = (a.fields.last_name || a.fields.name || '').toLowerCase();
    const bn = (b.fields.last_name || b.fields.name || '').toLowerCase();
    return an.localeCompare(bn, 'de');
  });
  const list = sorted.length === 0
    ? '<p id="contactsEmpty" class="text-xs text-ink-500 italic px-3 py-2">Noch keine Ansprechpartner.</p>'
    : '<div id="contactsList" class="space-y-2">' + sorted.map(c => `<div data-contact-row="${c.id}">${contactRow(entity, entityId, c)}</div>`).join('') + '</div>';
  return `
    ${list}
    <div id="contactInlineFormWrap" class="mt-2"></div>
    <button id="addContactBtn" type="button" onclick="showContactInlineForm('${entity}','${entityId}')" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1.5 mt-3">
      <i data-lucide="plus" class="w-4 h-4"></i> Ansprechpartner hinzufügen
    </button>
  `;
}

function contactDisplayName(f) {
  const full = [f.first_name, f.last_name].filter(Boolean).join(' ');
  return full || f.name || '–';
}

// Sucht den Hauptansprechpartner eines Kunden / Lieferanten.
// `entity` ist 'customer' oder 'supplier'. Gibt Contact-Record-ID zurück oder ''.
function findPrimaryContactId(contacts, entityId, entity = 'customer') {
  if (!entityId || !Array.isArray(contacts)) return '';
  const linkField = entity + '_id';
  const peers = contacts.filter(c => (c.fields[linkField] || []).includes(entityId));
  if (peers.length === 0) return '';
  const primary = peers.find(c => c.fields.is_primary);
  if (primary) return primary.id;
  // Fallback: einziger Kontakt → automatisch wählen
  if (peers.length === 1) return peers[0].id;
  return '';
}

function contactSalutation(f) {
  if (f.gender === 'männlich') return 'Herr';
  if (f.gender === 'weiblich') return 'Frau';
  return '';
}

function contactRow(entity, entityId, c) {
  const f = c.fields || {};
  const summary = [f.email, f.phone, f.mobile].filter(Boolean).join(' · ');
  const sal = contactSalutation(f);
  return `
    <div class="flex items-center justify-between p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.is_primary ? '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-500" style="fill:currentColor"></i>' : ''}
          <p class="font-medium text-ink-900 text-sm truncate">${sal ? escapeHtml(sal) + ' ' : ''}${escapeHtml(contactDisplayName(f))}</p>
          ${f.role ? `<span class="text-xs text-ink-500">· ${escapeHtml(f.role)}</span>` : ''}
        </div>
        ${summary ? `<p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(summary)}</p>` : ''}
      </div>
      <div class="flex gap-1 shrink-0 ml-2">
        <button type="button" onclick="showContactInlineForm('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
          <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
        </button>
        <button type="button" onclick="deleteContactInline('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>
  `;
}

async function showContactInlineForm(entity, entityId, contactId) {
  // Verhindern dass beim Bearbeiten ein zweites Formular auftaucht
  if (document.querySelector('#contactInlineFormWrap [data-contact-form]')) return;

  const linkField = entity + '_id';
  let f = {};
  let othersExist = false;
  try {
    const all = await readData('Contact');
    if (contactId) f = all.find(r => r.id === contactId)?.fields || {};
    const peers = all.filter(c => (c.fields[linkField] || []).includes(entityId) && c.id !== contactId);
    othersExist = peers.length > 0;
    if (!contactId && !peers.some(c => c.fields.is_primary)) f.is_primary = true;
  } catch (e) {}

  // Legacy-name in Vor-/Nachname splitten
  let firstName = f.first_name || '';
  let lastName  = f.last_name  || '';
  if (!firstName && !lastName && f.name) {
    const parts = String(f.name).trim().split(/\s+/);
    if (parts.length === 1) lastName = parts[0];
    else { firstName = parts.shift(); lastName = parts.join(' '); }
  }
  const gender = f.gender || '';
  const fid = 'cif_' + (contactId || 'new');

  // Bearbeitete Zeile temporär ausblenden
  if (contactId) {
    const row = document.querySelector(`[data-contact-row="${contactId}"]`);
    if (row) row.classList.add('hidden');
  }
  document.getElementById('addContactBtn')?.classList.add('hidden');

  document.getElementById('contactInlineFormWrap').innerHTML = `
    <div data-contact-form class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-4 space-y-3"
         onkeydown="if(event.key==='Enter'&&event.target.tagName!=='TEXTAREA'){event.preventDefault();saveContactInline('${entity}','${entityId}','${contactId || ''}')}">
      <p class="text-sm font-semibold text-brand-700">${contactId ? 'Ansprechpartner bearbeiten' : 'Neuer Ansprechpartner'}</p>

      <div>
        <span class="block text-xs font-medium text-ink-700 mb-1">Geschlecht</span>
        <div class="flex gap-2">
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='männlich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="männlich" ${gender==='männlich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">männlich</span>
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='weiblich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="weiblich" ${gender==='weiblich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">weiblich</span>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Vorname</label>
          <input id="${fid}_first_name" value="${escapeHtml(firstName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Nachname <span class="text-red-500">*</span></label>
          <input id="${fid}_last_name" value="${escapeHtml(lastName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Funktion / Position</label>
        <input id="${fid}_role" value="${escapeHtml(f.role || '')}" placeholder="z.B. Geschäftsführung, Einkauf, Buchhaltung" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">E-Mail</label>
        <input id="${fid}_email" type="email" value="${escapeHtml(f.email || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Telefon</label>
          <input id="${fid}_phone" value="${escapeHtml(f.phone || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>

          <label class="block text-xs font-medium text-ink-700 mb-1">Mobil</label>
          <input id="${fid}_mobile" value="${escapeHtml(f.mobile || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">

function cancelContactInline(entity, entityId, contactId) {
  document.getElementById('contactInlineFormWrap').innerHTML = '';
  document.getElementById('addContactBtn')?.classList.remove('hidden');
  if (contactId) {
    const row = document.querySelector(`[data-contact-row="${contactId}"]`);
    if (row) row.classList.remove('hidden');
  }
}

async function saveContactInline(entity, entityId, contactId) {
  const linkField = entity + '_id';
  const fid = 'cif_' + (contactId || 'new');
  const $v = id => (document.getElementById(fid + '_' + id)?.value || '').trim();
  const firstName = $v('first_name');
  const lastName  = $v('last_name');
  if (!lastName) return toast('Nachname fehlt', 'error');
  const genderInput = document.querySelector(`input[name="${fid}_gender"]:checked`);
  const fields = {
    first_name: firstName,
    last_name:  lastName,
    name:       [firstName, lastName].filter(Boolean).join(' '),
    role:       $v('role'),
    email:      $v('email'),
    phone:      $v('phone'),
    mobile:     $v('mobile'),
    is_primary: document.getElementById(fid + '_is_primary')?.checked || false
  };
  if (genderInput) fields.gender = genderInput.value;
  if (!contactId) fields[linkField] = [entityId];

  try {
    if (fields.is_primary) {
      const all = await readData('Contact');
      const others = all.filter(c =>
        (c.fields[linkField] || []).includes(entityId) &&
        c.fields.is_primary &&
        c.id !== contactId
      );
      for (const o of others) await updateData('Contact', o.id, { is_primary: false });
    }
    if (contactId) await updateData('Contact', contactId, fields);
    else           await writeData('Contact', fields);
    document.getElementById('contactInlineFormWrap').innerHTML = '';
    document.getElementById('addContactBtn')?.classList.remove('hidden');
    await refreshEntityContactsSection(entity, entityId);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteContactInline(entity, entityId, contactId) {
  if (!confirm('Diesen Ansprechpartner wirklich löschen?')) return;
  try {
    await deleteData('Contact', contactId);
    await refreshEntityContactsSection(entity, entityId);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

  const supIds  = new Set(supInCompany.map(s => s.id));

  let list = contacts.filter(c => {
    const cid = (c.fields.customer_id || [])[0];
    const sid = (c.fields.supplier_id || [])[0];
    return (cid && custIds.has(cid)) || (sid && supIds.has(sid));
  });

  const ownerOf = c => {
    const cid = (c.fields.customer_id || [])[0];
    const sid = (c.fields.supplier_id || [])[0];
    if (cid && custMap[cid]) return { type: 'customer', id: cid, rec: custMap[cid] };
    if (sid && supMap[sid])  return { type: 'supplier', id: sid, rec: supMap[sid] };
    return null;
  };

  const q = _contactListState.search.trim().toLowerCase();
  if (q) {
    list = list.filter(c => {
      const f = c.fields;
      const o = ownerOf(c);
      const ownerFields = o?.rec || {};
      return [f.first_name, f.last_name, f.name, f.email, f.phone, f.mobile, f.role,
              ownerFields.name1, ownerFields.name2, ownerFields.customer_no, ownerFields.supplier_no]
        .some(v => (v || '').toLowerCase().includes(q));
    });
  }

  const sortKey = _contactListState.sort;
  list.sort((a, b) => {
    if (sortKey === 'customer') {
      const ao = ownerOf(a)?.rec?.name1 || '';
      const bo = ownerOf(b)?.rec?.name1 || '';
      const cmp = ao.toLowerCase().localeCompare(bo.toLowerCase(), 'de');
      if (cmp !== 0) return cmp;
    }
    const av = (a.fields[sortKey === 'first_name' ? 'first_name' : 'last_name'] || a.fields.name || '').toLowerCase();
    const bv = (b.fields[sortKey === 'first_name' ? 'first_name' : 'last_name'] || b.fields.name || '').toLowerCase();
    return av.localeCompare(bv, 'de');
  });

  document.getElementById('pageContent').innerHTML = `
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold text-ink-900">Kontakte</h2>
          <p class="text-xs text-ink-500 mt-0.5">${escapeHtml(cur.name)} · ${list.length} Einträge</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px]">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input type="search" value="${escapeHtml(_contactListState.search)}" placeholder="Suchen…" oninput="onContactListSearch(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          </div>
          <label class="text-xs text-ink-500">Sortierung:</label>
          <select onchange="_contactListState.sort=this.value;renderContactsList()" class="text-sm border border-ink-200 rounded-lg px-2 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            <option value="last_name"  ${sortKey==='last_name'?'selected':''}>Nachname</option>
            <option value="first_name" ${sortKey==='first_name'?'selected':''}>Vorname</option>
            <option value="customer"   ${sortKey==='customer'?'selected':''}>Kunde / Lieferant</option>
          </select>
          <div class="ml-auto">${viewModeToggle(_contactListState.viewMode, 'setContactListViewMode')}</div>
        </div>
        ${(() => {
          const vm = _contactListState.viewMode;
          if (list.length === 0) return `<div class="p-10 text-center text-ink-500 text-sm">${q ? 'Keine Treffer.' : 'Noch keine Kontakte. Lege sie über einen Kunden oder Lieferanten an.'}</div>`;
          if (vm === 'tabelle') {
            return `
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="bg-ink-50 text-xs uppercase tracking-wider text-ink-500"><tr>
                    <th class="px-3 py-2 text-left">Name</th><th class="px-3 py-2 text-left">Funktion</th>
                    <th class="px-3 py-2 text-left">Kunde / Lieferant</th><th class="px-3 py-2 text-left">E-Mail</th>
                    <th class="px-3 py-2 text-left">Telefon</th>
                  </tr></thead>
                  <tbody class="divide-y divide-ink-100">${list.map(c => allContactRowTabelle(c, ownerOf(c))).join('')}</tbody>
                </table>
              </div>`;
          }
          if (vm === 'kompakt') {
            return '<div class="divide-y divide-ink-100">' + list.map(c => allContactRowKompakt(c, ownerOf(c))).join('') + '</div>';
          }
          return '<div class="divide-y divide-ink-100">' + list.map(c => allContactRow(c, ownerOf(c))).join('') + '</div>';
        })()}
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

/* ============================================================
   STAMMDATEN: ADRESSEN (Liefer- und Rechnungsadressen)
   Address.customer_id = String (Customer-Record-ID)
   Address.kind        = 'delivery' | 'billing'
   Address.is_primary  = Boolean (eine Hauptadresse pro Kind & Kunde)
   ============================================================ */
function addressKindLabel(kind) {
  return kind === 'billing' ? 'Rechnungsadresse' : 'Lieferadresse';
}
function addressKindLabelPlural(kind) {
  return kind === 'billing' ? 'Rechnungsadressen' : 'Lieferadressen';
}
function addressKindIcon(kind) {
  return kind === 'billing' ? 'receipt' : 'truck';
}

// Sucht die Hauptadresse eines Kunden für einen bestimmten Typ. Liefert Address-Record-ID oder ''.
function findPrimaryAddressId(addresses, customerId, kind) {
  if (!customerId || !Array.isArray(addresses)) return '';
  const peers = addresses.filter(a => (a.fields.customer_id || '') === customerId && (a.fields.kind || '') === kind);
  if (peers.length === 0) return '';
  const primary = peers.find(a => a.fields.is_primary);
  if (primary) return primary.id;
  if (peers.length === 1) return peers[0].id;
  return '';
}

// Auflösung einer Adresse für ein Dokument. Reihenfolge:
// 1. Wenn addressId gesetzt und vorhanden → diese
// 2. Sonst: Hauptadresse des Kunden vom Typ kind
// 3. Sonst: Customer-Basis-Adresse (street/zip/city/country auf Customer-Record)
// Liefert Objekt { recipient, street, zip, city, country, name, source }
function resolveAddress({ customer, addresses, addressId, kind }) {
  if (addressId && Array.isArray(addresses)) {
    const hit = addresses.find(a => a.id === addressId);
    if (hit) {
      const f = hit.fields || {};
      return {
        recipient: f.recipient || '',
        street: f.street || '',
        zip: f.zip || '',
        city: f.city || '',
        country: f.country || '',
        name: f.name || '',
        source: 'override',
        id: hit.id,
      };
    }
  }
  if (customer && Array.isArray(addresses)) {
    const primaryId = findPrimaryAddressId(addresses, customer.id || customer._id, kind);
    if (primaryId) {
      const hit = addresses.find(a => a.id === primaryId);
      if (hit) {
        const f = hit.fields || {};
        return {
          recipient: f.recipient || '',
          street: f.street || '',
          zip: f.zip || '',
          city: f.city || '',
          country: f.country || '',
          name: f.name || '',
          source: 'primary',
          id: hit.id,
        };
      }
    }
  }
  // Fallback: Customer-Basis-Adresse
  const cf = (customer && customer.fields) || customer || {};
  return {
    recipient: '',
    street: cf.street || '',
    zip: cf.zip || '',
    city: cf.city || '',
    country: cf.country || '',
    name: '',
    source: 'customer_base',
    id: '',
  };
}

// Liefert ein kurzes Label für die Adress-Anzeige (Stadt + ggf. Name).
function addressShortLabel(addr) {
  if (!addr) return '–';
  const parts = [];
  if (addr.name) parts.push(addr.name);
  if (addr.city) parts.push(addr.city);
  return parts.length ? parts.join(' · ') : (addr.street || addr.zip || '–');
}

function renderEntityAddresses(customerId, addresses, kind) {
  if (!customerId) {
    return `<p class="text-xs text-ink-500 italic px-3 py-2 bg-ink-50 rounded-lg">Speichere zuerst den Kunden — danach kannst du ${escapeHtml(addressKindLabelPlural(kind))} hinzufügen.</p>`;
  }
  const peers = addresses.filter(a => (a.fields.customer_id || '') === customerId && (a.fields.kind || '') === kind);
  const sorted = [...peers].sort((a, b) => {
    const ap = a.fields.is_primary ? 0 : 1;
    const bp = b.fields.is_primary ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return (a.fields.city || '').localeCompare(b.fields.city || '', 'de');
  });
  const list = sorted.length === 0
    ? `<p class="text-xs text-ink-500 italic px-3 py-2">Noch keine ${escapeHtml(addressKindLabelPlural(kind))}.</p>`
    : '<div class="space-y-2">' + sorted.map(a => `<div data-address-row="${a.id}">${addressRow(customerId, a, kind)}</div>`).join('') + '</div>';
  return `
    ${list}
    <div id="addressInlineFormWrap_${kind}" class="mt-2"></div>
    <button id="addAddressBtn_${kind}" type="button" onclick="showAddressInlineForm('${customerId}','','${kind}')" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1.5 mt-3">
      <i data-lucide="plus" class="w-4 h-4"></i> ${escapeHtml(addressKindLabel(kind))} hinzufügen
    </button>
  `;
}

function addressRow(customerId, addrRec, kind) {
  const f = addrRec.fields || {};
  const cityLine = [f.zip, f.city].filter(Boolean).join(' ');
  const summary = [f.recipient, f.street, cityLine, f.country].filter(Boolean).join(' · ');
  return `
    <div class="flex items-center justify-between p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.is_primary ? '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-500" style="fill:currentColor"></i>' : ''}
          <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(f.name || addressKindLabel(kind))}</p>
        </div>
        ${summary ? `<p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(summary)}</p>` : ''}
      </div>
      <div class="flex gap-1 shrink-0 ml-2">
        <button type="button" onclick="showAddressInlineForm('${customerId}','${addrRec.id}','${kind}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
          <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
        </button>
        <button type="button" onclick="deleteAddressInline('${customerId}','${addrRec.id}','${kind}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>
  `;
}

async function showAddressInlineForm(customerId, addressId, kind) {
  if (document.querySelector(`#addressInlineFormWrap_${kind} [data-address-form]`)) return;
  let f = {};
  let othersExist = false;
  try {
    const all = await readData('Address');
    if (addressId) f = all.find(r => r.id === addressId)?.fields || {};
    const peers = all.filter(a => (a.fields.customer_id || '') === customerId && (a.fields.kind || '') === kind && a.id !== addressId);
    othersExist = peers.length > 0;
    if (!addressId && !peers.some(a => a.fields.is_primary)) f.is_primary = true;
  } catch (e) {}
  const fid = 'aif_' + kind + '_' + (addressId || 'new');

  if (addressId) {
    const row = document.querySelector(`[data-address-row="${addressId}"]`);
    if (row) row.classList.add('hidden');
  }
  document.getElementById(`addAddressBtn_${kind}`)?.classList.add('hidden');

  const wrap = document.getElementById(`addressInlineFormWrap_${kind}`);
  if (!wrap) return;
  wrap.innerHTML = `
    <div data-address-form class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-4 space-y-3">
      <p class="text-sm font-semibold text-brand-700">${addressId ? 'Adresse bearbeiten' : 'Neue ' + escapeHtml(addressKindLabel(kind))}</p>
      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Bezeichnung (optional)</label>
        <input id="${fid}_name" value="${escapeHtml(f.name || '')}" placeholder="z.B. Zentrallager, Buchhaltung" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>
      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Empfänger / Abteilung (optional)</label>
        <input id="${fid}_recipient" value="${escapeHtml(f.recipient || '')}" placeholder="z.B. z.Hd. Buchhaltung" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>
      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Straße + Nr.</label>
        <input id="${fid}_street" value="${escapeHtml(f.street || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">PLZ</label>
          <input id="${fid}_zip" value="${escapeHtml(f.zip || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div class="col-span-2">
          <label class="block text-xs font-medium text-ink-700 mb-1">Ort</label>
          <input id="${fid}_city" value="${escapeHtml(f.city || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Land</label>
        <input id="${fid}_country" value="${escapeHtml(f.country || 'Deutschland')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>
      <label class="flex items-center gap-2 pt-1">
        <input type="checkbox" id="${fid}_is_primary" ${f.is_primary ? 'checked' : ''} class="w-4 h-4 rounded border-ink-300 text-brand-500 focus:ring-brand-500/30">
        <span class="text-sm">Haupt-${escapeHtml(addressKindLabel(kind))} ${othersExist ? '<span class="text-xs text-ink-500">(ersetzt die bisherige)</span>' : ''}</span>

      <div class="flex justify-end gap-2 pt-1">
        <button type="button" onclick="cancelAddressInline('${customerId}','${addressId || ''}','${kind}')" class="px-3 py-1.5 text-sm rounded-lg border border-ink-200 bg-white hover:bg-ink-50">Abbrechen</button>
        <button type="button" onclick="saveAddressInline('${customerId}','${addressId || ''}','${kind}')" class="px-3 py-1.5 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600">Speichern</button>

  if (window.lucide) lucide.createIcons();
  setTimeout(() => document.getElementById(fid + '_street')?.focus(), 50);

function cancelAddressInline(customerId, addressId, kind) {
  const wrap = document.getElementById(`addressInlineFormWrap_${kind}`);
  if (wrap) wrap.innerHTML = '';
  document.getElementById(`addAddressBtn_${kind}`)?.classList.remove('hidden');
  if (addressId) {
    const row = document.querySelector(`[data-address-row="${addressId}"]`);
    if (row) row.classList.remove('hidden');
  }
}

async function saveAddressInline(customerId, addressId, kind) {
  const fid = 'aif_' + kind + '_' + (addressId || 'new');
  const $v = id => (document.getElementById(fid + '_' + id)?.value || '').trim();
  const street = $v('street');
  const city = $v('city');
  if (!street && !city) return toast('Mindestens Straße oder Ort eingeben', 'error');
  const fields = {
    name:       $v('name'),
    recipient:  $v('recipient'),
    street:     street,
    zip:        $v('zip'),
    city:       city,
    country:    $v('country') || 'Deutschland',
    is_primary: document.getElementById(fid + '_is_primary')?.checked || false,
    kind:       kind,
  };
  if (!addressId) fields.customer_id = customerId;

  try {
    if (fields.is_primary) {
      const all = await readData('Address');
      const others = all.filter(a =>
        (a.fields.customer_id || '') === customerId &&
        (a.fields.kind || '') === kind &&
        a.fields.is_primary &&
        a.id !== addressId
      );
      for (const o of others) await updateData('Address', o.id, { is_primary: false });
    }
    if (addressId) await updateData('Address', addressId, fields);
    else           await writeData('Address', fields);
    const wrap = document.getElementById(`addressInlineFormWrap_${kind}`);
    if (wrap) wrap.innerHTML = '';
    document.getElementById(`addAddressBtn_${kind}`)?.classList.remove('hidden');
    await refreshEntityAddressesSection(customerId, kind);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteAddressInline(customerId, addressId, kind) {
  if (!confirm('Diese Adresse wirklich löschen?')) return;
  try {
    await deleteData('Address', addressId);
    await refreshEntityAddressesSection(customerId, kind);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshEntityAddressesSection(customerId, kind) {
  const wrap = document.getElementById(`entityAddressesWrap_${kind}`);
  if (!wrap) return;
  try {
    const all = await readData('Address');
    wrap.innerHTML = renderEntityAddresses(customerId, all, kind);
    if (window.lucide) lucide.createIcons();
  } catch (e) { toast(e.message, 'error'); }
}

   ============================================================ */
function showLoginScreen() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;
  setTimeout(() => document.getElementById('loginKey')?.focus(), 50);
}

function showApp() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('sidebarUserName').textContent = APP_KEYS.user?.name || '–';
  document.getElementById('sidebarUserRole').textContent = APP_KEYS.user?.role || '';
  document.getElementById('topbarVersion').textContent = APP_VERSION;
  if (APP_KEYS.user?.is_admin) document.getElementById('navAdmin')?.classList.remove('hidden');
  initNavSections();
  initNavRouting();
  renderMandantenSwitcher();
  renderWelcome();
  if (window.lucide) lucide.createIcons();
}

function forceAppUpdate() {
  toast('Lade neueste Version…', 'info', 1500);
  // Loader-Cache + alle App-Caches leeren, damit auch der Offline-Fallback keine alte Version zeigt
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('app_cache_') || k.startsWith('cache_')) localStorage.removeItem(k);
    });
  } catch (e) {}
  // Über loader.html: zieht index.html direkt von raw.githubusercontent.com → umgeht GitHub-Pages-CDN komplett
  setTimeout(() => location.replace('loader.html?t=' + Date.now()), 250);
}

// Klick außerhalb schließt das Mandanten-Menü
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('mandantWrap');
  if (!wrap || wrap.contains(e.target)) return;
  document.getElementById('mandantMenu')?.classList.add('hidden');
});

function setLoginLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const spin = document.getElementById('loginSpin');
  btn.disabled = loading;
  spin.classList.toggle('hidden', !loading);
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearLoginError() {
  document.getElementById('loginError').classList.add('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearLoginError();
  const key = document.getElementById('loginKey').value.trim();
  if (!key) return showLoginError('Bitte Key eingeben.');
  setLoginLoading(true);
  try {
    await loginWithUserKey(key);
    toast('Willkommen zurück, ' + (APP_KEYS.user?.name || 'Kollege') + '!', 'success');
    showApp();
  } catch (err) {
    showLoginError(err.message || 'Login fehlgeschlagen');
  } finally {
    setLoginLoading(false);
  }
});

/* ============================================================
   UPDATE-CHECK (raw.githubusercontent.com — bypasst GitHub-Pages-CDN)
   ============================================================ */
async function checkForUpdate() {
  try {
    const url = 'https://raw.githubusercontent.com/' + APP_CONFIG.GITHUB_REPO + '/main/index.html?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return;
    const text = await r.text();
    const m = text.match(/APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
    if (m && m[1] !== APP_VERSION) {
      document.getElementById('updateVersion').textContent = m[1];
      document.getElementById('updateBanner').classList.remove('hidden');
      if (window.lucide) lucide.createIcons();
    }
  } catch (e) { /* still */ }
}

/* ============================================================
   PWA: APP-ICON (FLP Hero-Maskottchen, SVG → Canvas → PNG)
   ============================================================ */
function _heroSvg() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
    <rect width="180" height="180" fill="#FFFFFF"/>
    <path d="M 30 130 L 15 178 L 70 165 L 110 165 L 165 178 L 150 130 Z" fill="#DC2626"/>
    <ellipse cx="90" cy="195" rx="55" ry="35" fill="#1FA8D6"/>
    <rect x="80" y="130" width="20" height="15" fill="#F4C795"/>
    <circle cx="90" cy="100" r="38" fill="#F4C795"/>
    <path d="M 60 95 Q 60 88 70 88 L 110 88 Q 120 88 120 95 L 120 102 Q 120 108 110 108 L 70 108 Q 60 108 60 102 Z" fill="#0F172A"/>
    <ellipse cx="76" cy="98" rx="6" ry="5" fill="#FFFFFF"/>
    <ellipse cx="104" cy="98" rx="6" ry="5" fill="#FFFFFF"/>
    <circle cx="77" cy="99" r="2.5" fill="#0F172A"/>
    <circle cx="105" cy="99" r="2.5" fill="#0F172A"/>
    <path d="M 80 120 Q 90 128 100 120" stroke="#1F2937" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 50 80 Q 50 50 90 50 Q 130 50 130 80 L 130 87 L 50 87 Z" fill="#1FA8D6"/>
    <ellipse cx="115" cy="86" rx="35" ry="6" fill="#157699"/>
  </svg>`;
}

function drawAppIcon(size) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const cv = document.createElement('canvas');
        cv.width = size; cv.height = size;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        // FLP-Schriftzug auf der Cap separat per Canvas zeichnen — funktioniert browser-übergreifend zuverlässiger als <text> in SVG-zu-PNG
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '900 ' + Math.round(size * 0.115) + 'px Impact, "Arial Black", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('FLP', size * 0.5, size * 0.40);
        resolve(cv.toDataURL('image/png'));
      } catch (e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(_heroSvg());
  });
}

async function setupPwaAssets() {
  try {
    const [apple, fav, i192, i512] = await Promise.all([
      drawAppIcon(180), drawAppIcon(64), drawAppIcon(192), drawAppIcon(512)
    ]);
    if (apple) document.getElementById('appleTouchIcon')?.setAttribute('href', apple);
    if (fav) {
      const f = document.getElementById('appFavicon');
      if (f) { f.setAttribute('type', 'image/png'); f.setAttribute('href', fav); }
    }
    if (i192 && i512) {
      const manifest = {
        name: 'ERP Hero',
        short_name: 'ERP Hero',
        description: 'FLP Lift Parts ERP',
        start_url: location.pathname,
        scope: location.pathname,
        display: 'standalone',
        background_color: '#1FA8D6',
        theme_color: '#1FA8D6',
        icons: [
          { src: i192, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: i512, sizes: '512x512', type: 'image/png', purpose: 'any' }
        ]
      };
      const url = 'data:application/json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
      document.getElementById('appManifest')?.setAttribute('href', url);
    }
  } catch (e) { /* still */ }
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  if (window.lucide) lucide.createIcons();
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;
  setupPwaAssets();

  // Auto-Login
  const ok = await tryAutoLogin();
  if (ok) showApp();
  else showLoginScreen();

  // Update-Check: einmal nach UI ready, dann alle 3 Min + bei Tab-Wechsel/Fokus
  setTimeout(checkForUpdate, 1500);
  setInterval(checkForUpdate, 3 * 60 * 1000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForUpdate(); });
  window.addEventListener('focus', checkForUpdate);
}

document.addEventListener('DOMContentLoaded', init);
</script>
