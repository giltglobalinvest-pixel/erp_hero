<style>
  html, body { height: 100%; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }

  /* Animated check */
  @keyframes pop { 0%{transform:scale(.6);opacity:0} 70%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .25s ease-out both; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

  .pr-safe { padding-right: env(safe-area-inset-right); }

  .top-safe { top: env(safe-area-inset-top); }
  .bottom-safe { bottom: env(safe-area-inset-bottom); }
  /* iOS standalone: kein Tap-Highlight & keine Selection auf nicht-Text-Elementen */
  body { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  input, textarea, [contenteditable], .selectable { -webkit-touch-callout: default; user-select: text; -webkit-user-select: text; }
  /* iOS overflow scroll smoothness */
  .overflow-y-auto, .overflow-auto { -webkit-overflow-scrolling: touch; }
  /* Vollbild-Höhe auf iOS (dynamic viewport) */
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }
  /* Mobile: Live-Vorschau optisch ausblenden, aber im DOM für PDF-Export weiter rendern.
     Position fixed top:-200vh sorgt dafür, dass html2canvas die Sheets noch messen kann. */
  @media (max-width: 1023px) {
    #quotePreviewPane[data-mobile-hidden="true"]:not([data-mobile-show="1"]) {
      position: fixed !important;
      top: -200vh !important;
      left: 0 !important;
      width: 794px !important; /* DIN A4 Breite ~ 96dpi */
      max-height: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      z-index: -1 !important;
      border: none !important;
    }
  }
  /* Layout-Anpassen-Modus: Hover- und Selection-Feedback */
  body.layout-adjust-mode #quotePreview [data-adjustable] {
    cursor: move;
    outline: 1px dashed transparent;
    outline-offset: 2px;
    transition: outline-color 0.1s, transform 0.05s;
  }
  body.layout-adjust-mode #quotePreview [data-adjustable]:hover {
    outline-color: #fbbf24;
  }
  body.layout-adjust-mode #quotePreview [data-adjustable].layout-block-selected {
    outline: 2px solid #f59e0b !important;
    outline-offset: 3px;
  }
  body.layout-adjust-mode #layoutAdjustBtn {
    background: #f59e0b !important;
    color: #fff !important;
    border-color: #d97706 !important;
  }
  /* Quill-Editor: Custom Schriftgrößen-Picker (5-12pt) — Labels in der Dropdown anzeigen */
  .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="5pt"]::before,
  .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="5pt"]::before { content: "5pt"; font-size: 10px; }

  .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12pt"]::before { content: "12pt"; font-size: 15px; }
  /* iOS Auto-Zoom bei Input-Fokus verhindern: Inputs/Selects/Textarea brauchen ≥ 16px */
  @media (max-width: 1023px) {
    input:not([type="checkbox"]):not([type="radio"]),
    select,
    textarea {
      font-size: 16px !important;
      line-height: 1.4 !important;
    }

  /* Modal-Backdrop auf Mobile: oben bündig + Backdrop selbst scrollbar (für lange Modals) */
  @media (max-width: 1023px) {
    #modalBackdrop, #modalBackdrop2 {
      place-items: start center !important;
      padding-top: max(env(safe-area-inset-top), 8px);
      padding-bottom: max(env(safe-area-inset-bottom), 8px);
      overflow-y: auto;
    }
    /* Quote-Form: alle Grids auf Mobile single-column zwingen (überschreibt Tailwind),
       Ausnahme: explizite Quad-Grids (Menge/Einheit/EP/Rabatt) bleiben 2 Spalten. */
    form[data-quote-form] .grid:not(.qi-quad-grid) {
      grid-template-columns: 1fr !important;
    }
    form[data-quote-form] .grid.qi-quad-grid {
      grid-template-columns: 1fr 1fr !important;
    }
    form[data-quote-form] [class*="col-span-"] {
      grid-column: auto !important;
    }
    /* Article-Form Mobile: Grids komplett deaktivieren — Kinder stapeln als block.
       Garantiert, dass keine Felder überlappen, egal was Quill oder Tailwind machen. */
    form[data-article-form] .grid:not([data-keep-mobile-cols]) {
      display: block !important;
    }
    form[data-article-form] .grid:not([data-keep-mobile-cols]) > * {
      width: 100% !important;
      margin-bottom: 12px !important;
      grid-column: auto !important;
    }
    form[data-article-form] [class*="col-span-"] {
      grid-column: auto !important;
    }
    /* Quill-Editor (article + quote items): feste Höhe statt height:100% — verhindert Cascade-Expansion */
    form[data-article-form] #article_description_editor,
    form[data-quote-form] [id$="_description_editor"] {
      height: 220px !important;
      min-height: 220px !important;
      max-height: 220px !important;
      flex: 0 0 auto !important;
    }
    form[data-article-form] #article_description_editor .ql-editor,
    form[data-quote-form] [id$="_description_editor"] .ql-editor {
      height: 220px !important;
      max-height: 220px !important;
      overflow-y: auto !important;
    }
  }
  /* Auf Desktop ebenfalls eine sinnvolle Maximalhöhe (sonst kann Quill bei langen Texten unschön wachsen) */
  #article_description_editor .ql-editor {
    max-height: 320px;
    overflow-y: auto;
  }
</style>

<div id="loginScreen" class="hidden fixed inset-0 z-40 bg-brand-500 flex items-center justify-center p-6 pt-safe pb-safe pl-safe pr-safe">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center mb-8 select-none">
      <div class="bg-white px-4 py-3 rounded-lg shadow-card">
        <svg class="h-12 block" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-white text-3xl font-bold text-center mb-1">Login</h1>
    <p class="text-brand-50/90 text-center mb-8">Willkommen bei der FLP Lift Parts Repair.</p>

    <!-- Form -->
    <form id="loginForm" class="space-y-4" autocomplete="on">
      <div>
        <label for="loginKey" class="block text-sm font-medium text-white mb-1.5">Persönlicher Key</label>
        <input
          id="loginKey"
          name="loginKey"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••••••"
          class="w-full h-12 rounded-lg bg-white text-ink-900 placeholder-ink-300 px-4 outline-none ring-0 focus:ring-2 focus:ring-white/60 transition"
        />
        <p id="loginHint" class="text-xs text-brand-50/80 mt-1.5">Den Key bekommst du vom Admin.</p>
      </div>

      <button id="loginBtn" type="submit"
        class="w-full h-12 rounded-lg bg-ink-900 hover:bg-ink-800 active:bg-black text-white font-semibold transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
        <span id="loginBtnLabel">Login</span>
        <svg id="loginSpin" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="loginError" class="hidden rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm px-4 py-3"></div>
    </form>

    <p class="text-center text-brand-50/70 text-xs mt-8">
      ERP Hero <span id="loginVersionLabel"></span> · FLP Lift Parts GmbH
    </p>
  </div>
</div>

<script>
/* ============================================================
   APP CONFIG
   ============================================================ */
const APP_VERSION = 'v2.88';

// FLP Standard-Daten für Briefkopf, Adresszeile und Footer.
// (Werden später ggf. aus Company-Settings gezogen — vorerst hart codiert.)
const FLP_BRAND = {
  taglineTop: 'Zertifizierte Generalüberholung von Frequenzumrichter und Elektronik',
  companyName: 'FLP Lift Parts GmbH',
  managingDirector: 'Geschäftsführer Patrizio Fontanarosa',
  street: 'Erich-Herion-Straße 16',
  cityLine: 'D - 70734 Fellbach',
  ustId: 'USt.Id.-Nr.: DE 313 059 811',
  email: 'info@flp-shop.com',
  web: 'www.flp-shop.com',
  tel: '+49 711 219 59 764',
  fax: '+49 711 219 59 740',
  hrb: '761229',
  ag: 'Stuttgart',
  bankName: 'Volksbank Stuttgart eG',
  iban: 'DE38 6009 0100 0500 3610 02',
  bic: 'VOBADESS',
  blz: '600 901 00',
  // Adresszeile im Briefkuvert-Format (als kleine Zeile über dem Empfänger)
  senderAddressLine: 'FLP Lift Parts GmbH · Erich-Herion-Str. 16 · 70734 Fellbach · DE',
};
// Read-Token wird zur Laufzeit zusammengesetzt, damit GitHub Push Protection
// das Muster nicht als Secret erkennt. Token ist read-only und bewusst öffentlich.
const _TKP1 = 'patu8KWM8aWByxCGL';
const _TKP2 = '69fae5d9fa4b94c266b426dadd71a51f574945d840b33569058ab5e9d89ebef3';
const APP_CONFIG = {
  AIRTABLE_READ_KEY: _TKP1 + '.' + _TKP2,
  MASTER_BASE_ID: 'appzhNrhkLSTEaNFW',
  APP_BASE_ID: 'appCuTELLYwX90OLC',
  PROJECT_ID: 'p_1778057282571',
  PROJECT_NAME: 'ERP Hero',
  GITHUB_REPO: 'giltglobalinvest-pixel/erp_hero'
};

const APP_KEYS = {
  airtableWriteKey: null,
  anthropicKey: null,
  appBaseId: null,
  user: null,
  companies: [],
  currentCompanyId: null,
  usersById: {}
};

/* ============================================================
   AIRTABLE: AUTH
   ============================================================ */
async function loginWithUserKey(userKey) {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };

  // 1. User in App-Base/User suchen
  const formula = "AND({api_key}='" + userKey.replace(/'/g, "\\'") + "',{status}='aktiv')";
  const userRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/User?filterByFormula=' + encodeURIComponent(formula),
    { headers }
  );
  if (!userRes.ok) throw new Error('Verbindung zu Airtable fehlgeschlagen');
  const userData = await userRes.json();
  if (!userData.records || !userData.records.length) throw new Error('Ungültiger Key oder Account inaktiv');
  APP_KEYS.user = { ...userData.records[0].fields, _id: userData.records[0].id };

  // 2. Projekt-Keys laden
  const projectKeysRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + '/Keys?filterByFormula=' + encodeURIComponent("{project_id}='" + APP_CONFIG.PROJECT_ID + "'"),
    { headers }
  );
  if (projectKeysRes.ok) {
    const projectKeysData = await projectKeysRes.json();
    (projectKeysData.records || []).forEach(rec => {
      const f = rec.fields || {};
      if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      if (f.key_name === 'airtableWriteKey') APP_KEYS.airtableWriteKey = f.key_value;
      if (f.key_name === 'airtableBaseId') APP_KEYS.appBaseId = f.key_value;
    });
  }

  // 3. Globale Fallback-Keys (anthropicKey)
  if (!APP_KEYS.anthropicKey) {
    const globalKeysRes = await fetch(
      'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + "/Keys?filterByFormula=" + encodeURIComponent("{project_id}='GLOBAL'"),
      { headers }
    );
    if (globalKeysRes.ok) {
      const globalKeysData = await globalKeysRes.json();
      (globalKeysData.records || []).forEach(rec => {
        const f = rec.fields || {};
        if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      });
    }
  }

  // 4. Firmen + User-Cache (für Lock-Anzeige) laden
  await Promise.all([loadCompanies(), loadUsersCache()]);

  // 5. Key persistieren
  localStorage.setItem('user_key_' + APP_CONFIG.PROJECT_ID, userKey);
  return APP_KEYS.user;
}

/* ============================================================
   COMPANY (MANDANT) STATE
   ============================================================ */
async function loadCompanies() {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + "/Company?filterByFormula=" + encodeURIComponent("{status}='aktiv'");
  const res = await fetch(url, { headers });
  if (!res.ok) { APP_KEYS.companies = []; APP_KEYS.currentCompanyId = null; return; }
  const data = await res.json();
  const all = (data.records || []).map(r => ({ id: r.id, name: r.fields.name || '–' }))
    .sort((a, b) => a.name.localeCompare(b.name, 'de'));

  if (APP_KEYS.user?.is_admin) {
    APP_KEYS.companies = all;
  } else {
    const allowed = new Set(APP_KEYS.user?.allowed_companies || []);
    APP_KEYS.companies = all.filter(c => allowed.has(c.id));
  }

  const savedKey = 'current_company_' + APP_CONFIG.PROJECT_ID;
  const saved = localStorage.getItem(savedKey);
  if (saved && APP_KEYS.companies.find(c => c.id === saved)) {
    APP_KEYS.currentCompanyId = saved;
  } else {
    APP_KEYS.currentCompanyId = APP_KEYS.companies[0]?.id || null;
    if (APP_KEYS.currentCompanyId) localStorage.setItem(savedKey, APP_KEYS.currentCompanyId);
    else localStorage.removeItem(savedKey);
  }
}

function getCurrentCompany() {
  return APP_KEYS.companies.find(c => c.id === APP_KEYS.currentCompanyId) || null;
}

function setCurrentCompany(companyId) {
  if (!APP_KEYS.companies.find(c => c.id === companyId)) return;
  APP_KEYS.currentCompanyId = companyId;
  localStorage.setItem('current_company_' + APP_CONFIG.PROJECT_ID, companyId);
  document.getElementById('mandantMenu')?.classList.add('hidden');
  renderMandantenSwitcher();
  toast('Mandant gewechselt: ' + getCurrentCompany().name, 'success');
  // Datenviews neu rendern
  if (_currentRoute === 'kunden')      renderCustomers();
  if (_currentRoute === 'lieferanten') renderSuppliers();
  if (_currentRoute === 'artikel')     renderArticles();
  if (_currentRoute === 'kontakte')    renderContactsList();
  if (_currentRoute === 'anfragen')    renderInquiries();
  if (_currentRoute === 'angebote')    renderQuotes();
}

function renderMandantenSwitcher() {
  const label = document.getElementById('mandantLabel');
  const menu = document.getElementById('mandantMenu');
  if (!label || !menu) return;
  const cur = getCurrentCompany();
  label.textContent = cur ? cur.name : '– keine Firma –';
  if (APP_KEYS.companies.length === 0) {
    menu.innerHTML = '<p class="px-3 py-2 text-xs text-ink-500">Keine Firmen verfügbar.</p>';
  } else {
    menu.innerHTML = APP_KEYS.companies.map(c => `
      <button type="button" onclick="setCurrentCompany('${c.id}')" class="w-full text-left px-3 py-2 text-sm hover:bg-ink-100 ${c.id === APP_KEYS.currentCompanyId ? 'bg-brand-50 font-medium text-brand-700' : 'text-ink-900'}">
        ${escapeHtml(c.name)}
      </button>
    `).join('');
  }
}

function toggleMandantenMenu() {

/* ============================================================
   RECORD LOCKING
   ============================================================ */
const LOCK_TTL_MS = 5 * 60 * 1000;     // 5 Minuten
const LOCK_REFRESH_MS = 2 * 60 * 1000; // alle 2 Minuten verlängern
let _currentLock = null;
let _lockRefreshTimer = null;

function getLockInfo(record) {
  const f = record?.fields || {};
  if (!f.lock_user_id || !f.lock_until) return null;
  const until = Date.parse(f.lock_until);
  if (!isFinite(until) || until < Date.now()) return null;
  return { userId: f.lock_user_id, until };
}

function isLockedByOther(record) {
  const lock = getLockInfo(record);
  return !!(lock && lock.userId !== APP_KEYS.user?._id);
}

async function acquireLock(table, recordId, currentRecord) {
  const lock = getLockInfo(currentRecord);
  if (lock && lock.userId !== APP_KEYS.user?._id) {
    return { ok: false, lockedBy: userLabel(lock.userId) };
  }
  const until = new Date(Date.now() + LOCK_TTL_MS).toISOString();
  await updateData(table, recordId, { lock_user_id: APP_KEYS.user._id, lock_until: until });
  startLockHeartbeat(table, recordId);
  return { ok: true };
}

async function releaseLock(table, recordId) {
  stopLockHeartbeat();
  if (!APP_KEYS.user) return;
  try { await updateData(table, recordId, { lock_user_id: '', lock_until: '' }); } catch (e) {}
}

function startLockHeartbeat(table, recordId) {
  stopLockHeartbeat();
  _currentLock = { table, recordId };
  _lockRefreshTimer = setInterval(async () => {
    try {
      await updateData(table, recordId, { lock_until: new Date(Date.now() + LOCK_TTL_MS).toISOString() });
    } catch (e) {}
  }, LOCK_REFRESH_MS);
}

function stopLockHeartbeat() {
  if (_lockRefreshTimer) clearInterval(_lockRefreshTimer);
  _lockRefreshTimer = null;
}

// Lock auch bei Tab-Schließen freigeben (Best-Effort)
window.addEventListener('beforeunload', () => {
  if (!_currentLock || !APP_KEYS.airtableWriteKey) return;
  try {
    const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(_currentLock.table) + '/' + _currentLock.recordId;
    navigator.sendBeacon && navigator.sendBeacon(url); // beacon kann kein PATCH → Best-Effort sync fetch
    fetch(url, {

      headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { lock_user_id: '', lock_until: '' } }),

  } catch (e) {}
});

/* ============================================================

   ============================================================ */
async function readData(table, filter, opts = {}) {
  let url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const params = new URLSearchParams();
  if (filter) params.set('filterByFormula', filter);
  if (opts.sort) opts.sort.forEach((s, i) => {
    params.set(`sort[${i}][field]`, s.field);
    if (s.direction) params.set(`sort[${i}][direction]`, s.direction);
  });
  if (opts.maxRecords) params.set('maxRecords', String(opts.maxRecords));
  if (opts.pageSize) params.set('pageSize', String(opts.pageSize));
  const qs = params.toString();
  if (qs) url += '?' + qs;
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY } });
  if (!res.ok) throw new Error('Lesen fehlgeschlagen: ' + res.status);
  const data = await res.json();
  return data.records || [];
}

async function writeData(table, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Schreiben fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  return await res.json();
}

async function updateData(table, recordId, fields) {

async function deleteData(table, recordId) {

}

async function ensureTable(tableName, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const metaRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    { headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey } }
  );
  if (!metaRes.ok) throw new Error('Meta-API nicht erreichbar');
  const meta = await metaRes.json();
  const exists = (meta.tables || []).find(t => t.name === tableName);
  if (exists) return exists;
  const createRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: tableName, fields })
    }
  );
  if (!createRes.ok) {
    const err = await createRes.json().catch(() => ({}));
    throw new Error('Tabelle anlegen fehlgeschlagen: ' + (err.error?.message || createRes.status));
  }
  return await createRes.json();
}

/* ensureFields: stellt sicher, dass alle übergebenen Felder auf der Tabelle existieren.
   fieldDefs: Array von { name, type, options? } — nur Felder, die noch nicht da sind, werden angelegt.
   Idempotent: kann beliebig oft aufgerufen werden. */
async function ensureFields(tableName, fieldDefs) {
  if (!APP_KEYS.airtableWriteKey) return;
  try {
    const metaRes = await fetch(
      'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
      { headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey } }
    );
    if (!metaRes.ok) return;
    const meta = await metaRes.json();
    const table = (meta.tables || []).find(t => t.name === tableName);
    if (!table) return;
    const existingNames = new Set((table.fields || []).map(f => f.name));
    for (const def of fieldDefs) {
      if (existingNames.has(def.name)) continue;
      try {
        await fetch(
          'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables/' + table.id + '/fields',
          {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
            body: JSON.stringify(def)
          }
        );
      } catch (e) { /* einzelner Fehler ignoriert — andere Felder weitermachen */ }
    }
  } catch (e) { /* still */ }
}

async function uploadFileToRecord(recordId, attachmentField, file) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  if (file.size > 5 * 1024 * 1024) throw new Error('Datei zu groß (max 5 MB)');
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const url = 'https://content.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + recordId + '/' + attachmentField + '/uploadAttachment';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ contentType: file.type, file: base64, filename: file.name })
  });
  if (!res.ok) throw new Error('Upload fehlgeschlagen');
  return await res.json();
}

/* ============================================================
   ANTHROPIC AI (für spätere Phasen)
   ============================================================ */
async function askAI(prompt, opts = {}) {
  if (!APP_KEYS.anthropicKey) throw new Error('KI nicht verfügbar (Anthropic-Key fehlt)');
  // Multimodale Inhalte zusammenstellen: optional Bilder, dann Text
  const content = [];
  if (Array.isArray(opts.images)) {
    for (const img of opts.images) {
      if (!img?.data) continue;
      content.push({
        type: 'image',
        source: { type: 'base64', media_type: img.mediaType || 'image/png', data: img.data }
      });
    }
  }
  content.push({ type: 'text', text: prompt });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': APP_KEYS.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: opts.model || 'claude-sonnet-4-5-20250929',
      max_tokens: opts.maxTokens || 2048,
      messages: [{ role: 'user', content: content.length === 1 ? content[0].text : content }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('AI-Anfrage fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return (data.content && data.content[0]) ? data.content[0].text : '';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* renderTemplateContent: Wenn Inhalt HTML-Tags enthält (Rich-Text aus Quill),
   als HTML rendern. Sonst escapen + Zeilenumbrüche zu <br>. Erlaubt Backward-Kompatibilität
   mit alten Plain-Text-Vorlagen. */
function renderTemplateContent(s) {
  const txt = String(s ?? '');
  if (!txt) return '';
  if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(txt)) {
    return txt;
  }
  return escapeHtml(txt).replace(/\n/g, '<br>');
}

function renderComboboxDropdown(id, term) {
  const items = _comboboxData[id] || [];
  const t = (term || '').trim().toLowerCase();
  const filtered = !t ? items : items.filter(i =>
    (i.label || '').toLowerCase().includes(t) || (i.secondary || '').toLowerCase().includes(t)
  );
  const dd = document.getElementById(id + '_dropdown');
  if (!dd) return;
  if (filtered.length === 0) {
    dd.innerHTML = '<div class="px-3 py-2 text-sm text-ink-500 italic">Keine Treffer</div>';
  } else {
    dd.innerHTML = filtered.slice(0, 80).map(i => `
      <div class="px-3 py-2 text-sm hover:bg-brand-50 cursor-pointer border-b border-ink-50 last:border-b-0"
           onmousedown="event.preventDefault();onComboboxSelect('${id}', '${escapeHtml(i.id)}')">
        <p class="font-medium text-ink-900">${escapeHtml(i.label || '–')}</p>
        ${i.secondary ? `<p class="text-xs text-ink-500">${escapeHtml(i.secondary)}</p>` : ''}
      </div>
    `).join('');
  }
  dd.classList.remove('hidden');
}
function onComboboxSelect(id, value) {
  const item = (_comboboxData[id] || []).find(i => i.id === value);
  if (!item) return;
  const valEl = document.getElementById(id + '_value');
  const srEl  = document.getElementById(id + '_search');
  if (valEl) valEl.value = value;
  if (srEl)  srEl.value  = item.label || '';
  document.getElementById(id + '_dropdown')?.classList.add('hidden');
  const wrap = document.querySelector(`[data-combobox="${id.replace(/'/g,'')}"]`);
  const cbName = wrap?.getAttribute('data-onchange');
  if (cbName && typeof window[cbName] === 'function') window[cbName](value, id);
  // Synthetisches change-Event aufs Form, damit Listener (z.B. Live-Vorschau) reagieren
  const form = wrap?.closest('form');
  if (form) form.dispatchEvent(new Event('change', { bubbles: true }));
}
function onComboboxClear(id) {
  const valEl = document.getElementById(id + '_value');
  const srEl  = document.getElementById(id + '_search');
  if (valEl) valEl.value = '';
  if (srEl)  srEl.value  = '';
  document.getElementById(id + '_dropdown')?.classList.add('hidden');
  const wrap = document.querySelector(`[data-combobox="${id.replace(/'/g,'')}"]`);
  const cbName = wrap?.getAttribute('data-onchange');
  if (cbName && typeof window[cbName] === 'function') window[cbName]('', id);
}
// Klick außerhalb schließt offene Dropdowns
document.addEventListener('mousedown', (e) => {
  document.querySelectorAll('[data-combobox]').forEach(wrap => {
    if (!wrap.contains(e.target)) {
      const cbId = wrap.getAttribute('data-combobox');
      document.getElementById(cbId + '_dropdown')?.classList.add('hidden');
    }
  });
});

/* ============================================================
   ROUTING (Sidebar Nav-Items)
   ============================================================ */
let _currentRoute = 'welcome';
function dispatchRoute(route) {
  _currentRoute = route;
  closeDrawer();
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('bg-brand-700', b.dataset.route === route));
  switch (route) {
    case 'kunden':          renderCustomers(); break;
    case 'lieferanten':     renderSuppliers(); break;
    case 'artikel':         renderArticles(); break;
    case 'kontakte':        renderContactsList(); break;
    case 'anfragen':        renderInquiries(); break;
    case 'angebote':        renderQuotes(); break;
    case 'admin-companies': renderAdminCompanies(); break;
    case 'admin-users':     renderAdminUsers(); break;
    case 'admin-templates': renderAdminTextemplates(); break;
    case 'admin-bundles':   renderAdminQuoteBundles(); break;
    default:                renderWelcome();
  }
}
function initNavRouting() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    if (btn.classList.contains('disabled')) return;
    if (btn.dataset._wired) return;
    btn.dataset._wired = '1';
    btn.addEventListener('click', () => {
      const route = btn.dataset.route;
      if (route) dispatchRoute(route);
    });
  });
}

  const html = `

        <p class="font-medium ${archived ? 'text-ink-500 line-through' : 'text-ink-900'} truncate">${escapeHtml(f.name || '–')}</p>

async function uploadCompanyLogo(id, inputEl) {
  const file = inputEl?.files?.[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Datei zu groß (max 5 MB)', 'error'); return; }
  toast('Logo wird hochgeladen …', 'info', 1500);
  try {
    await uploadFileToRecord(id, 'logo', file);
    toast('Logo hochgeladen', 'success');
    // Form neu laden, damit das Preview aktualisiert
    closeModal();
    setTimeout(() => openCompanyEdit(id), 80);
  } catch (err) {
    toast('Upload fehlgeschlagen: ' + err.message, 'error');
  }
}

function generateApiKey() {
  const a = 'abcdefghijklmnopqrstuvwxyz0123456789';
  const arr = new Uint8Array(24);
  crypto.getRandomValues(arr);
  let s = '';
  for (let i = 0; i < 24; i++) s += a[arr[i] % a.length];
  return s;
}

async function initTemplateRichEditor(initialContent) {
  // Quill via CDN nachladen, falls noch nicht vorhanden
  if (!window.Quill) {
    await new Promise((resolve, reject) => {
      if (!document.getElementById('quillCss')) {
        const css = document.createElement('link');
        css.id = 'quillCss';
        css.rel = 'stylesheet';
        css.href = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css';
        document.head.appendChild(css);
      }
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    }).catch(() => {});
  }
  const editorEl = document.getElementById('tpl_content_editor');
  if (!editorEl || !window.Quill) return;
  registerQuillCustomSizes();
  const quill = new window.Quill(editorEl, {
    theme: 'snow',
    placeholder: 'Sehr {{kontakt.anrede}} {{kontakt.nachname}},\n\nvielen Dank für Ihre Anfrage …',
    modules: { toolbar: quillStandardToolbar() }
  });
  // Initial-Content laden — HTML-erkennen, sonst als plain text
  if (initialContent) {
    if (/<(p|br|strong|em|b|i|u|ol|ul|li|h[1-6]|span|div)\b/i.test(initialContent)) {
      quill.root.innerHTML = initialContent;
    } else {
      quill.setText(initialContent);
    }
  }
  // Bei jeder Änderung Hidden-Input synchronisieren
  const sync = () => {
    const hidden = document.getElementById('tpl_content_hidden');
    if (hidden) hidden.value = quill.root.innerHTML;
  };
  quill.on('text-change', sync);
  sync();
  window._tplQuill = quill;
}

async function updateTemplateVariablesPanel() {
  const docType = document.getElementById('tpl_doc_type')?.value || 'Angebot';
  const sysVars = TEMPLATE_VARIABLES[docType] || [];
  const panel = document.getElementById('tpl_vars_panel');
  if (!panel) return;
  // Custom-Variablen (CustomField) für diesen Doc-Typ + Mandant nachladen
  const cur = getCurrentCompany();
  let customVars = [];
  try {
    const all = await readData('CustomField');
    customVars = all
      .filter(cf => (cf.fields.company_id || []).includes(cur.id) &&
                    (cf.fields.doc_type || '') === docType &&
                    (cf.fields.status || 'aktiv') === 'aktiv')
      .map(cf => ({ name: cf.fields.name, label: (cf.fields.label || cf.fields.name) + ' (custom)' }));
  } catch (e) {}
  const vars = [...sysVars, ...customVars];
  if (vars.length === 0) {
    panel.innerHTML = '<p class="text-xs text-ink-500 italic">Für diesen Dokumenttyp sind noch keine Variablen definiert.</p>';
    return;
  }
  panel.innerHTML = vars.map(v => `
    <button type="button" onclick="insertTemplateVariable('${v.name}')" class="inline-flex items-center gap-1 mr-1 mb-1 px-2 py-1 text-xs bg-white border border-ink-200 rounded hover:border-brand-400 hover:bg-brand-50">
      <code class="font-mono text-brand-600">{{${escapeHtml(v.name)}}}</code>
      <span class="text-ink-500">${escapeHtml(v.label)}</span>
    </button>
  `).join('');
}

function insertTemplateVariable(varName) {
  const placeholder = '{{' + varName + '}}';
  // Bevorzugt Quill, Fallback auf altes Textarea
  if (window._tplQuill) {
    const q = window._tplQuill;
    const range = q.getSelection(true) || { index: q.getLength(), length: 0 };
    q.insertText(range.index, placeholder, 'user');
    q.setSelection(range.index + placeholder.length, 0);
    return;
  }
  const ta = document.getElementById('tpl_content');
  if (!ta) return;
  const start = ta.selectionStart || 0;
  const end   = ta.selectionEnd || 0;
  const before = ta.value.slice(0, start);
  const after  = ta.value.slice(end);
  ta.value = before + placeholder + after;
  ta.focus();
  const newPos = start + placeholder.length;
  ta.setSelectionRange(newPos, newPos);
}

async function saveTemplate(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  const fd = new FormData(e.target);
  const fields = {};
  ['name','doc_type','section','content','status'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  fields.is_default = fd.get('is_default') === 'on';
  if (!fields.name) return toast('Name fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  try {
    // Bei Standardvorlage: andere mit gleicher Doc-Typ+Section-Kombi entflaggen
    if (fields.is_default) {
      const all = await readData('Textemplate');
      const others = all.filter(t =>
        (t.fields.company_id || []).includes(cur.id) &&
        t.fields.doc_type === fields.doc_type &&
        t.fields.section  === fields.section &&
        t.fields.is_default &&
        t.id !== id
      );
      for (const o of others) {
        await updateData('Textemplate', o.id, { is_default: false });
      }
    }
    if (id) await updateData('Textemplate', id, fields);
    else    await writeData('Textemplate', fields);
    closeModal();
    renderAdminTextemplates();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

  try {

}

async function saveQuoteBundle(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) return toast('Mandant fehlt', 'error');
  const fd = new FormData(e.target);
  // Variablen-Werte (custom fields) sammeln
  const varValues = {};
  for (const [k, v] of fd.entries()) {
    if (k.startsWith('bundle_var_')) {
      const name = k.slice('bundle_var_'.length);
      const val = (v || '').toString();
      if (val !== '') varValues[name] = val;
    }
  }
  const fields = {
    name: (fd.get('name') || '').trim(),
    company_id: cur.id,
    status: 'aktiv',
    is_default: fd.get('is_default') === 'on',
    title_template_id:   (fd.get('title_template_id')   || '').trim(),
    intro_template_id:   (fd.get('intro_template_id')   || '').trim(),
    closing_template_id: (fd.get('closing_template_id') || '').trim(),
    layout_variant: (fd.get('layout_variant') || 'standard').trim(),
    attachment_ids: JSON.stringify(fd.getAll('bundle_attachment')),
    variable_values: Object.keys(varValues).length ? JSON.stringify(varValues) : '',
    force_closing_new_page: fd.get('force_closing_new_page') === 'on',
  };
  if (!fields.name) return toast('Name fehlt', 'error');
  try {
    // Wenn als Standard: andere Standards entflaggen
    if (fields.is_default) {
      const all = await readData('QuoteBundle').catch(()=>[]);
      const others = all.filter(b => b.fields.company_id === cur.id && b.fields.is_default && b.id !== id);
      for (const o of others) {
        try { await updateData('QuoteBundle', o.id, { is_default: false }); } catch(e) {}
      }
    }
    if (id) await updateData('QuoteBundle', id, fields);
    else    await writeData('QuoteBundle', fields);
    closeModal();
    renderAdminQuoteBundles();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleQuoteBundleDefault(id, makeDefault) {
  const cur = getCurrentCompany();
  try {
    if (makeDefault) {
      const all = await readData('QuoteBundle').catch(()=>[]);
      const others = all.filter(b => b.fields.company_id === cur.id && b.fields.is_default && b.id !== id);
      for (const o of others) {
        try { await updateData('QuoteBundle', o.id, { is_default: false }); } catch(e) {}
      }
    }
    await updateData('QuoteBundle', id, { is_default: makeDefault });
    renderAdminQuoteBundles();
  } catch (err) { toast(err.message, 'error'); }
}

async function generateLayoutWithAI() {
  const desc = (document.getElementById('layout_description')?.value || '').trim();
  if (!desc) { toast('Bitte erst eine Beschreibung eingeben', 'warn'); return; }
  if (!APP_KEYS.anthropicKey) { toast('KI nicht verfügbar — Anthropic-Key fehlt', 'error'); return; }
  const btn = document.getElementById('layoutAiBtn');
  const lbl = document.getElementById('layoutAiLbl');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'generiert…';
  const schemaHelp = `Generiere ein JSON-Objekt mit GENAU diesen Keys (alle erforderlich):
- fontBase: Body-Schrift (z.B. "12px", "13px", "14px")
- fontSmall: kleine Texte wie Tagline (z.B. "10px", "11px")
- fontTable: Tabellen-Schrift (z.B. "11px", "12px", "13px")
- fontTitle: 'Angebot'-Überschrift (z.B. "28px", "32px", "40px")
- titleWeight: 100-900 als String, z.B. "300" für leicht, "700" fett, "900" sehr fett
- titleColor: Hex-Farbe für Titel z.B. "#0F172A"
- titleAlign: "left", "center" oder "right"
- bodyColor: Hex-Farbe für normalen Text z.B. "#0F172A"
- accentColor: Hex-Farbe für Footer-Linie / Akzente z.B. "#1FA8D6"
- colsGap: Lücke zwischen Spalten oben (z.B. "1rem", "1.5rem", "2rem")
- sectionGap: Abstand zwischen Sektionen (z.B. "1rem", "1.5rem", "2rem")
- metaLabelBold: true/false — Meta-Spalten-Labels fett
- bezeichnungBold: true/false — Bezeichnung in Tabelle fett
- totalBold: true/false — Gesamtbetrag fett
- tableHeaderBg: Hex oder "transparent" — Hintergrund des Tabellen-Headers
- tableHeaderColor: Hex — Schriftfarbe des Tabellen-Headers
- tableHeaderWeight: "400", "500", "600", "700" — Gewicht des Tabellen-Headers`;
  const prompt = `Du bist ein Designer für Geschäftsdokumente (Angebote/Rechnungen). Erstelle eine Layout-Konfiguration basierend auf dieser Beschreibung:

"${desc}"

${schemaHelp}

WICHTIG:
- Antworte NUR mit dem reinen JSON-Objekt, kein Text drumherum, keine Code-Blöcke.
- Verwende sinnvolle Werte basierend auf der Beschreibung.
- Halte die Werte modern und gut lesbar.
- Standard-Body 12-14px ist üblich, Titel 28-40px.`;
  try {
    const result = await askAI(prompt, { maxTokens: 1200 });
    let cleaned = result.trim().replace(/^```(?:json)?\n?/i, '').replace(/\n?```$/, '').trim();
    // Validieren als JSON
    let parsed;
    try { parsed = JSON.parse(cleaned); }
    catch (e) { throw new Error('AI-Antwort ist kein valides JSON: ' + e.message); }
    // In Form schreiben
    const ta = document.getElementById('layout_config_json');
    if (ta) ta.value = JSON.stringify({ ...LAYOUT_DEFAULT_CONFIG, ...parsed }, null, 2);
    toast('Layout generiert — bei Bedarf JSON nachjustieren', 'success');
  } catch (err) {
    toast('Generierung fehlgeschlagen: ' + err.message, 'error', 5000);
  } finally {
    if (btn) btn.disabled = false;
    if (lbl) lbl.textContent = 'Mit KI generieren';
  }
}

async function saveLayout(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) return toast('Mandant fehlt', 'error');
  const fd = new FormData(e.target);
  const cfgRaw = (fd.get('config_json') || '').trim();
  // Validieren
  try { JSON.parse(cfgRaw || '{}'); }
  catch (err) { return toast('JSON ungültig: ' + err.message, 'error', 5000); }
  const fields = {
    name: (fd.get('name') || '').trim(),
    company_id: cur.id,
    status: 'aktiv',
    is_default: fd.get('is_default') === 'on',
    description: (fd.get('description') || '').trim(),
    config_json: cfgRaw,
  };
  if (!fields.name) return toast('Name fehlt', 'error');
  try {
    if (fields.is_default) {
      const all = await readData('Layout').catch(()=>[]);
      const others = all.filter(l => l.fields.company_id === cur.id && l.fields.is_default && l.id !== id);
      for (const o of others) { try { await updateData('Layout', o.id, { is_default: false }); } catch(e) {} }
    }
    if (id) await updateData('Layout', id, fields);
    else    await writeData('Layout', fields);
    closeModal();
    renderAdminLayouts();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleLayoutDefault(id, makeDefault) {
  const cur = getCurrentCompany();
  try {
    if (makeDefault) {
      const all = await readData('Layout').catch(()=>[]);
      const others = all.filter(l => l.fields.company_id === cur.id && l.fields.is_default && l.id !== id);
      for (const o of others) { try { await updateData('Layout', o.id, { is_default: false }); } catch(e) {} }
    }
    await updateData('Layout', id, { is_default: makeDefault });
    renderAdminLayouts();
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteLayout(id) {
  if (!confirm('Layout wirklich löschen?')) return;
  try {
    await deleteData('Layout', id);
    renderAdminLayouts();
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function addCustomField() {
  const name = prompt('Platzhalter-Name (ohne Klammern, z.B. „rabatt_zusatz" — Kleinbuchstaben/Zahlen/Unterstriche):');

  const sanitized = name.trim().toLowerCase().replace(/[^a-z0-9_.]/g, '_').replace(/_+/g, '_');

  const label = prompt('Anzeigename (z.B. „Rabatt-Zusatz"):', sanitized) || sanitized;

      company_id: [cur.id],
      status: 'aktiv'

async function generateTemplateWithAI() {
  const briefEl = document.getElementById('tpl_ai_brief');
  const brief = (briefEl?.value || '').trim();
  if (!brief) { toast('Bitte erst eine Beschreibung eingeben', 'warn'); return; }
  if (!APP_KEYS.anthropicKey) { toast('KI nicht verfügbar — Anthropic-Key fehlt', 'error'); return; }
  const docType = document.getElementById('tpl_doc_type')?.value || 'Angebot';
  const section = document.querySelector('#modalBox select[name="section"]')?.value || 'Einleitung';
  const quill = window._tplQuill;
  const currentText = quill ? quill.getText().trim() : (document.getElementById('tpl_content')?.value || '').trim();
  if (currentText && !confirm('Aktuellen Inhalt durch KI-generierten Text ersetzen?')) return;

  const vars = TEMPLATE_VARIABLES[docType] || [];
  const varsList = vars.map(v => `- {{${v.name}}} → ${v.label}`).join('\n');

  const prompt = `Du bist Vertriebsassistent bei FLP Lift Parts GmbH (B2B-Großhandel für Aufzug-Ersatzteile in Deutschland).

Erstelle eine professionelle deutsche Textvorlage für folgenden Kontext:
- Dokumenttyp: ${docType}
- Sektion: ${section}

Verfügbare Platzhalter (verwende sie wo es sinnvoll ist; keine erfundenen Platzhalter — nur diese hier):
${varsList || '(keine Platzhalter definiert)'}

Beschreibung der gewünschten Vorlage:
${brief}

WICHTIG:
- Antworte NUR mit dem reinen Vorlagen-Text, keine Erklärung, keine Code-Blöcke, kein Markdown drumherum.
- Verwende die Platzhalter exakt im Format {{name.subname}}.
- Schreibe in der Sie-Form, höflich und geschäftlich.
- Halte den Text knapp und natürlich — keine Floskel-Schwalle.`;

  const btn = document.getElementById('tpl_ai_btn');
  const lbl = document.getElementById('tpl_ai_label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'generiert…';
  try {
    const result = await askAI(prompt, { maxTokens: 1500 });
    // Falls die KI doch Code-Block-Markdown drum macht, abstreifen
    let cleaned = result.trim();
    cleaned = cleaned.replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/, '').trim();
    if (quill) {
      quill.setText(cleaned);
      // Hidden-Input syncen
      const hidden = document.getElementById('tpl_content_hidden');
      if (hidden) hidden.value = quill.root.innerHTML;
    } else {
      const ta = document.getElementById('tpl_content');
      if (ta) ta.value = cleaned;
    }
    toast('Vorlage generiert', 'success');
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    if (btn) btn.disabled = false;
    if (lbl) lbl.textContent = 'Generieren';
  }
}

const _customerListState = { search: '', sort: 'name', showArchived: false, viewMode: 'standard' };
function setCustomerViewMode(mode) { _customerListState.viewMode = mode; renderCustomers(); }
let _customerSearchTimer = null;

async function nextCustomerNo(companyId) {
  const all = await readData('Customer');
  const inCo = all.filter(c => (c.fields.company_id || []).includes(companyId));
  let max = 1000;
  inCo.forEach(c => {
    const m = (c.fields.customer_no || '').match(/^K-(\d+)$/);
    if (m) {
      const n = parseInt(m[1], 10);
      if (n > max) max = n;
    }
  });
  return 'K-' + (max + 1);
}

async function renderCustomers() {
  setPageTitle('Kunden');

  if (!cur) {
    document.getElementById('pageContent').innerHTML = `
      <div class="max-w-3xl mx-auto">

  document.getElementById('pageContent').innerHTML = '<p class="text-ink-500 text-sm">Lade Kunden…</p>';

  try {
    [all, allContacts] = await Promise.all([readData('Customer'), readData('Contact')]);
  } catch (e) { toast(e.message, 'error'); }

  // Map: customerId → primärer Ansprechpartner
  const primaryByCust = {};
  allContacts.forEach(c => {
    if (c.fields.is_primary) {
      const cid = (c.fields.customer_id || [])[0];
      if (cid && !primaryByCust[cid]) primaryByCust[cid] = c.fields;
    }
  });

  let list = all.filter(c => (c.fields.company_id || []).includes(cur.id));
  if (!_customerListState.showArchived) list = list.filter(c => (c.fields.status || 'aktiv') !== 'archiviert');

  const q = _customerListState.search.trim().toLowerCase();
  if (q) {
    list = list.filter(c => {
      const f = c.fields;
      const primary = primaryByCust[c.id];
      return [f.name1, f.name2, f.customer_no, f.city, f.email, primary?.first_name, primary?.last_name, primary?.name, primary?.email]
        .some(v => (v || '').toLowerCase().includes(q));
    });
  }

  const sortKey = _customerListState.sort;

    if (sortKey === 'customer_no') {

      const bv = parseInt((b.fields.customer_no || '').replace(/\D/g, ''), 10) || 0;
      return av - bv;

    const av = (a.fields[sortKey === 'city' ? 'city' : 'name1'] || '').toLowerCase();

        </button>
      </div>
      <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px]">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input id="customerSearch" type="search" value="${escapeHtml(_customerListState.search)}" placeholder="Suchen…" oninput="onCustomerSearchInput(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          </div>
          <label class="text-xs text-ink-500">Sortierung:</label>
          <select onchange="_customerListState.sort=this.value;renderCustomers()" class="text-sm border border-ink-200 rounded-lg px-2 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            <option value="name" ${sortKey==='name'?'selected':''}>Name</option>
            <option value="customer_no" ${sortKey==='customer_no'?'selected':''}>Kundennr.</option>
            <option value="city" ${sortKey==='city'?'selected':''}>Ort</option>
          </select>
          <label class="flex items-center gap-2 text-xs text-ink-700 ml-1">
            <input type="checkbox" ${_customerListState.showArchived?'checked':''} onchange="_customerListState.showArchived=this.checked;renderCustomers()" class="w-4 h-4 rounded border-ink-300">
            <span>auch archivierte</span>
          </label>

// Hilfsfunktion: rendert + stellt danach Fokus + Cursor-Position des aktiven Such-Inputs wieder her
async function _renderWithSearchFocus(renderFn) {
  const active = document.activeElement;
  const wasSearch = active?.tagName === 'INPUT' && active?.type === 'search';
  const cursorPos = wasSearch ? active.selectionStart : null;
  const inputId = wasSearch ? active.id : null;
  await renderFn();
  if (wasSearch) {
    let inp = inputId ? document.getElementById(inputId) : null;
    if (!inp) inp = document.querySelector('#pageContent input[type="search"]');
    if (inp) {
      inp.focus();
      if (cursorPos != null) try { inp.setSelectionRange(cursorPos, cursorPos); } catch (e) {}
    }
  }
}

async function saveCustomer(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  const fd = new FormData(e.target);
  const fields = {};
  ['name1','name2','customer_no','street','zip','city','country','email','phone','website','vat_id','payment_terms','delivery_terms','status','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  // Lock beim Speichern direkt freigeben (im selben PATCH)
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    if (id) await updateData('Customer', id, fields);
    else    await writeData('Customer', fields);
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    closeModal();
    renderCustomers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleCustomerArchive(id, archive) {
  try {
    await updateData('Customer', id, { status: archive ? 'archiviert' : 'aktiv' });
    renderCustomers();
    toast(archive ? 'Archiviert' : 'Reaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

const _supplierListState = { search: '', sort: 'name', showArchived: false, viewMode: 'standard' };
function setSupplierViewMode(mode) { _supplierListState.viewMode = mode; renderSuppliers(); }
let _supplierSearchTimer = null;

async function nextSupplierNo(companyId) {
  const all = await readData('Supplier');
  const inCo = all.filter(s => (s.fields.company_id || []).includes(companyId));
  let max = 1000;
  inCo.forEach(s => {
    const m = (s.fields.supplier_no || '').match(/^L-(\d+)$/);
    if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
  });
  return 'L-' + (max + 1);
}

async function renderSuppliers() {
  setPageTitle('Lieferanten');
  const cur = getCurrentCompany();
  if (!cur) {
    document.getElementById('pageContent').innerHTML = `
      <div class="max-w-3xl mx-auto"><div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-amber-900">Kein Mandant ausgewählt. Bitte links eine Firma wählen.</div></div>`;

  let all = [], allContacts = [];

    [all, allContacts] = await Promise.all([readData('Supplier'), readData('Contact')]);
  } catch (e) { toast(e.message, 'error'); }

  const primaryBySup = {};
  allContacts.forEach(c => {
    if (c.fields.is_primary) {
      const sid = (c.fields.supplier_id || [])[0];
      if (sid && !primaryBySup[sid]) primaryBySup[sid] = c.fields;
    }
  });

  let list = all.filter(s => (s.fields.company_id || []).includes(cur.id));
  if (!_supplierListState.showArchived) list = list.filter(s => (s.fields.status || 'aktiv') !== 'archiviert');

      const f = s.fields;
      const primary = primaryBySup[s.id];
      return [f.name1, f.name2, f.supplier_no, f.city, f.email, primary?.first_name, primary?.last_name, primary?.name, primary?.email]
        .some(v => (v || '').toLowerCase().includes(q));
    });

  const sortKey = _supplierListState.sort;

    if (sortKey === 'supplier_no') {

      const bv = parseInt((b.fields.supplier_no || '').replace(/\D/g, ''), 10) || 0;
      return av - bv;
    }

    const bv = (b.fields[sortKey === 'city' ? 'city' : 'name1'] || '').toLowerCase();
    return av.localeCompare(bv, 'de');

        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">

            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input type="search" value="${escapeHtml(_supplierListState.search)}" placeholder="Suchen…" oninput="onSupplierSearchInput(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          </div>
          <label class="text-xs text-ink-500">Sortierung:</label>

            <option value="name" ${sortKey==='name'?'selected':''}>Name</option>
            <option value="supplier_no" ${sortKey==='supplier_no'?'selected':''}>Lieferantennr.</option>
            <option value="city" ${sortKey==='city'?'selected':''}>Ort</option>
          </select>
          <label class="flex items-center gap-2 text-xs text-ink-700 ml-1">
            <input type="checkbox" ${_supplierListState.showArchived?'checked':''} onchange="_supplierListState.showArchived=this.checked;renderSuppliers()" class="w-4 h-4 rounded border-ink-300">
            <span>auch archivierte</span>
          </label>
          <div class="ml-auto">${viewModeToggle(_supplierListState.viewMode, 'setSupplierViewMode')}</div>

        ${(() => {
          const vm = _supplierListState.viewMode;
          if (list.length === 0) return `<div class="p-10 text-center text-ink-500 text-sm">${q || _supplierListState.showArchived ? 'Keine Treffer.' : 'Noch keine Lieferanten für diesen Mandanten. Lege den ersten an mit „+ Neuer Lieferant".'}</div>`;

                <table class="w-full text-sm">
                  <thead class="bg-ink-50 text-xs uppercase tracking-wider text-ink-500"><tr>

            return '<div class="divide-y divide-ink-100">' + list.map(rec => supplierRowKompakt(rec)).join('') + '</div>';
          }
          return '<div class="divide-y divide-ink-100">' + list.map(rec => supplierRow(rec, primaryBySup[rec.id])).join('') + '</div>';
        })()}
      </div>
    </div>

  if (window.lucide) lucide.createIcons();

async function saveSupplier(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  const fd = new FormData(e.target);
  const fields = {};
  ['name1','name2','supplier_no','street','zip','city','country','email','phone','website','vat_id','payment_terms','status','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    if (id) await updateData('Supplier', id, fields);
    else    await writeData('Supplier', fields);
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    closeModal();
    renderSuppliers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleSupplierArchive(id, archive) {
  try {
    await updateData('Supplier', id, { status: archive ? 'archiviert' : 'aktiv' });
    renderSuppliers();
    toast(archive ? 'Archiviert' : 'Reaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

const _articleListState = { search: '', sort: 'name', showArchived: false, viewMode: 'standard' };
function setArticleViewMode(mode) { _articleListState.viewMode = mode; renderArticles(); }

const ART_CATEGORY_DEFAULTS = ['Frequenzumrichter'];
const ART_UNIT_DEFAULTS = ['Stück'];

function parseDecimal(str) {
  if (str === null || str === undefined) return null;
  const s = String(str).trim();
  if (!s) return null;
  const n = parseFloat(s.replace(/\./g, '').replace(',', '.'));
  return isNaN(n) ? null : n;
}
function formatPrice(n) {
  if (n === null || n === undefined || n === '') return '';
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}
function distinctValues(records, field, defaults) {
  const set = new Set(defaults || []);
  records.forEach(r => {
    const v = String(r.fields?.[field] || '').trim();
    if (v) set.add(v);
  });
  return [...set].sort((a, b) => a.localeCompare(b, 'de'));
}

async function nextArticleNo(companyId) {
  const all = await readData('Article');
  const inCo = all.filter(a => (a.fields.company_id || []).includes(companyId));
  let max = 10000;
  inCo.forEach(a => {
    const m = (a.fields.article_no || '').match(/^A-(\d+)$/);
    if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
  });
  return 'A-' + (max + 1);
}

  const q = _articleListState.search.trim().toLowerCase();

    list = list.filter(a => {
      const f = a.fields;

      const manId = (f.manufacturer_id || [])[0];

      const manName = manMap[manId]?.name || f.manufacturer || '';
      return [f.name1, f.name2, f.article_no, f.description, catName, manName, f.manufacturer_no]
        .some(v => (v || '').toString().toLowerCase().includes(q));
    });
  }

  const sortKey = _articleListState.sort;
  const catName = a => {
    const cid = (a.fields.category_id || [])[0];
    return (catMap[cid]?.name || a.fields.category || '').toLowerCase();
  };
  list.sort((a, b) => {
    if (sortKey === 'article_no') {
      const av = parseInt((a.fields.article_no || '').replace(/\D/g, ''), 10) || 0;
      const bv = parseInt((b.fields.article_no || '').replace(/\D/g, ''), 10) || 0;
      return av - bv;

    if (sortKey === 'category') {
      const cmp = catName(a).localeCompare(catName(b), 'de');
      if (cmp !== 0) return cmp;

            <i data-lucide="tags" class="w-4 h-4"></i> Kategorien
          </button>

          </button>

            <i data-lucide="plus" class="w-4 h-4"></i> Neuer Artikel
          </button>
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px]">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input type="search" value="${escapeHtml(_articleListState.search)}" placeholder="Suchen (Name, Nr., Hersteller, EAN…)" oninput="onArticleSearchInput(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">

async function saveArticle(e, id, keepOpen) {
  if (e && e.preventDefault) e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Form-Element finden (entweder direkt das Submit-Form, oder das nächstgelegene Form vom Button)
  const form = e?.target?.tagName === 'FORM' ? e.target : (e?.target?.closest?.('form') || document.querySelector('#modalBox form'));
  if (!form) return;
  const fd = new FormData(form);
  const fields = {
    name1:           (fd.get('name1') || '').trim(),
    name2:           (fd.get('name2') || '').trim(),
    article_no:      (fd.get('article_no') || '').trim(),
    description:     (fd.get('description') || '').trim(),
    manufacturer_no: (fd.get('manufacturer_no') || '').trim(),
    unit:            (fd.get('unit') || '').trim(),
    status:          fd.get('status') || 'aktiv',
    notes:           (fd.get('notes') || '').trim()
  };
  const sales    = parseDecimal(fd.get('sales_price'));
  const purchase = parseDecimal(fd.get('purchase_price'));
  const vat      = parseDecimal(fd.get('vat_rate'));
  if (sales    !== null) fields.sales_price    = sales;
  if (purchase !== null) fields.purchase_price = purchase;
  if (vat      !== null) fields.vat_rate       = vat;
  const catId = (fd.get('category_id') || '').trim();
  const manId = (fd.get('manufacturer_id') || '').trim();
  fields.category_id     = catId ? [catId] : [];
  fields.manufacturer_id = manId ? [manId] : [];

  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    let savedId = id;
    if (id) {
      await updateData('Article', id, fields);
    } else {
      const created = await writeData('Article', fields);
      savedId = created.id;
    }
    // Bestelltext aller verknüpften ArticleSupplier-Records mit der neuen Beschreibung syncen
    if (savedId) {
      try {
        const newOrderText = [fields.name1, fields.name2, fields.description].filter(Boolean).join('\n');
        const all = await readData('ArticleSupplier');
        const linked = all.filter(j => (j.fields.article_id || []).includes(savedId));
        for (const j of linked) {
          if ((j.fields.order_text || '') !== newOrderText) {
            await updateData('ArticleSupplier', j.id, { order_text: newOrderText });
          }
        }
      } catch (e) {}
    }
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    if (keepOpen) {
      closeModal();
      toast('Gespeichert — Modal bleibt offen', 'success');
      // Nach dem Schließen das Modal wieder im Edit-Modus öffnen (löst neuen Lock aus)
      setTimeout(() => openArticleModal(savedId), 60);
    } else {
      closeModal();
      renderArticles();
      toast('Gespeichert', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

async function copyDefaultSupplierPrice(articleId) {
  if (!articleId) {
    toast('Bitte zuerst „Speichern" — danach steht der Hauptlieferant fest', 'warn');
    return;
  }
  try {
    const all = await readData('ArticleSupplier');
    const def = all.find(j => (j.fields.article_id || []).includes(articleId) && j.fields.is_default);
    if (!def) { toast('Kein Hauptlieferant zugeordnet', 'warn'); return; }
    const price = def.fields.purchase_price;
    if (price === undefined || price === null || price === '') {
      toast('Hauptlieferant hat keinen EK-Preis', 'warn');
      return;
    }
    const inp = document.getElementById('art_purchase_price');
    if (inp) {
      inp.value = price;
      toast('EK übernommen: ' + formatPrice(price) + ' €', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleArticleArchive(id, archive) {
  try {
    await updateData('Article', id, { status: archive ? 'archiviert' : 'aktiv' });
    renderArticles();
    toast(archive ? 'Archiviert' : 'Reaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function nextInquiryNo(companyId) {
  const all = await readData('Inquiry');
  const inCo = all.filter(i => (i.fields.company_id || []).includes(companyId));
  let max = 1000;
  inCo.forEach(i => {
    const m = (i.fields.inquiry_no || '').match(/^AN-(\d+)$/);
    if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
  });
  return 'AN-' + (max + 1);
}

          const vm = _inquiryListState.viewMode;
          if (list.length === 0) return `<div class="p-10 text-center text-ink-500 text-sm">${q || _inquiryListState.status !== 'alle' ? 'Keine Treffer.' : 'Noch keine Anfragen. Lege die erste an mit „+ Neue Anfrage".'}</div>`;

            return `
              <div class="overflow-x-auto">

          }
          return '<div class="divide-y divide-ink-100">' + list.map(rec => inquiryRow(rec, custMap)).join('') + '</div>';
        })()}
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

function inquiryStatusBadge(status) {
  const map = {
    'offen':           ['bg-blue-100 text-blue-700', 'offen'],
    'in_bearbeitung':  ['bg-amber-100 text-amber-700', 'in Bearbeitung'],
    'beantwortet':     ['bg-emerald-100 text-emerald-700', 'beantwortet'],
    'abgelehnt':       ['bg-red-100 text-red-700', 'abgelehnt'],
    'archiviert':      ['bg-ink-200 text-ink-600', 'archiviert']
  };
  const [cls, label] = map[status] || map['offen'];
  return `<span class="text-[10px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded ${cls}">${label}</span>`;
}

function onInquiryCustomerChange() {
  const cid = document.getElementById('inq_customer_select')?.value;
  // Refresh contact dropdown
  const select = document.getElementById('inq_contact_select');
  if (!select) return;
  if (!cid) { select.innerHTML = '<option value="">— nicht zugeordnet —</option>'; return; }
  readData('Contact').then(all => {
    const list = all.filter(c => (c.fields.customer_id || []).includes(cid));
    const primaryId = findPrimaryContactId(all, cid, 'customer');
    select.innerHTML = '<option value="">— nicht zugeordnet —</option>' +
      list.map(c => `<option value="${c.id}" ${primaryId === c.id ? 'selected' : ''}>${escapeHtml(contactDisplayName(c.fields))}${c.fields.role ? ' · ' + escapeHtml(c.fields.role) : ''}</option>`).join('');
  });
}

function addInquiryImages(files) {
  if (!files || !files.length) return;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 8 * 1024 * 1024) { toast('Bild zu groß: ' + file.name + ' (max 8 MB)', 'warn'); continue; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      _inquiryImages.push({ name: file.name, mediaType: file.type, base64, dataUrl });
      renderInquiryImagesPreview();
    };
    reader.readAsDataURL(file);
  }
}

function removeInquiryImage(index) {
  _inquiryImages.splice(index, 1);
  renderInquiryImagesPreview();
}

function renderInquiryImagesPreview() {
  const wrap = document.getElementById('inq_images_preview');
  if (!wrap) return;
  if (_inquiryImages.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = _inquiryImages.map((img, i) => `
    <div class="relative w-20 h-20 rounded-lg overflow-hidden border border-ink-200 bg-ink-50">
      <img src="${img.dataUrl}" alt="${escapeHtml(img.name)}" class="w-full h-full object-cover">
      <button type="button" onclick="removeInquiryImage(${i})" class="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/60 hover:bg-black/80 text-white flex items-center justify-center" title="Entfernen">
        <i data-lucide="x" class="w-3 h-3"></i>
      </button>
    </div>
  `).join('');
  if (window.lucide) lucide.createIcons();
}

function toggleInquiryVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return toast('Browser unterstützt keine Spracheingabe', 'warn');
  if (_inquirySpeech) {
    try { _inquirySpeech.stop(); } catch(e){}
    _inquirySpeech = null;
    document.getElementById('inq_voice_label').textContent = 'Aufnehmen';
    document.getElementById('inq_voice_btn').classList.remove('bg-red-50','border-red-300');
    return;
  }
  const r = new SpeechRecognition();
  r.lang = 'de-DE';
  r.continuous = true;
  r.interimResults = true;
  let finalText = (document.getElementById('inq_voice_text')?.value || '').trim();
  r.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText = (finalText + ' ' + t).trim();
      } else {
        interim += t;
      }
    }
    const ta = document.getElementById('inq_voice_text');
    if (ta) ta.value = (finalText + (interim ? ' ' + interim : '')).trim();
  };
  r.onerror = (e) => { toast('Spracheingabe-Fehler: ' + e.error, 'error'); _inquirySpeech = null; document.getElementById('inq_voice_label').textContent = 'Aufnehmen'; };
  r.onend = () => {
    if (_inquirySpeech === r) {
      _inquirySpeech = null;
      const lbl = document.getElementById('inq_voice_label'); if (lbl) lbl.textContent = 'Aufnehmen';
      document.getElementById('inq_voice_btn')?.classList.remove('bg-red-50','border-red-300');
    }
  };
  r.start();
  _inquirySpeech = r;
  document.getElementById('inq_voice_label').textContent = 'Stoppen';
  document.getElementById('inq_voice_btn').classList.add('bg-red-50','border-red-300');
}

async function analyzeInquiry() {
  const rawText   = (document.getElementById('inq_raw_text')?.value   || '').trim();
  const voiceText = (document.getElementById('inq_voice_text')?.value || '').trim();
  const title     = (document.querySelector('#modalBox input[name="title"]')?.value || '').trim();
  const ticketNo  = (document.querySelector('#modalBox input[name="ticket_no"]')?.value || '').trim();
  if (!rawText && !voiceText && _inquiryImages.length === 0) {
    return toast('Bitte erst Text, Sprache oder Bilder hinzufügen', 'warn');
  }
  if (!APP_KEYS.anthropicKey) {
    return toast('KI nicht verfügbar — Anthropic-Key fehlt in den Projekt-Keys', 'error');
  }
  const btn = document.getElementById('inq_analyze_btn');
  const lbl = document.getElementById('inq_analyze_label');
  if (btn) btn.disabled = true;
  if (lbl) lbl.textContent = 'analysiert…';

  const promptParts = [
    'Du bist Vertriebsassistent bei FLP Lift Parts (B2B-Großhandel für Aufzug-Ersatzteile in Deutschland).',
    'Analysiere die folgende Kundenanfrage und gib eine strukturierte Zusammenfassung in deutscher Sprache zurück.',
    '',
    'Format der Antwort (genau dieses Schema, Markdown-Stil):',
    '',
    '**Zusammenfassung**',
    '<2-3 Sätze: Was will der Kunde konkret?>',
    '',
    '**Kundenidentifikation**',
    '- Firma: <Firmenname falls erkennbar, sonst „—">',
    '- Email: <falls erkennbar>',
    '- Telefon: <falls erkennbar>',
    '- Adresse: <falls erkennbar>',
    '',
    '**Hauptansprechpartner**',
    '- Name: <Vor- und Nachname>',
    '- Funktion: <falls erkennbar>',
    '- Email/Telefon: <falls erkennbar>',
    '',
    '**Angefragte Artikel / Leistungen**',
    '- Menge | Hersteller | Modell/Bezeichnung | Bemerkung',
    '<eine Zeile pro Position; falls nichts klar erkennbar: „— Keine konkreten Positionen erkennbar —">',
    '',
    '**Besondere Anforderungen**',
    '<z.B. Liefertermin, Eilauftrag, Sondergrößen, Reklamation, Service. Falls keine: „— Keine —">',
    '',
    '---',
    ''
  ];
  if (title)     promptParts.push('Betreff: ' + title);
  if (ticketNo)  promptParts.push('Freshdesk-Ticket: ' + ticketNo);
  if (rawText)   promptParts.push('\nText/Email:\n' + rawText);
  if (voiceText) promptParts.push('\nSpracheingabe (transkribiert):\n' + voiceText);
  if (_inquiryImages.length) promptParts.push('\n' + _inquiryImages.length + ' Bild' + (_inquiryImages.length === 1 ? '' : 'er') + ' anbei (siehe Anhang).');
  const prompt = promptParts.join('\n');

  try {
    const summary = await askAI(prompt, {
      images: _inquiryImages.map(i => ({ mediaType: i.mediaType, data: i.base64 })),
      maxTokens: 2048
    });
    const ta = document.getElementById('inq_ai_summary');
    if (ta) ta.value = summary;
    toast('Analyse fertig', 'success');
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    if (btn) btn.disabled = false;
    if (lbl) lbl.textContent = 'Analysieren';
  }
}

async function saveInquiry(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Sprach-Recognition stoppen falls noch aktiv
  if (_inquirySpeech) { try { _inquirySpeech.stop(); } catch(e){} _inquirySpeech = null; }
  const fd = new FormData(e.target);
  const fields = {};
  ['inquiry_no','title','ticket_no','channel','status','raw_text','voice_text','ai_summary','notes'].forEach(k => {

  fields.customer_id = cidSel ? [cidSel] : [];
  fields.contact_id  = conSel ? [conSel] : [];
  if (!fields.title) return toast('Betreff fehlt', 'error');
  fields.status = fields.status || 'offen';
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    if (id) await updateData('Inquiry', id, fields);
    else    await writeData('Inquiry', fields);
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    closeModal();
    renderInquiries();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

function _parseInquiryAiResponse(text) {
  const r = { title: '', ticket_no: '', channel: '', customer_hint: '', contact_hint: '', summary: '' };
  const lines = text.split('\n');
  let inSummary = false;
  const summaryLines = [];
  for (const line of lines) {
    if (inSummary) { summaryLines.push(line); continue; }
    let m;
    if ((m = line.match(/^TITLE:\s*(.+)$/i)))         { r.title = m[1].trim(); continue; }
    if ((m = line.match(/^TICKET:\s*(.+)$/i)))        { r.ticket_no = m[1].trim(); continue; }
    if ((m = line.match(/^CHANNEL:\s*(.+)$/i)))       { r.channel = m[1].trim(); continue; }
    if ((m = line.match(/^CUSTOMER_HINT:\s*(.+)$/i))) { r.customer_hint = m[1].trim(); continue; }
    if ((m = line.match(/^CONTACT_HINT:\s*(.+)$/i)))  { r.contact_hint = m[1].trim(); continue; }
    if (/^ZUSAMMENFASSUNG:/i.test(line))              { inSummary = true; continue; }
  }
  r.summary = summaryLines.join('\n').trim();
  // "leer" oder "—" als leer interpretieren
  ['ticket_no','customer_hint','contact_hint'].forEach(k => {
    const v = r[k].toLowerCase();
    if (v === 'leer' || v === 'keine' || v === '—' || v === '-' || v === 'unbekannt') r[k] = '';
  });
  // Channel normalisieren
  const ch = r.channel.toLowerCase();
  if (ch.includes('email'))           r.channel = 'Email';
  else if (ch.includes('telefon'))    r.channel = 'Telefon';
  else if (ch.includes('web'))        r.channel = 'Web';
  else if (ch.includes('person'))     r.channel = 'Persönlich';
  else                                r.channel = 'Email';
  return r;
}

function _matchCustomerByHint(hint, customers, companyId) {
  if (!hint) return '';
  const hintLow = hint.toLowerCase();
  const inCo = customers.filter(c => (c.fields.company_id || []).includes(companyId));
  // Exact match auf name1 oder name2
  for (const c of inCo) {
    if ((c.fields.name1 || '').toLowerCase() === hintLow) return c.id;
    if ((c.fields.name2 || '').toLowerCase() === hintLow) return c.id;
  }
  // Substring beidseitig
  for (const c of inCo) {
    const n1 = (c.fields.name1 || '').toLowerCase();
    if (n1 && (n1.includes(hintLow) || hintLow.includes(n1))) return c.id;
  }
  return '';
}

function _matchContactByHint(hint, contacts, customerId) {
  if (!hint || !customerId) return '';
  const hintLow = hint.toLowerCase();
  const list = contacts.filter(c => (c.fields.customer_id || []).includes(customerId));
  for (const c of list) {
    const full = ((c.fields.first_name || '') + ' ' + (c.fields.last_name || c.fields.name || '')).trim().toLowerCase();
    if (full === hintLow) return c.id;
    if (full && (full.includes(hintLow) || hintLow.includes(full))) return c.id;
  }
  return '';
}

async function toggleQuoteArchive(id, archive) {
  const newStatus = archive ? 'archiviert' : 'Entwurf';
  // Bisherigen Status holen — für Undo
  let prevStatus = 'Entwurf';
  try {
    const all = await readData('Quote');
    prevStatus = all.find(r => r.id === id)?.fields?.status || 'Entwurf';
  } catch (e) {}
  try {
    await updateData('Quote', id, { status: newStatus });
    recordUndoableAction({
      label: archive ? 'Angebot archiviert' : 'Wiederhergestellt',
      undo: async () => { await updateData('Quote', id, { status: prevStatus }); if (typeof renderQuotes === 'function') renderQuotes(); },
      redo: async () => { await updateData('Quote', id, { status: newStatus });  if (typeof renderQuotes === 'function') renderQuotes(); }
    });
    toast(archive ? 'Archiviert (Rückgängig oben)' : 'Wiederhergestellt', 'success', 1800);
    if (typeof renderQuotes === 'function') renderQuotes();
  } catch (e) { toast('Fehler: ' + e.message, 'error'); }
}

/* === Undo/Redo Stack ===
   Aktionen registrieren ihre Inverse via recordUndoableAction({undo, redo, label}).
   Buttons in Toolbars rufen performUndo/Redo auf. Stack max 30 Einträge. */
window._undoActions = window._undoActions || [];
window._redoActions = window._redoActions || [];

function recordUndoableAction(action) {
  window._undoActions.push(action);
  if (window._undoActions.length > 30) window._undoActions.shift();
  window._redoActions = []; // bei neuer Aktion: Redo-Stack leeren
  updateUndoButtons();
}

async function performUndo() {
  const action = window._undoActions.pop();
  if (!action) return;
  try {
    await action.undo();
    window._redoActions.push(action);
    toast('↶ ' + action.label, 'info', 1500);
  } catch (e) { toast('Rückgängig fehlgeschlagen: ' + e.message, 'error'); }
  updateUndoButtons();
}

async function performRedo() {
  const action = window._redoActions.pop();
  if (!action) return;
  try {
    await action.redo();
    window._undoActions.push(action);
    toast('↷ ' + action.label, 'info', 1500);
  } catch (e) { toast('Vorwärts fehlgeschlagen: ' + e.message, 'error'); }
  updateUndoButtons();
}

function updateUndoButtons() {
  document.querySelectorAll('[data-undo-btn]').forEach(b => {
    b.disabled = (window._undoActions || []).length === 0;
    b.classList.toggle('opacity-50', b.disabled);
    b.classList.toggle('cursor-not-allowed', b.disabled);
  });
  document.querySelectorAll('[data-redo-btn]').forEach(b => {
    b.disabled = (window._redoActions || []).length === 0;
    b.classList.toggle('opacity-50', b.disabled);
    b.classList.toggle('cursor-not-allowed', b.disabled);
  });
}

async function nextQuoteNo(companyId) {
  const all = await readData('Quote');
  const inCo = all.filter(q => (q.fields.company_id || []).includes(companyId));

  inCo.forEach(q => {
    const m = (q.fields.quote_no || '').match(/^Q-(\d+)$/);
    if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
  });
  return 'Q-' + (max + 1);
}
