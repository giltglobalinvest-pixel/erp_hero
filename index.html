function refreshTemplate(fieldName, docType) {
  const select = document.querySelector(`#modalBox select[data-tpl-field="${fieldName}"]`);
  const tplId = select?.value;
  if (!tplId) { toast('Keine Vorlage ausgewählt', 'warn'); return; }
  const tpl = (window._quoteTemplates || []).find(t => t.id === tplId);
  if (!tpl) return;
  const ta = document.querySelector(`#modalBox textarea[name="${fieldName}"]`);
  if (!ta) return;
  buildQuoteVariableContext().then(ctx => {
    ta.value = substituteVariables(tpl.fields.content || '', docType, ctx);
    toast('Aktualisiert', 'success', 1200);
  });
}

async function applyDefaultTemplate(fieldName, section) {
  const ta = document.querySelector(`#modalBox textarea[name="${fieldName}"]`);
  if (!ta || ta.value.trim()) return; // nur wenn Feld leer ist
  const tpl = (window._quoteTemplates || []).find(t =>
    (t.fields.section || '') === section && t.fields.is_default
  );
  if (!tpl) return;
  const ctx = await buildQuoteVariableContext();
  ta.value = substituteVariables(tpl.fields.content || '', 'Angebot', ctx);
}

async function buildQuoteVariableContext() {
  const form = document.querySelector('#modalBox form');
  if (!form) return {};
  const fd = new FormData(form);
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  const cache  = window._quoteCustomerCache || {};
  const customer = cache.byId?.[cidSel];
  const contact  = cache.contacts?.find(c => c.id === conSel)?.fields;
  const company  = window._quoteCompanyCache || {};
  return {
    quote: {
      quote_no:       (fd.get('quote_no') || '').trim(),
      date:           (fd.get('date') || '').trim(),
      valid_until:    (fd.get('valid_until') || '').trim(),
      payment_terms:  (fd.get('payment_terms') || '').trim(),
      delivery_terms: (fd.get('delivery_terms') || '').trim()
    },
    customer, contact, company,
    user: APP_KEYS.user || {},
    customFields: collectCustomValues()
  };
}

function onTemplatePicked(selectEl, fieldName, docType) {
  const tplId = selectEl.value;
  // Hidden-Feld für Speicherung mitführen
  const hiddenName = fieldName === 'description' ? 'intro_template_id' : 'closing_template_id';
  const hidden = document.querySelector(`#modalBox input[name="${hiddenName}"]`);
  if (hidden) hidden.value = tplId || '';
  if (!tplId) return; // keine Vorlage
  const tpl = (window._quoteTemplates || []).find(t => t.id === tplId);
  if (!tpl) return;
  const ta = document.querySelector(`#modalBox textarea[name="${fieldName}"]`);
  if (!ta) return;
  if (ta.value.trim() && !confirm('Aktuellen Text durch Vorlage ersetzen?')) {
    // Auswahl behalten, aber Text nicht überschreiben
    return;
  }
  buildQuoteVariableContext().then(ctx => {
    ta.value = substituteVariables(tpl.fields.content || '', docType, ctx);
  });
}

async function openQuoteModal(id) {
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Modal-Tracking-Global setzen (für Silent-Save-Logik)
  window._currentQuoteIdInModal = id || null;
  // Internen Modus standardmäßig aus
  if (typeof window._quoteInternalMode === 'undefined') window._quoteInternalMode = false;
  let f = {}, items = [], allCustomers = [], allContacts = [], allTemplates = [], allCompanies = [], allCustomFields = [], allPaymentTerms = [], allDeliveryTerms = [], allAttachments = [];
  try {
    [allCustomers, allContacts, allTemplates, allCompanies, allCustomFields, allPaymentTerms, allDeliveryTerms, allAttachments] = await Promise.all([
      readData('Customer'), readData('Contact'), readData('Textemplate'), readData('Company'), readData('CustomField'),
      readData('PaymentTerm'), readData('DeliveryTerm'), readData('Attachment')
    ]);
  } catch (e) { toast(e.message, 'error'); return; }
  const attachments = allAttachments.filter(a => (a.fields.company_id || []).includes(cur.id) && (a.fields.status || 'aktiv') === 'aktiv').sort((a,b)=>(a.fields.name||'').localeCompare(b.fields.name||'','de'));
  const paymentTerms = allPaymentTerms.filter(t => (t.fields.company_id || []).includes(cur.id) && (t.fields.status || 'aktiv') === 'aktiv').sort((a,b)=> (a.fields.name||'').localeCompare(b.fields.name||'','de'));
  const deliveryTerms = allDeliveryTerms.filter(t => (t.fields.company_id || []).includes(cur.id) && (t.fields.status || 'aktiv') === 'aktiv').sort((a,b)=> (a.fields.name||'').localeCompare(b.fields.name||'','de'));
  // Default-Werte für neue Angebote
  const initialPayment  = f.payment_terms  || (id ? '' : (paymentTerms.find(t => t.fields.is_default)?.fields.name || ''));
  const initialDelivery = f.delivery_terms || (id ? '' : (deliveryTerms.find(t => t.fields.is_default)?.fields.name || ''));
  const selectedAttachmentIds = f.attachment_ids || [];
  // Template-Cache für die Vorlagen-Picker
  window._quoteTemplates = allTemplates.filter(t =>
    (t.fields.company_id || []).includes(cur.id) &&
    (t.fields.doc_type === 'Angebot') &&
    (t.fields.status || 'aktiv') === 'aktiv'
  );
  // Company-Cache für Variablen-Substitution
  window._quoteCompanyCache = allCompanies.find(c => c.id === cur.id)?.fields || { name: cur.name };
  // Custom Fields für Angebot, dieser Mandant
  window._quoteCustomFields = allCustomFields.filter(cf =>
    (cf.fields.company_id || []).includes(cur.id) &&
    (cf.fields.doc_type === 'Angebot') &&
    (cf.fields.status || 'aktiv') === 'aktiv'
  ).sort((a,b) => (a.fields.label || a.fields.name || '').localeCompare(b.fields.label || b.fields.name || '', 'de'));

  // Default-Templates für Auto-Auswahl bei neuen Dokumenten
  const defaultIntroTpl   = (window._quoteTemplates || []).find(t => (t.fields.section || '') === 'Einleitung'  && t.fields.is_default);
  const defaultClosingTpl = (window._quoteTemplates || []).find(t => (t.fields.section || '') === 'Schlusstext' && t.fields.is_default);

  if (id) {

  const customersInCompany = allCustomers

  const currentCustomerId = (f.customer_id || [])[0] || '';

  // Combobox-Items

  }));
  const contactItemsFor = (cid) => allContacts
    .filter(c => (c.fields.customer_id || []).includes(cid))
    .map(c => ({
      id: c.id,
      label: contactDisplayName(c.fields),
      secondary: [c.fields.role, c.fields.email].filter(Boolean).join(' · ')
    }));
  // Globaler Customer-Daten-Cache für Defaults bei Wechsel (payment_terms / delivery_terms / contacts)
  window._quoteCustomerCache = { byId: {}, contacts: allContacts };
  customersInCompany.forEach(c => { window._quoteCustomerCache.byId[c.id] = c.fields; });

  openModal(`
    <div class="lg:flex lg:items-stretch">
    <form onsubmit="saveQuote(event, '${id || ''}', false)" class="p-4 sm:p-6 lg:w-1/2 lg:max-h-[88vh] lg:overflow-y-auto">

        <h3 class="text-lg font-bold text-ink-900">${id ? 'Angebot bearbeiten' : 'Neues Angebot'}</h3>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>

        </div>
        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Status</label>
          <select name="status" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            ${['Entwurf','versendet','angenommen','abgelehnt','abgelaufen','archiviert'].map(s => `<option value="${s}" ${(f.status||'Entwurf')===s?'selected':''}>${s}</option>`).join('')}

        </div>
        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Datum</label>
          <input name="date" type="date" value="${escapeHtml(f.date || '')}" class="w-full px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">

            <select name="payment_terms" class="flex-1 px-3 py-2 border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">

              ${paymentTerms.map(t => `<option value="${escapeHtml(t.fields.name || '')}" ${initialPayment === (t.fields.name || '') ? 'selected' : ''}>${t.fields.is_default ? '★ ' : ''}${escapeHtml(t.fields.name || '')}</option>`).join('')}

        <div>
          <label class="block text-sm font-medium text-ink-700 mb-1">Lieferbedingungen</label>

              <option value="">— wählen —</option>
              ${deliveryTerms.map(t => `<option value="${escapeHtml(t.fields.name || '')}" ${initialDelivery === (t.fields.name || '') ? 'selected' : ''}>${t.fields.is_default ? '★ ' : ''}${escapeHtml(t.fields.name || '')}</option>`).join('')}
              ${initialDelivery && !deliveryTerms.find(t => t.fields.name === initialDelivery) ? `<option value="${escapeHtml(initialDelivery)}" selected>${escapeHtml(initialDelivery)} (alt)</option>` : ''}

        </div>

          <div class="flex items-center justify-between mb-1">
            <label class="text-sm font-medium text-ink-700">Einleitung</label>

      <div id="quoteSums" class="mt-4 bg-ink-50 rounded-xl p-4 text-sm space-y-1">
        ${quoteSumsHtml(sums)}
      </div>

      <div class="mt-5">
        <div class="flex items-center justify-between mb-1">
          <label class="text-sm font-medium text-ink-700">Schlusstext</label>

        <textarea name="notes" rows="3" placeholder="z.B. Grußformel + Bankverbindung + Hinweise" class="w-full px-3 py-2 border border-ink-200 rounded-lg mb-5 focus:outline-none focus:ring-2 focus:ring-brand-500/30">${escapeHtml(f.notes || '')}</textarea>

        <div class="flex items-center justify-between mb-1">
          <label class="text-sm font-medium text-ink-700">Anhänge</label>

            <i data-lucide="settings-2" class="w-3.5 h-3.5"></i> verwalten

        ${attachments.length === 0

          : `<div class="border border-ink-200 rounded-lg p-2 space-y-1">
              ${attachments.map(a => {
                const fileCount = (a.fields.file || []).length;
                const isSel = selectedAttachmentIds.includes(a.id);
                return `<label class="flex items-center gap-2 px-2 py-1 rounded hover:bg-ink-50 cursor-pointer">
                  <input type="checkbox" data-attachment-id="${a.id}" ${isSel ? 'checked' : ''} class="w-4 h-4 rounded border-ink-300 text-brand-500 focus:ring-brand-500/30">
                  <span class="text-sm text-ink-900">${escapeHtml(a.fields.name || '–')}</span>
                  <span class="text-xs text-ink-500">${fileCount} Datei${fileCount===1?'':'en'}</span>
                </label>`;
              }).join('')}
            </div>`}
        <p class="text-[10px] text-ink-400 italic mt-1">Markierte Anhänge werden im PDF nach dem Angebot aufgeführt.</p>
      </div>

      <div class="grid grid-cols-2 sm:flex sm:justify-end gap-2 sm:flex-wrap mt-4">
        <button type="button" onclick="closeModal()" class="px-3 py-2.5 text-sm rounded-lg border border-ink-200 hover:bg-ink-50 col-span-2 sm:col-span-1">Abbrechen</button>
        <button type="button" onclick="exportQuoteAsPdf()" class="px-3 py-2.5 text-sm rounded-lg border border-ink-300 text-ink-700 hover:bg-ink-50 flex items-center justify-center gap-1.5"><i data-lucide="file-down" class="w-4 h-4"></i> PDF</button>
        <button type="button" onclick="emailQuote()" class="px-3 py-2.5 text-sm rounded-lg border border-ink-300 text-ink-700 hover:bg-ink-50 flex items-center justify-center gap-1.5"><i data-lucide="mail" class="w-4 h-4"></i> E-Mail</button>
        <button type="button" onclick="saveQuote(event, '${id || ''}', true)" class="px-3 py-2.5 text-sm rounded-lg border border-brand-500 text-brand-600 hover:bg-brand-50">Speichern</button>
        <button type="submit" class="px-3 py-2.5 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600 col-span-2 sm:col-span-1">Speichern &amp; schließen</button>
      </div>
    </form>
    <div class="hidden lg:block lg:w-1/2 lg:max-h-[88vh] lg:overflow-y-auto bg-ink-100 lg:border-l border-ink-200 p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="text-xs font-semibold text-ink-500 uppercase tracking-wider flex items-center gap-2"><i data-lucide="eye" class="w-4 h-4"></i> Live-Vorschau · DIN A4</p>
        <div class="flex gap-1.5">
          <button type="button" onclick="exportQuoteAsPdf()" class="text-xs px-2 py-1 rounded-lg border border-ink-200 bg-white hover:bg-ink-50 flex items-center gap-1"><i data-lucide="file-down" class="w-3.5 h-3.5"></i> PDF</button>
          <button type="button" onclick="emailQuote()" class="text-xs px-2 py-1 rounded-lg border border-ink-200 bg-white hover:bg-ink-50 flex items-center gap-1"><i data-lucide="mail" class="w-3.5 h-3.5"></i> E-Mail</button>
        </div>
      </div>
      <div id="quotePreview" class="bg-white shadow-card mx-auto" style="aspect-ratio:210/297;padding:8% 9%;width:100%;"></div>
    </div>
    </div>
  `, { maxWidth: 'max-w-7xl' });
  // Modal-Box: max-w-7xl. Auf Desktop scrollen die Spalten unabhängig (Outer-Overflow weg).
  // Auf Mobile (< lg) MUSS der Modal-Box selbst scrollbar bleiben — sonst kommt der User
  // nicht an die unteren Felder + Speichern-Button.
  const box = document.getElementById('modalBox');
  if (box) {
    box.classList.remove('max-w-lg', 'max-w-5xl');
    box.classList.add('max-w-7xl');
    const applyResponsiveScroll = () => {
      const isLg = window.matchMedia('(min-width: 1024px)').matches;
      if (isLg) {
        box.classList.remove('max-h-[88vh]', 'overflow-y-auto');
      } else {
        box.classList.add('max-h-[90vh]', 'overflow-y-auto');
      }
    };
    applyResponsiveScroll();
    const _mq = window.matchMedia('(min-width: 1024px)');
    if (_mq.addEventListener) _mq.addEventListener('change', applyResponsiveScroll);
    else if (_mq.addListener) _mq.addListener(applyResponsiveScroll);
  }

  // Bei neuem Angebot: Standardvorlagen automatisch einfügen (nur wenn Felder leer)
  if (!id) {
    setTimeout(async () => {
      await applyDefaultTemplate('description', 'Einleitung');
      await applyDefaultTemplate('notes', 'Schlusstext');
    }, 80);
  }

  // Live-Vorschau initial befüllen + Listener für Änderungen
  setTimeout(() => {
    updateQuotePreview();
    const form = document.querySelector('#modalBox form');
    if (form) {
      let dbTimer = null;
      const trigger = () => { clearTimeout(dbTimer); dbTimer = setTimeout(updateQuotePreview, 250); };
      form.addEventListener('input', trigger);
      form.addEventListener('change', trigger);
    }
  }, 150);
}

async function updateQuotePreview() {
  const target = document.getElementById('quotePreview');
  if (!target) return;
  const ctx = await buildQuoteVariableContext();
  // Form-Werte für intro/notes ergänzen + items laden
  const form = document.querySelector('#modalBox form');
  const fd = form ? new FormData(form) : null;
  const intro   = fd ? (fd.get('description') || '') : '';
  const closing = fd ? (fd.get('notes')       || '') : '';
  const cur = getCurrentCompany();
  let items = [];
  const qid = window._currentQuoteIdInModal;
  if (qid) {
    try {
      const all = await readData('QuoteItem');
      items = all.filter(it => (it.fields.quote_id || []).includes(qid))
        .sort((a,b) => (+(a.fields.pos || 0)) - (+(b.fields.pos || 0)));
    } catch (e) {}
  }
  // Article-Map (id → article_no) für Tabellenspalte 'Artikelnr.'
  let articleMap = {};
  try {
    const articles = await readData('Article');
    articles.forEach(a => { articleMap[a.id] = a.fields.article_no || ''; });
  } catch (e) {}
  target.innerHTML = renderQuotePreviewHtml(ctx, items, intro, closing, articleMap);
  if (window.lucide) lucide.createIcons();
}

function renderQuotePreviewHtml(ctx, items, introRaw, closingRaw, articleMap) {
  const c  = ctx.company  || {};
  const cu = ctx.customer || {};
  const co = ctx.contact  || {};
  const q  = ctx.quote    || {};
  const sums = calcQuoteSums(items);
  const intro   = substituteVariables(introRaw   || '', 'Angebot', ctx);
  const closing = substituteVariables(closingRaw || '', 'Angebot', ctx);
  articleMap = articleMap || {};
  // Anrede für Empfänger (Herrn/Frau aus contact.gender ableiten)
  const recipientSalutation = (() => {
    if (!co || (!co.first_name && !co.last_name)) return '';
    const g = co.gender;
    const sal = g === 'männlich' ? 'Herrn' : g === 'weiblich' ? 'Frau' : '';
    const fullName = [co.first_name, co.last_name].filter(Boolean).join(' ');
    return [sal, fullName].filter(Boolean).join(' ');
  })();

  return `
    <div class="text-[11px] text-ink-900 flex flex-col" style="min-height:100%;font-family:Inter,system-ui,sans-serif;">

      <!-- TOP TAGLINE -->
      <div class="text-[9px] text-ink-700 text-right -mt-2 mb-2">${escapeHtml(FLP_BRAND.taglineTop)}</div>

      <!-- HEADER: TÜV-Marke (Platzhalter) links, FLP-Logo + 'Angebot' rechts -->
      <div class="flex items-start justify-between mb-5">
        <div class="flex flex-col items-start gap-1">
          <div class="w-14 h-14 rounded-full border-2 border-ink-400 flex items-center justify-center text-[8px] font-bold text-ink-600 leading-tight text-center">TÜV<br><span class="text-[9px]">SÜD</span></div>
        </div>
        <div class="text-right">
          <svg class="h-9 ml-auto" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
          <div class="text-[26px] text-ink-700 font-light tracking-tight mt-1 leading-none">Angebot</div>
        </div>
      </div>

      <!-- ADRESSZEILE + EMPFÄNGER + META -->
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <!-- Briefkuvert-Adresszeile -->
          <div class="text-[7px] text-ink-500 border-b border-ink-300 pb-1 mb-3 inline-block leading-tight">${escapeHtml(FLP_BRAND.senderAddressLine)}</div>
          <div class="text-[11px] leading-[1.5]">
            ${cu.name1 ? `<div>${escapeHtml(cu.name1)}</div>` : '<div class="text-ink-400 italic">— Empfänger —</div>'}
            ${cu.name2 ? `<div>${escapeHtml(cu.name2)}</div>` : ''}
            ${recipientSalutation ? `<div>${escapeHtml(recipientSalutation)}</div>` : ''}
            ${cu.street ? `<div>${escapeHtml(cu.street)}</div>` : ''}
            ${(cu.zip || cu.city) ? `<div>${escapeHtml([cu.zip, cu.city].filter(Boolean).join(' '))}</div>` : ''}
            ${cu.country ? `<div>${escapeHtml(cu.country)}</div>` : ''}
          </div>
        </div>
        <div class="text-[10px]">
          <table class="w-full">
            <tbody>
              <tr><td class="text-ink-700 py-0.5">Angebots-Nr.:</td><td class="text-right py-0.5">${escapeHtml(q.quote_no || '–')}</td></tr>
              <tr><td class="text-ink-700 py-0.5">Kunden-Nr.:</td><td class="text-right py-0.5">${escapeHtml(cu.customer_no || '–')}</td></tr>
              <tr><td class="text-ink-700 py-0.5">Datum:</td><td class="text-right py-0.5">${escapeHtml(formatDeDate(q.date))}</td></tr>
              <tr><td class="text-ink-700 py-0.5">Gültigkeit:</td><td class="text-right py-0.5">${q.valid_until ? escapeHtml(formatDeDate(q.valid_until)) : '30 Tage'}</td></tr>

              <tr><td class="text-ink-700 py-0.5">E-Mail:</td><td class="text-right py-0.5">${escapeHtml(FLP_BRAND.email)}</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- INTRO / GREETING -->
      ${intro ? `<div class="whitespace-pre-line text-[11px] mb-4 leading-relaxed">${escapeHtml(intro)}</div>` : '<p class="text-[11px] text-ink-400 italic mb-4">— Einleitung —</p>'}

      <!-- POSITIONEN -->
      ${items.length > 0 ? `
        <table class="w-full text-[10px] mb-2 border-collapse">
          <thead>
            <tr class="border-b border-ink-300 text-ink-700">

          <tbody>
            ${items.map(it => {
              const f = it.fields || {};
              const lineNet = calcLineNet(f.qty, f.unit_price_net, f.discount_pct);
              const grossLine = (+(f.qty || 0)) * (+(f.unit_price_net || 0));
              const discAbs = grossLine * ((+(f.discount_pct || 0)) / 100);
              const descLines = (f.description || '').split('\n').map(l => l.trim()).filter(Boolean);

              return `<tr class="border-b border-ink-100 align-top">

// Wird vom Customer-Combobox aufgerufen (value, comboboxId)
function onQuoteCustomerChange(value) {
  const cid = value || document.getElementById('qc_customer_value')?.value || '';
  const cache = window._quoteCustomerCache || {};
  const contacts = cache.contacts || [];
  // 1) Ansprechpartner-Combobox auf den neuen Kunden filtern
  const list = !cid ? [] : contacts.filter(c => (c.fields.customer_id || []).includes(cid));
  const items = list.map(c => ({
    id: c.id,
    label: contactDisplayName(c.fields),
    secondary: [c.fields.role, c.fields.email].filter(Boolean).join(' · ')
  }));
  _comboboxData['qc_contact'] = items;
  // Aktuelle Auswahl ggf. zurücksetzen, falls dieser Kontakt nicht mehr zum Kunden gehört
  const contactValueEl = document.getElementById('qc_contact_value');
  const contactSearchEl = document.getElementById('qc_contact_search');
  if (contactValueEl && !items.find(i => i.id === contactValueEl.value)) {
    contactValueEl.value = '';
    if (contactSearchEl) contactSearchEl.value = '';
  }
  // 2) Defaults aus Customer (nur wenn Felder leer; Select wird per Wert gesetzt)
  if (cid) {
    const cFields = cache.byId?.[cid] || {};
    const ptSel = document.querySelector('#modalBox select[name="payment_terms"]');
    if (ptSel && !ptSel.value) {
      const want = cFields.payment_terms || '14 Tage netto';
      const opt = Array.from(ptSel.options).find(o => o.value === want);
      if (opt) ptSel.value = want;
    }
    const dtSel = document.querySelector('#modalBox select[name="delivery_terms"]');
    if (dtSel && !dtSel.value) {
      const want = cFields.delivery_terms || 'EXW Fellbach';
      const opt = Array.from(dtSel.options).find(o => o.value === want);
      if (opt) dtSel.value = want;
    }
    // 3) Standardvorlagen mit aktuellem Kunden-Kontext nach-substituieren (sofern Felder noch leer)
    setTimeout(() => {
      applyDefaultTemplate('description', 'Einleitung');
      applyDefaultTemplate('notes', 'Schlusstext');
    }, 50);
  }
}

function _loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (Array.from(document.scripts).some(s => s.src === src)) return resolve();
    const sc = document.createElement('script');
    sc.src = src;
    sc.onload = () => resolve();
    sc.onerror = () => reject(new Error('Script konnte nicht geladen werden: ' + src));
    document.head.appendChild(sc);
  });
}

function collectSelectedAttachments() {
  const ids = [];
  document.querySelectorAll('#modalBox input[data-attachment-id]:checked').forEach(el => {
    const id = el.getAttribute('data-attachment-id');
    if (id) ids.push(id);
  });
  return ids;
}

function _safeFilename(s) {
  return String(s || '').replace(/[^a-zA-Z0-9_.\- ]/g, '_').replace(/\s+/g, '_').replace(/_+/g, '_').slice(0, 80);
}

// Liefert das FLP-Logo als komplett selbst-tragendes inline SVG (ohne <use>-Verweis)
function flpLogoInlineSvg(heightPx) {
  const symbol = document.getElementById('flp-logo');
  const inner = symbol ? symbol.innerHTML : '';
  const viewBox = symbol?.getAttribute('viewBox') || '50.2 112.3 319.9 73.5';
  // CSS-Klassen .st0/.st1/.st2 aus dem Original-Logo inline einbetten,
  // damit das SVG auch isoliert (in PDF-Capture / off-screen) korrekt rendert.
  const styleBlock = `<style>.st0{fill:#007EAC;}.st1{fill:#575756;}.st2{fill:#F6F6F6;}</style>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" style="height:${heightPx}px;width:auto;display:block;">${styleBlock}${inner}</svg>`;
}

async function exportQuoteAsPdf() {
  const previewEl = document.getElementById('quotePreview');
  if (!previewEl) {
    toast('Vorschau nicht gefunden — bitte Modal neu öffnen', 'error');
    return;
  }

  const ctx = await buildQuoteVariableContext();
  const customer = ctx.customer || {};
  const quoteNo = ctx.quote?.quote_no || 'Entwurf';
  const filename = _safeFilename('Angebot_' + quoteNo + (customer.name1 ? '_' + customer.name1 : '')) + '.pdf';

  // Frische Vorschau erzwingen (User könnte gerade etwas geändert haben — Debounce abwarten + neu rendern)
  try { await updateQuotePreview(); } catch(e) {}

  // Loading-Overlay (deckt nur visuell ab, die Vorschau bleibt im DOM gerendert)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:Inter,system-ui,sans-serif;font-size:14px;color:#0F172A;';
  overlay.innerHTML = `
    <div style="width:48px;height:48px;border:4px solid #E2E8F0;border-top-color:#1FA8D6;border-radius:50%;animation:pdfspin 0.8s linear infinite;"></div>
    <div style="font-weight:600;">PDF wird erstellt …</div>
    <style>@keyframes pdfspin{to{transform:rotate(360deg);}}</style>
  `;
  document.body.appendChild(overlay);

  try {
    // Liftaro-Pattern: html2canvas auf bereits sichtbares DOM-Element + pdf-lib zur PDF-Assembly.
    // Das Element #quotePreview ist im Modal sichtbar gerendert — html2canvas captured zuverlässig.
    await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js');

    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e) {} }
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    await new Promise(r => setTimeout(r, 80));

    // Capture des sichtbaren Vorschau-Elements (kein off-screen, kein Sizing-Trick)
    const canvas = await window.html2canvas(previewEl, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: '#FFFFFF',
      width: previewEl.scrollWidth,
      height: previewEl.scrollHeight,
    });

    // PDF mit pdf-lib zusammenbauen
    const { PDFDocument, rgb, StandardFonts } = window.PDFLib;
    const pdfDoc = await PDFDocument.create();
    const imgData = canvas.toDataURL('image/png');
    const pngImg = await pdfDoc.embedPng(imgData);
    const A4_W = 595.28, A4_H = 841.89;
    const widthScale = A4_W / pngImg.width;
    const drawW = A4_W;
    const drawH = pngImg.height * widthScale;
    const pageH = Math.max(A4_H, drawH);
    const page = pdfDoc.addPage([A4_W, pageH]);
    page.drawImage(pngImg, { x: 0, y: pageH - drawH, width: drawW, height: drawH });

    // Anhang-Liste als separate Seite (falls Anhänge ausgewählt)
    const attIds = collectSelectedAttachments();
    if (attIds.length) {
      try {
        const all = await readData('Attachment');
        const sel = all.filter(r => attIds.includes(r.id));
        if (sel.length) {
          const attPage = pdfDoc.addPage([A4_W, A4_H]);
          const helvetica  = await pdfDoc.embedFont(StandardFonts.Helvetica);
          const helvBold   = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
          const margin = 56;
          let y = A4_H - margin - 18;
          attPage.drawText('Anhänge zum Angebot', { x: margin, y, size: 16, font: helvBold, color: rgb(0.06, 0.09, 0.16) });
          y -= 28;
          for (const s of sel) {
            const cnt = (s.fields.file || []).length;
            const txt = '• ' + (s.fields.name || '–') + (cnt ? ' (' + cnt + ' Datei' + (cnt === 1 ? '' : 'en') + ')' : '');
            attPage.drawText(txt, { x: margin, y, size: 11, font: helvetica, color: rgb(0.06, 0.09, 0.16) });
            y -= 18;
            if (y < margin + 24) break;
          }
          y -= 10;
          attPage.drawText('Diese Dateien sind dieser E-Mail beigefügt.', {
            x: margin, y, size: 9, font: helvetica, color: rgb(0.55, 0.55, 0.55),
          });
        }
      } catch (e) { console.warn('Anhang-Seite fehlgeschlagen:', e); }
    }

    pdfDoc.setTitle('Angebot ' + quoteNo);
    pdfDoc.setAuthor((window._quoteCompanyCache || {}).name || 'FLP Lift Parts GmbH');
    pdfDoc.setCreationDate(new Date());

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    toast('PDF erstellt: ' + filename, 'success', 3000);
  } catch (err) {
    console.error('PDF-Erstellung fehlgeschlagen:', err);
    toast('PDF-Erstellung fehlgeschlagen: ' + (err.message || err), 'error', 5000);
  } finally {
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
}

/* E-Mail vorbereiten — öffnet mailto:-Link mit Empfänger + vorgefülltem Subject + Body. PDF muss vorher heruntergeladen sein. */
async function emailQuote() {
  const ctx = await buildQuoteVariableContext();
  const customer = ctx.customer || {};
  const contact  = ctx.contact  || {};
  const quote    = ctx.quote    || {};
  const recipient = contact.email || customer.email || '';
  const quoteNo = quote.quote_no || '';
  const datum   = formatDeDate(quote.date) || '';
  const sal = (() => { const g = contact?.gender; return g === 'männlich' ? 'Sehr geehrter Herr ' : g === 'weiblich' ? 'Sehr geehrte Frau ' : 'Sehr geehrte Damen und Herren'; })();
  const greeting = (sal.trim() === 'Sehr geehrte Damen und Herren') ? sal : sal + (contact.last_name || '');
  const company = (window._quoteCompanyCache || {}).name || 'FLP';
  const subject = `Angebot ${quoteNo} vom ${datum}`;
  const body = `${greeting},\n\nanbei senden wir Ihnen unser Angebot ${quoteNo} vom ${datum} als PDF.\n\nFür Rückfragen stehen wir jederzeit zur Verfügung.\n\nMit freundlichen Grüßen\n${company}\n\nP.S. Bitte denken Sie daran, das soeben heruntergeladene PDF dieser E-Mail anzuhängen.`;
  const url = 'mailto:' + encodeURIComponent(recipient) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  window.location.href = url;
}

async function toggleTermDefault(id, makeDefault) {
  const ctx = _termMgmtCtx;
  const cur = getCurrentCompany();
  try {
    if (makeDefault) {
      // andere Defaults entflaggen
      const all = await readData(ctx.table);
      const others = all.filter(r => (r.fields.company_id || []).includes(cur.id) && r.fields.is_default && r.id !== id);
      for (const o of others) await updateData(ctx.table, o.id, { is_default: false });
    }
    await updateData(ctx.table, id, { is_default: !!makeDefault });
    await renderTermManagement();
    toast(makeDefault ? 'Als Standard gesetzt' : 'Standard entfernt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

function quoteItemRow(quoteId, it) {
  const f = it.fields || {};
  const internalMode = !!window._quoteInternalMode;
  const lineNet = calcLineNet(f.qty, f.unit_price_net, f.discount_pct);
  const desc = (f.description || '').split('\n')[0] || '–';
  const ek = +(f.purchase_price || 0);
  const lineEk = (+(f.qty || 0)) * ek;
  const margin = lineNet - lineEk;
  const grossLine = (+(f.qty || 0)) * (+(f.unit_price_net || 0));
  const discAbs = grossLine * ((+(f.discount_pct || 0)) / 100);
  const meta = [
    (f.qty || 0) + (f.unit ? ' ' + f.unit : ''),
    '× ' + formatPrice(f.unit_price_net || 0) + ' €',
    discAbs > 0 ? 'Rabatt: −' + formatPrice(discAbs) + ' €' : '',
    'MwSt ' + (f.vat_rate || 0) + '%'
  ].filter(Boolean).join(' · ');
  const internalLine = internalMode
    ? `<p class="text-xs text-amber-700 mt-1 font-mono">EK: ${formatPrice(ek)} € · Zeile-EK: ${formatPrice(lineEk)} € · Marge: <span class="${margin >= 0 ? 'text-emerald-700' : 'text-red-700'} font-semibold">${formatPrice(margin)} €</span></p>`
    : '';
  return `
    <div class="p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0 flex-1">
          <div class="flex items-baseline gap-2">
            <span class="text-xs font-mono text-ink-500">Pos. ${f.pos || '?'}</span>
            <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(desc)}</p>
          </div>
          <p class="text-xs text-ink-500 mt-1 font-mono">${escapeHtml(meta)}</p>
          ${internalLine}
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="font-mono text-sm tabular-nums text-ink-900">${formatPrice(lineNet)} €</span>
          <button type="button" onclick="showQuoteItemInlineForm('${quoteId}','${it.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
            <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
          </button>
          <button type="button" onclick="deleteQuoteItemInline('${quoteId}','${it.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
    </div>
  `;
}

async function _silentSaveQuoteHeader() {
  // Speichert den Quote-Header still im Hintergrund und gibt die neue ID zurück.
  const cur = getCurrentCompany();
  if (!cur) return null;
  const form = document.querySelector('#modalBox form');
  if (!form) return null;
  const fd = new FormData(form);
  const fields = {};
  ['quote_no','description','date','valid_until','status','payment_terms','delivery_terms','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  fields.customer_id = cidSel ? [cidSel] : [];
  fields.contact_id  = conSel ? [conSel] : [];
  fields.status = fields.status || 'Entwurf';
  fields.company_id = [cur.id];
  const introTpl   = (fd.get('intro_template_id') || '').trim();
  const closingTpl = (fd.get('closing_template_id') || '').trim();
  if (introTpl)   fields.intro_template_id   = [introTpl];
  if (closingTpl) fields.closing_template_id = [closingTpl];
  const cv = collectCustomValues();
  if (Object.keys(cv).length) fields.custom_values = JSON.stringify(cv);
  try {
    const created = await writeData('Quote', fields);
    return created.id;
  } catch (err) {
    toast(err.message, 'error');
    return null;
  }
}

async function showQuoteItemInlineForm(quoteId, itemId) {
  if (document.querySelector('#qiFormWrap [data-qi-form]')) return;
  // Auto-Save bei neuem Angebot: Header still im Hintergrund speichern, ohne Modal zu schließen
  if (!quoteId) {
    const newId = await _silentSaveQuoteHeader();
    if (!newId) return;
    quoteId = newId;
    window._currentQuoteIdInModal = newId;
    // Items-Wrap mit der neuen ID neu rendern, damit Buttons die richtige ID haben
    const wrap = document.getElementById('quoteItemsWrap');
    if (wrap) {
      wrap.innerHTML = renderQuoteItems(newId, []);
      if (window.lucide) lucide.createIcons();
    }
    toast('Angebot ' + (document.querySelector('#modalBox input[name="quote_no"]')?.value || '') + ' angelegt', 'success', 1500);
  }
  const cur = getCurrentCompany();
  let f = {};
  try {
    if (itemId) {
      const all = await readData('QuoteItem');
      f = all.find(r => r.id === itemId)?.fields || {};
    } else {
      // Default: nächste Position berechnen
      const all = await readData('QuoteItem');
      const peers = all.filter(r => (r.fields.quote_id || []).includes(quoteId));
      const maxPos = peers.reduce((m, r) => Math.max(m, +(r.fields.pos || 0)), 0);

// Wird vom Article-Combobox aufgerufen (value, comboboxId)
function onQiArticleChange(value, comboboxId) {
  const articleId = value || '';
  const fid = (comboboxId || '').replace(/_article$/, '');
  // Lieferanten-Picker neu befüllen aus Cache
  const supSel = document.getElementById(fid + '_supplier');
  if (supSel) {
    const list = (window._qiArticleSupplierCache || {})[articleId] || [];
    supSel.innerHTML = '<option value="">— kein Lieferant —</option>' +
      list.map(s => `<option value="${s.supplierId}" data-ek="${s.ek}" ${s.isDefault ? 'selected' : ''}>${s.isDefault ? '★ ' : ''}${escapeHtml(s.supplierName)}${s.supplierNo ? ' (' + escapeHtml(s.supplierNo) + ')' : ''}</option>`).join('');
    // Wenn Default-Lieferant existiert: EK-Preis übernehmen
    const def = list.find(s => s.isDefault);
    if (def) {
      const ekEl = document.getElementById(fid + '_purchase_price');
      if (ekEl) ekEl.value = def.ek;
    }
  }
  if (!articleId) return;
  const a = (window._qiArticleCacheById || {})[articleId];
  if (!a) return;
  const descEl = document.getElementById(fid + '_description');
  if (descEl && !descEl.value) descEl.value = [a.name1, a.name2, a.desc].filter(Boolean).join('\n');
  const priceEl = document.getElementById(fid + '_unit_price_net');
  if (priceEl) priceEl.value = a.price;
  const unitEl = document.getElementById(fid + '_unit');
  if (unitEl) unitEl.value = a.unit;
  const vatEl = document.getElementById(fid + '_vat_rate');
  if (vatEl) vatEl.value = a.vat;
  recalcQiPreview(fid);
}

// Lieferanten-Wahl: EK-Preis aus dem ausgewählten Optionseintrag übernehmen
function onQiSupplierChange(fid) {
  const supSel = document.getElementById(fid + '_supplier');
  if (!supSel) return;
  const opt = supSel.options[supSel.selectedIndex];
  const ek = opt?.getAttribute('data-ek');
  if (ek !== null && ek !== undefined && ek !== '') {
    const ekEl = document.getElementById(fid + '_purchase_price');
    if (ekEl) ekEl.value = ek;
  }
}

function recalcQiPreview(fid) {
  const qty   = parseDecimal(document.getElementById(fid + '_qty')?.value);
  const price = parseDecimal(document.getElementById(fid + '_unit_price_net')?.value);
  const disc  = parseDecimal(document.getElementById(fid + '_discount_pct')?.value);
  const net = calcLineNet(qty, price, disc);
  const el = document.getElementById(fid + '_preview');
  if (el) el.textContent = formatPrice(net) + ' €';
}

function cancelQuoteItemInline(quoteId, itemId) {
  document.getElementById('qiFormWrap').innerHTML = '';
  document.getElementById('addQiBtn')?.classList.remove('hidden');
  if (itemId) {
    const row = document.querySelector(`[data-qi-row="${itemId}"]`);
    if (row) row.classList.remove('hidden');
  }
}

async function saveQuoteItemInline(quoteId, itemId) {
  const fid = 'qif_' + (itemId || 'new');
  const $v = id => (document.getElementById(fid + '_' + id)?.value || '').trim();
  // Combobox: value-Element heißt jetzt fid + '_article_value'
  const articleId = document.getElementById(fid + '_article_value')?.value || '';
  const desc = $v('description');
  if (!desc) return toast('Beschreibung fehlt', 'error');
  const pos = parseInt($v('pos'), 10) || 1;
  const qty = parseDecimal($v('qty')) || 0;
  const price = parseDecimal($v('unit_price_net')) || 0;
  const disc = parseDecimal($v('discount_pct')) || 0;
  const vat = parseDecimal($v('vat_rate')) || 0;
  const fields = {
    pos, qty,
    unit:           $v('unit'),
    unit_price_net: price,
    discount_pct:   disc,
    vat_rate:       vat,
    description:    desc,
    line_total_net: calcLineNet(qty, price, disc),
    label:          'Pos.' + pos + ' · ' + desc.split('\n')[0].substring(0, 50)
  };
  fields.article_id = articleId ? [articleId] : [];
  // Lieferant + EK-Preis (Snapshot)
  const supplierId = document.getElementById(fid + '_supplier')?.value || '';
  fields.supplier_id = supplierId ? [supplierId] : [];
  const ek = parseDecimal($v('purchase_price'));
  if (ek !== null) fields.purchase_price = ek;
  if (!itemId) fields.quote_id = [quoteId];
  try {
    if (itemId) await updateData('QuoteItem', itemId, fields);
    else        await writeData('QuoteItem', fields);
    document.getElementById('qiFormWrap').innerHTML = '';
    document.getElementById('addQiBtn')?.classList.remove('hidden');
    await refreshQuoteItemsSection(quoteId);
    toast('Position gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteQuoteItemInline(quoteId, itemId) {
  if (!confirm('Diese Position wirklich löschen?')) return;
  try {
    await deleteData('QuoteItem', itemId);
    await refreshQuoteItemsSection(quoteId);
    toast('Position gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshQuoteItemsSection(quoteId) {
  const wrap = document.getElementById('quoteItemsWrap');
  if (!wrap) return;
  try {
    const all = await readData('QuoteItem');
    const items = all.filter(it => (it.fields.quote_id || []).includes(quoteId));
    wrap.innerHTML = renderQuoteItems(quoteId, items);
    const sumsEl = document.getElementById('quoteSums');
    if (sumsEl) sumsEl.innerHTML = quoteSumsHtml(calcQuoteSums(items));

    // Live-Vorschau ebenfalls aktualisieren
    updateQuotePreview();
  } catch (e) { toast(e.message, 'error'); }
}

let _pendingPostQuoteAction = null;

async function saveQuote(e, id, keepOpen) {
  if (e && e.preventDefault) e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Falls inzwischen ein Silent-Save passiert ist, Tracking-Global hat Vorrang
  if (!id && window._currentQuoteIdInModal) id = window._currentQuoteIdInModal;
  const form = e?.target?.tagName === 'FORM' ? e.target : (e?.target?.closest?.('form') || document.querySelector('#modalBox form'));
  if (!form) return;
  const fd = new FormData(form);
  const fields = {};
  ['quote_no','description','date','valid_until','status','payment_terms','delivery_terms','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  // Template-IDs (für persistente Auswahl beim Wieder-Öffnen)
  const introTpl   = (fd.get('intro_template_id') || '').trim();
  const closingTpl = (fd.get('closing_template_id') || '').trim();
  fields.intro_template_id   = introTpl   ? [introTpl]   : [];
  fields.closing_template_id = closingTpl ? [closingTpl] : [];
  // Individuelle Felder als JSON
  const cv = collectCustomValues();
  fields.custom_values = Object.keys(cv).length ? JSON.stringify(cv) : '';
  // Anhang-Auswahl
  fields.attachment_ids = collectSelectedAttachments();
  const cidSel = (fd.get('customer_id') || '').trim();
  const conSel = (fd.get('contact_id')  || '').trim();
  fields.customer_id = cidSel ? [cidSel] : [];
  fields.contact_id  = conSel ? [conSel] : [];
  fields.status = fields.status || 'Entwurf';
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }

  // Summen aus aktuellen Positionen
  if (id) {
    try {
      const all = await readData('QuoteItem');
      const items = all.filter(it => (it.fields.quote_id || []).includes(id));
      const sums = calcQuoteSums(items);
      fields.subtotal_net = sums.subtotal_net;
      fields.vat_total    = sums.vat_total;
      fields.total_gross  = sums.total_gross;
    } catch (e) {}
  }
  try {
    let savedId = id;
    if (id) {
      await updateData('Quote', id, fields);
    } else {
      const created = await writeData('Quote', fields);
      savedId = created.id;
    }
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    window._currentQuoteIdInModal = savedId;
    if (keepOpen) {
      toast('Gespeichert', 'success');
      // Modal NICHT schließen — Inhalt direkt mit aktualisierter ID neu rendern (Backdrop bleibt sichtbar)
      await openQuoteModal(savedId);
      if (_pendingPostQuoteAction) {
        const act = _pendingPostQuoteAction;
        _pendingPostQuoteAction = null;
        setTimeout(act, 100);
      }
    } else {
      closeModal();
      renderQuotes();
      toast('Gespeichert', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

  const sorted = [...junctions].sort((a, b) => {
    const ap = a.fields.is_default ? 0 : 1;

    return 0;
  });
  const list = sorted.length === 0
    ? '<p class="text-xs text-ink-500 italic px-3 py-2">Noch keine Lieferanten zugeordnet.</p>'

        </div>
        <div>

      </p>

      <label class="flex items-center gap-2 pt-1">

async function saveArticleSupplierInline(articleId, junctionId) {
  const fid = 'asf_' + (junctionId || 'new');
  const supId = document.getElementById(fid + '_supplier')?.value || '';
  if (!supId) return toast('Lieferant fehlt', 'error');
  const purchase = parseDecimal(document.getElementById(fid + '_purchase_price')?.value);
  // Bestelltext = aktuelle Artikelbeschreibung (Snapshot bei jedem Save)
  let orderText = '';
  try {
    const allArt = await readData('Article');
    const art = allArt.find(a => a.id === articleId)?.fields;
    if (art) {
      orderText = [art.name1, art.name2, art.description].filter(Boolean).join('\n');
    }
  } catch (e) {}
  const fields = {
    supplier_id:    [supId],
    delivery_time:  (document.getElementById(fid + '_delivery_time')?.value || '').trim(),
    order_text:     orderText,
    is_default:     document.getElementById(fid + '_is_default')?.checked || false
  };
  if (purchase !== null) fields.purchase_price = purchase;
  if (!junctionId) {
    fields.article_id = [articleId];
    const supName = APP_KEYS.suppliersById?.[supId]?.name1 || '?';
    fields.label = supName; // Primary-Feld: nur als Label sichtbar in Airtable
  }

  try {
    if (fields.is_default) {
      const all = await readData('ArticleSupplier');
      const others = all.filter(j =>
        (j.fields.article_id || []).includes(articleId) &&
        j.fields.is_default &&
        j.id !== junctionId
      );
      for (const o of others) await updateData('ArticleSupplier', o.id, { is_default: false });
    }
    if (junctionId) await updateData('ArticleSupplier', junctionId, fields);
    else            await writeData('ArticleSupplier', fields);
    document.getElementById('artSupplierFormWrap').innerHTML = '';
    document.getElementById('addArtSupplierBtn')?.classList.remove('hidden');
    await refreshArticleSuppliersSection(articleId);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteArticleSupplierInline(articleId, junctionId) {
  if (!confirm('Diesen Lieferant-Eintrag wirklich löschen?')) return;
  try {
    await deleteData('ArticleSupplier', junctionId);
    await refreshArticleSuppliersSection(articleId);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshArticleSuppliersSection(articleId) {
  const wrap = document.getElementById('articleSuppliersWrap');

  try {
    const all = await readData('ArticleSupplier');

    wrap.innerHTML = renderArticleSuppliers(articleId, junctions);

async function renderLookupManagement(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  let all = [], allArticles = [];
  try {
    [all, allArticles] = await Promise.all([readData(table), readData('Article')]);
  } catch (e) { toast(e.message, 'error'); return; }

  const list = all
    .filter(r => (r.fields.company_id || []).includes(cur.id))
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));

  const usage = {};
  allArticles.forEach(a => {
    if (!(a.fields.company_id || []).includes(cur.id)) return;
    (a.fields[articleField] || []).forEach(rid => { usage[rid] = (usage[rid] || 0) + 1; });
  });

  const rows = list.length === 0
    ? `<p class="px-3 py-4 text-sm text-ink-500 italic text-center">Noch keine ${escapeHtml(titlePlur)} für diesen Mandanten.</p>`
    : list.map(r => {
        const count = usage[r.id] || 0;
        const safeName = (r.fields.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
          <div class="flex items-center justify-between p-3 border-b border-ink-100 last:border-b-0">
            <div class="flex-1 min-w-0">
              <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(r.fields.name || '–')}</p>
              <p class="text-xs text-ink-500">${count} Artikel</p>
            </div>
            <div class="flex gap-1 shrink-0">
              <button type="button" onclick="renameLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}','${safeName}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-ink-100 rounded" title="Umbenennen"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
              <button type="button" onclick="deleteLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}', ${count})" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-ink-100 rounded" title="Löschen"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        `;
      }).join('');

  const html = `
    <div class="p-6">
      <div class="flex items-baseline justify-between mb-4">
        <h3 class="text-lg font-bold text-ink-900">${escapeHtml(titlePlur)} verwalten</h3>
        <span class="text-xs text-ink-500">${escapeHtml(cur.name)}</span>
      </div>
      <div class="bg-white border border-ink-200 rounded-lg overflow-hidden mb-4 max-h-72 overflow-y-auto">
        ${rows}
      </div>
      <div class="flex gap-2">
        <input id="newLookupName" type="text" placeholder="Neuer ${escapeHtml(titleSing)}…" onkeydown="if(event.key==='Enter'){event.preventDefault();addLookup('${table}','${articleField}','${titleSing}','${titlePlur}')}" class="flex-1 px-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        <button type="button" onclick="addLookup('${table}','${articleField}','${titleSing}','${titlePlur}')" class="px-3 py-2 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600 flex items-center gap-1.5">
          <i data-lucide="plus" class="w-4 h-4"></i> Hinzufügen
        </button>
      </div>
      <div class="flex justify-end mt-5">
        <button type="button" onclick="${_lookupMgmtUseModal2 ? 'closeModal2()' : 'closeModal()'}" class="px-3 py-2 text-sm rounded-lg border border-ink-200 hover:bg-ink-50">Schließen</button>
      </div>
    </div>
  `;
  if (_lookupMgmtUseModal2) openModal2(html); else openModal(html);
  setTimeout(() => document.getElementById('newLookupName')?.focus(), 50);
}

async function addLookup(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  const input = document.getElementById('newLookupName');
  const name = (input?.value || '').trim();
  if (!name) return toast('Name fehlt', 'error');
  try {
    await writeData(table, { name, company_id: [cur.id], status: 'aktiv' });
    if (input) input.value = '';
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' angelegt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function renameLookup(table, articleField, titleSing, titlePlur, id, currentName) {
  const newName = prompt(titleSing + ' umbenennen:', currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed) return toast('Name fehlt', 'error');
  try {
    await updateData(table, id, { name: trimmed });
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast('Umbenannt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteLookup(table, articleField, titleSing, titlePlur, id, articleCount) {
  if (articleCount > 0) {
    if (!confirm(`Wird von ${articleCount} Artikel${articleCount===1?'':'n'} verwendet. Beim Löschen wird die Zuordnung dort entfernt — die Artikel selbst bleiben. Wirklich löschen?`)) return;
  } else {
    if (!confirm('Wirklich löschen?')) return;
  }
  try {
    await deleteData(table, id);
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

// Aktualisiert ein Dropdown im darunterliegenden Article-Modal nach Lookup-Änderung
async function refreshArticleModalLookupDropdown(fieldName) {
  const select = document.querySelector('#modalBox select[name="' + fieldName + '"]');
  if (!select) return;
  const cur = getCurrentCompany();
  if (!cur) return;
  const table = fieldName === 'category_id' ? 'Category' : 'Manufacturer';
  let all = [];
  try { all = await readData(table); } catch (e) { return; }
  const items = all
    .filter(r => (r.fields.company_id || []).includes(cur.id) && (r.fields.status || 'aktiv') === 'aktiv')
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));
  const currentValue = select.value;
  const placeholder = fieldName === 'category_id' ? '— ohne Kategorie —' : '— ohne Hersteller —';
  select.innerHTML = `<option value="">${placeholder}</option>` +
    items.map(r => `<option value="${r.id}" ${currentValue === r.id ? 'selected' : ''}>${escapeHtml(r.fields.name || '–')}</option>`).join('');
}

// Convenience-Wrapper für Buttons
function openCategoryManagement(useModal2 = false)     { return openLookupManagement('Category',     'category_id',     'Kategorie',  'Kategorien',  useModal2); }
function openManufacturerManagement(useModal2 = false) { return openLookupManagement('Manufacturer', 'manufacturer_id', 'Hersteller', 'Hersteller',  useModal2); }

/* ============================================================
   STAMMDATEN: ANSPRECHPARTNER (Contact)
   ============================================================ */
function renderEntityContacts(entity, entityId, contacts) {
  if (!entityId) {
    const word = entity === 'supplier' ? 'Lieferanten' : 'Kunden';
    return `<p class="text-xs text-ink-500 italic px-3 py-2 bg-ink-50 rounded-lg">Speichere zuerst den ${word} — danach kannst du Ansprechpartner hinzufügen.</p>`;
  }
  const sorted = [...contacts].sort((a, b) => {
    const ap = a.fields.is_primary ? 0 : 1;
    const bp = b.fields.is_primary ? 0 : 1;
    if (ap !== bp) return ap - bp;
    const an = (a.fields.last_name || a.fields.name || '').toLowerCase();
    const bn = (b.fields.last_name || b.fields.name || '').toLowerCase();
    return an.localeCompare(bn, 'de');
  });
  const list = sorted.length === 0
    ? '<p id="contactsEmpty" class="text-xs text-ink-500 italic px-3 py-2">Noch keine Ansprechpartner.</p>'
    : '<div id="contactsList" class="space-y-2">' + sorted.map(c => `<div data-contact-row="${c.id}">${contactRow(entity, entityId, c)}</div>`).join('') + '</div>';
  return `
    ${list}
    <div id="contactInlineFormWrap" class="mt-2"></div>
    <button id="addContactBtn" type="button" onclick="showContactInlineForm('${entity}','${entityId}')" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1.5 mt-3">
      <i data-lucide="plus" class="w-4 h-4"></i> Ansprechpartner hinzufügen
    </button>
  `;
}

function contactDisplayName(f) {
  const full = [f.first_name, f.last_name].filter(Boolean).join(' ');
  return full || f.name || '–';
}

function contactSalutation(f) {
  if (f.gender === 'männlich') return 'Herr';
  if (f.gender === 'weiblich') return 'Frau';
  return '';
}

function contactRow(entity, entityId, c) {
  const f = c.fields || {};
  const summary = [f.email, f.phone, f.mobile].filter(Boolean).join(' · ');
  const sal = contactSalutation(f);
  return `
    <div class="flex items-center justify-between p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.is_primary ? '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-500" style="fill:currentColor"></i>' : ''}
          <p class="font-medium text-ink-900 text-sm truncate">${sal ? escapeHtml(sal) + ' ' : ''}${escapeHtml(contactDisplayName(f))}</p>
          ${f.role ? `<span class="text-xs text-ink-500">· ${escapeHtml(f.role)}</span>` : ''}
        </div>
        ${summary ? `<p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(summary)}</p>` : ''}
      </div>
      <div class="flex gap-1 shrink-0 ml-2">
        <button type="button" onclick="showContactInlineForm('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
          <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
        </button>
        <button type="button" onclick="deleteContactInline('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>
  `;
}

async function showContactInlineForm(entity, entityId, contactId) {
  // Verhindern dass beim Bearbeiten ein zweites Formular auftaucht
  if (document.querySelector('#contactInlineFormWrap [data-contact-form]')) return;

  const linkField = entity + '_id';
  let f = {};
  let othersExist = false;
  try {
    const all = await readData('Contact');
    if (contactId) f = all.find(r => r.id === contactId)?.fields || {};
    const peers = all.filter(c => (c.fields[linkField] || []).includes(entityId) && c.id !== contactId);
    othersExist = peers.length > 0;
    if (!contactId && !peers.some(c => c.fields.is_primary)) f.is_primary = true;
  } catch (e) {}

  // Legacy-name in Vor-/Nachname splitten
  let firstName = f.first_name || '';
  let lastName  = f.last_name  || '';
  if (!firstName && !lastName && f.name) {
    const parts = String(f.name).trim().split(/\s+/);
    if (parts.length === 1) lastName = parts[0];
    else { firstName = parts.shift(); lastName = parts.join(' '); }
  }
  const gender = f.gender || '';
  const fid = 'cif_' + (contactId || 'new');

  // Bearbeitete Zeile temporär ausblenden
  if (contactId) {
    const row = document.querySelector(`[data-contact-row="${contactId}"]`);
    if (row) row.classList.add('hidden');
  }
  document.getElementById('addContactBtn')?.classList.add('hidden');

  document.getElementById('contactInlineFormWrap').innerHTML = `
    <div data-contact-form class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-4 space-y-3"
         onkeydown="if(event.key==='Enter'&&event.target.tagName!=='TEXTAREA'){event.preventDefault();saveContactInline('${entity}','${entityId}','${contactId || ''}')}">
      <p class="text-sm font-semibold text-brand-700">${contactId ? 'Ansprechpartner bearbeiten' : 'Neuer Ansprechpartner'}</p>

      <div>
        <span class="block text-xs font-medium text-ink-700 mb-1">Geschlecht</span>
        <div class="flex gap-2">
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='männlich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="männlich" ${gender==='männlich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">männlich</span>
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='weiblich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="weiblich" ${gender==='weiblich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">weiblich</span>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Vorname</label>
          <input id="${fid}_first_name" value="${escapeHtml(firstName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Nachname <span class="text-red-500">*</span></label>
          <input id="${fid}_last_name" value="${escapeHtml(lastName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Funktion / Position</label>
        <input id="${fid}_role" value="${escapeHtml(f.role || '')}" placeholder="z.B. Geschäftsführung, Einkauf, Buchhaltung" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">E-Mail</label>
        <input id="${fid}_email" type="email" value="${escapeHtml(f.email || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Telefon</label>
          <input id="${fid}_phone" value="${escapeHtml(f.phone || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Mobil</label>
          <input id="${fid}_mobile" value="${escapeHtml(f.mobile || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <label class="flex items-center gap-2 pt-1">
        <input type="checkbox" id="${fid}_is_primary" ${f.is_primary ? 'checked' : ''} class="w-4 h-4 rounded border-ink-300 text-brand-500 focus:ring-brand-500/30">
        <span class="text-sm">Hauptansprechpartner ${othersExist ? '<span class="text-xs text-ink-500">(ersetzt den bisherigen)</span>' : ''}</span>
      </label>

      <div class="flex justify-end gap-2 pt-1">
