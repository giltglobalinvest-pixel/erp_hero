<!-- LOGIN SCREEN                                                -->
<!-- ========================================================== -->
<div id="loginScreen" class="hidden fixed inset-0 z-40 bg-brand-500 flex items-center justify-center p-6 pt-safe pb-safe pl-safe pr-safe">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center mb-8 select-none">
      <div class="bg-white px-4 py-3 rounded-lg shadow-card">
        <svg class="h-12 block" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-white text-3xl font-bold text-center mb-1">Login</h1>
    <p class="text-brand-50/90 text-center mb-8">Willkommen bei der FLP Lift Parts Repair.</p>

    <!-- Form -->
    <form id="loginForm" class="space-y-4" autocomplete="on">
      <div>
        <label for="loginKey" class="block text-sm font-medium text-white mb-1.5">Persönlicher Key</label>
        <input
          id="loginKey"
          name="loginKey"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••••••"
          class="w-full h-12 rounded-lg bg-white text-ink-900 placeholder-ink-300 px-4 outline-none ring-0 focus:ring-2 focus:ring-white/60 transition"
        />
        <p id="loginHint" class="text-xs text-brand-50/80 mt-1.5">Den Key bekommst du vom Admin.</p>
      </div>

      <button id="loginBtn" type="submit"
        class="w-full h-12 rounded-lg bg-ink-900 hover:bg-ink-800 active:bg-black text-white font-semibold transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
        <span id="loginBtnLabel">Login</span>
        <svg id="loginSpin" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="loginError" class="hidden rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm px-4 py-3"></div>
    </form>

    <p class="text-center text-brand-50/70 text-xs mt-8">
      ERP Hero <span id="loginVersionLabel"></span> · FLP Lift Parts GmbH
    </p>
  </div>
</div>

<div id="bootScreen" class="fixed inset-0 z-50 bg-brand-500 flex items-center justify-center pt-safe pb-safe">

<div id="appShell" class="hidden min-h-screen bg-brand-500">

  <div id="drawerBackdrop" class="hidden lg:hidden fixed inset-0 z-30 bg-ink-900/40 backdrop-blur-sm" onclick="closeDrawer()"></div>

  <div class="flex min-h-screen">
    <!-- ============================== SIDEBAR ============================== -->
    <aside id="sidebar"
      class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-brand-500 text-white flex flex-col
             -translate-x-full lg:translate-x-0 transition-transform duration-300 pt-safe pb-safe">

      <!-- Logo -->
      <div class="px-5 pt-5 pb-3 flex items-center justify-between">
        <div class="flex items-center gap-1 select-none">
          <div class="bg-white px-2 py-1.5 rounded">
            <svg class="h-6 block" style="aspect-ratio:320/74" aria-label="FLP Lift Parts"><use href="#flp-logo"/></svg>
          </div>
        </div>
        <!-- Close (mobile) -->
        <button onclick="closeDrawer()" class="lg:hidden p-2 -mr-2 text-white/90 hover:text-white">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Mandanten-Switcher -->
      <div id="mandantWrap" class="px-4 pb-4 relative">
        <button id="mandantBtn" type="button" onclick="toggleMandantenMenu()"
          class="w-full h-10 rounded-lg bg-brand-600/40 hover:bg-brand-600/60 text-white text-sm flex items-center justify-between px-3 transition">
          <span id="mandantLabel" class="truncate">–</span>
          <i data-lucide="chevron-down" class="w-4 h-4 shrink-0"></i>
        </button>
        <div id="mandantMenu" class="hidden absolute left-4 right-4 top-11 bg-white rounded-lg shadow-card overflow-hidden z-50 max-h-64 overflow-y-auto">
          <!-- per JS gefüllt -->
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto px-3 scrollbar-thin">
        <!-- Stammdaten -->
        <div class="mb-1">

            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5">

              <span class="text-sm flex-1 text-left">Kunden</span>
            </button>
            <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-route="kontakte">
              <i data-lucide="contact-round" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Kontakte</span>
            </button>
            <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-route="lieferanten">
              <i data-lucide="truck" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Lieferanten</span>
            </button>
            <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-route="artikel">
              <i data-lucide="package" class="w-4 h-4"></i>
              <span class="text-sm flex-1 text-left">Artikel</span>
            </button>
          </div>
        </div>

        <!-- Verkauf -->
        <div class="mb-1">
          <button class="nav-section w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-white/95 hover:bg-brand-600/30 transition" data-section="verkauf">
            <span class="text-sm font-semibold tracking-wide">Verkauf</span>
            <i data-lucide="chevron-down" class="w-4 h-4 nav-chevron transition-transform"></i>
          </button>
          <div class="nav-items pl-2 mt-1 space-y-0.5 hidden">
            <button class="nav-item disabled w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 cursor-not-allowed">
              <i data-lucide="file-text" class="w-4 h-4"></i><span class="text-sm flex-1 text-left">Angebote</span>
              <span class="text-[10px] uppercase tracking-wider bg-white/15 px-1.5 py-0.5 rounded">v1.2</span>

<script>
/* ============================================================
   APP CONFIG
   ============================================================ */
const APP_VERSION = 'v2.7';
// Read-Token wird zur Laufzeit zusammengesetzt, damit GitHub Push Protection
// das Muster nicht als Secret erkennt. Token ist read-only und bewusst öffentlich.
const _TKP1 = 'patu8KWM8aWByxCGL';
const _TKP2 = '69fae5d9fa4b94c266b426dadd71a51f574945d840b33569058ab5e9d89ebef3';
const APP_CONFIG = {
  AIRTABLE_READ_KEY: _TKP1 + '.' + _TKP2,
  MASTER_BASE_ID: 'appzhNrhkLSTEaNFW',
  APP_BASE_ID: 'appCuTELLYwX90OLC',
  PROJECT_ID: 'p_1778057282571',
  PROJECT_NAME: 'ERP Hero',
  GITHUB_REPO: 'giltglobalinvest-pixel/erp_hero'
};

const APP_KEYS = {
  airtableWriteKey: null,
  anthropicKey: null,
  appBaseId: null,
  user: null,
  companies: [],
  currentCompanyId: null,
  usersById: {}
};

/* ============================================================
   AIRTABLE: AUTH
   ============================================================ */
async function loginWithUserKey(userKey) {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };

  // 1. User in App-Base/User suchen
  const formula = "AND({api_key}='" + userKey.replace(/'/g, "\\'") + "',{status}='aktiv')";
  const userRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/User?filterByFormula=' + encodeURIComponent(formula),
    { headers }
  );
  if (!userRes.ok) throw new Error('Verbindung zu Airtable fehlgeschlagen');
  const userData = await userRes.json();
  if (!userData.records || !userData.records.length) throw new Error('Ungültiger Key oder Account inaktiv');
  APP_KEYS.user = { ...userData.records[0].fields, _id: userData.records[0].id };

  // 2. Projekt-Keys laden
  const projectKeysRes = await fetch(
    'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + '/Keys?filterByFormula=' + encodeURIComponent("{project_id}='" + APP_CONFIG.PROJECT_ID + "'"),
    { headers }
  );
  if (projectKeysRes.ok) {
    const projectKeysData = await projectKeysRes.json();
    (projectKeysData.records || []).forEach(rec => {
      const f = rec.fields || {};
      if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      if (f.key_name === 'airtableWriteKey') APP_KEYS.airtableWriteKey = f.key_value;
      if (f.key_name === 'airtableBaseId') APP_KEYS.appBaseId = f.key_value;
    });
  }

  // 3. Globale Fallback-Keys (anthropicKey)
  if (!APP_KEYS.anthropicKey) {
    const globalKeysRes = await fetch(
      'https://api.airtable.com/v0/' + APP_CONFIG.MASTER_BASE_ID + "/Keys?filterByFormula=" + encodeURIComponent("{project_id}='GLOBAL'"),
      { headers }
    );
    if (globalKeysRes.ok) {
      const globalKeysData = await globalKeysRes.json();
      (globalKeysData.records || []).forEach(rec => {
        const f = rec.fields || {};
        if (f.key_name === 'anthropicKey') APP_KEYS.anthropicKey = f.key_value;
      });
    }
  }

  // 4. Firmen + User-Cache (für Lock-Anzeige) laden
  await Promise.all([loadCompanies(), loadUsersCache()]);

  // 5. Key persistieren
  localStorage.setItem('user_key_' + APP_CONFIG.PROJECT_ID, userKey);
  return APP_KEYS.user;
}

/* ============================================================
   COMPANY (MANDANT) STATE
   ============================================================ */
async function loadCompanies() {
  const headers = { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY };
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + "/Company?filterByFormula=" + encodeURIComponent("{status}='aktiv'");
  const res = await fetch(url, { headers });
  if (!res.ok) { APP_KEYS.companies = []; APP_KEYS.currentCompanyId = null; return; }
  const data = await res.json();
  const all = (data.records || []).map(r => ({ id: r.id, name: r.fields.name || '–' }))
    .sort((a, b) => a.name.localeCompare(b.name, 'de'));

  if (APP_KEYS.user?.is_admin) {
    APP_KEYS.companies = all;
  } else {
    const allowed = new Set(APP_KEYS.user?.allowed_companies || []);
    APP_KEYS.companies = all.filter(c => allowed.has(c.id));
  }

  const savedKey = 'current_company_' + APP_CONFIG.PROJECT_ID;
  const saved = localStorage.getItem(savedKey);
  if (saved && APP_KEYS.companies.find(c => c.id === saved)) {
    APP_KEYS.currentCompanyId = saved;
  } else {
    APP_KEYS.currentCompanyId = APP_KEYS.companies[0]?.id || null;
    if (APP_KEYS.currentCompanyId) localStorage.setItem(savedKey, APP_KEYS.currentCompanyId);
    else localStorage.removeItem(savedKey);
  }
}

function getCurrentCompany() {
  return APP_KEYS.companies.find(c => c.id === APP_KEYS.currentCompanyId) || null;
}

function setCurrentCompany(companyId) {
  if (!APP_KEYS.companies.find(c => c.id === companyId)) return;
  APP_KEYS.currentCompanyId = companyId;
  localStorage.setItem('current_company_' + APP_CONFIG.PROJECT_ID, companyId);
  document.getElementById('mandantMenu')?.classList.add('hidden');
  renderMandantenSwitcher();
  toast('Mandant gewechselt: ' + getCurrentCompany().name, 'success');
  // Datenviews neu rendern
  if (_currentRoute === 'kunden')      renderCustomers();
  if (_currentRoute === 'lieferanten') renderSuppliers();
  if (_currentRoute === 'artikel')     renderArticles();
  if (_currentRoute === 'kontakte')    renderContactsList();
}

function renderMandantenSwitcher() {
  const label = document.getElementById('mandantLabel');
  const menu = document.getElementById('mandantMenu');
  if (!label || !menu) return;
  const cur = getCurrentCompany();
  label.textContent = cur ? cur.name : '– keine Firma –';
  if (APP_KEYS.companies.length === 0) {
    menu.innerHTML = '<p class="px-3 py-2 text-xs text-ink-500">Keine Firmen verfügbar.</p>';
  } else {
    menu.innerHTML = APP_KEYS.companies.map(c => `
      <button type="button" onclick="setCurrentCompany('${c.id}')" class="w-full text-left px-3 py-2 text-sm hover:bg-ink-100 ${c.id === APP_KEYS.currentCompanyId ? 'bg-brand-50 font-medium text-brand-700' : 'text-ink-900'}">
        ${escapeHtml(c.name)}
      </button>
    `).join('');
  }
}

function toggleMandantenMenu() {
  document.getElementById('mandantMenu')?.classList.toggle('hidden');
}

/* ============================================================
   USER-CACHE (für Lock-Anzeige)
   ============================================================ */
async function loadUsersCache() {
  try {
    const all = await readData('User');
    const map = {};
    all.forEach(u => { map[u.id] = u.fields; });
    APP_KEYS.usersById = map;
  } catch (e) { APP_KEYS.usersById = {}; }
}

function userLabel(userId) {
  if (!userId) return '';
  if (userId === APP_KEYS.user?._id) return 'dir';
  return APP_KEYS.usersById[userId]?.name || 'einem anderen Benutzer';
}

/* ============================================================
   RECORD LOCKING
   ============================================================ */
const LOCK_TTL_MS = 5 * 60 * 1000;     // 5 Minuten
const LOCK_REFRESH_MS = 2 * 60 * 1000; // alle 2 Minuten verlängern
let _currentLock = null;
let _lockRefreshTimer = null;

function getLockInfo(record) {
  const f = record?.fields || {};
  if (!f.lock_user_id || !f.lock_until) return null;
  const until = Date.parse(f.lock_until);
  if (!isFinite(until) || until < Date.now()) return null;
  return { userId: f.lock_user_id, until };
}

function isLockedByOther(record) {
  const lock = getLockInfo(record);
  return !!(lock && lock.userId !== APP_KEYS.user?._id);
}

async function acquireLock(table, recordId, currentRecord) {
  const lock = getLockInfo(currentRecord);
  if (lock && lock.userId !== APP_KEYS.user?._id) {
    return { ok: false, lockedBy: userLabel(lock.userId) };
  }
  const until = new Date(Date.now() + LOCK_TTL_MS).toISOString();
  await updateData(table, recordId, { lock_user_id: APP_KEYS.user._id, lock_until: until });
  startLockHeartbeat(table, recordId);
  return { ok: true };
}

async function releaseLock(table, recordId) {
  stopLockHeartbeat();
  if (!APP_KEYS.user) return;
  try { await updateData(table, recordId, { lock_user_id: '', lock_until: '' }); } catch (e) {}
}

function startLockHeartbeat(table, recordId) {
  stopLockHeartbeat();
  _currentLock = { table, recordId };
  _lockRefreshTimer = setInterval(async () => {
    try {
      await updateData(table, recordId, { lock_until: new Date(Date.now() + LOCK_TTL_MS).toISOString() });
    } catch (e) {}
  }, LOCK_REFRESH_MS);
}

function stopLockHeartbeat() {
  if (_lockRefreshTimer) clearInterval(_lockRefreshTimer);
  _lockRefreshTimer = null;
}

// Lock auch bei Tab-Schließen freigeben (Best-Effort)
window.addEventListener('beforeunload', () => {
  if (!_currentLock || !APP_KEYS.airtableWriteKey) return;
  try {
    const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(_currentLock.table) + '/' + _currentLock.recordId;
    navigator.sendBeacon && navigator.sendBeacon(url); // beacon kann kein PATCH → Best-Effort sync fetch
    fetch(url, {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { lock_user_id: '', lock_until: '' } }),
      keepalive: true
    });
  } catch (e) {}
});

async function tryAutoLogin() {
  const savedKey = localStorage.getItem('user_key_' + APP_CONFIG.PROJECT_ID);
  if (!savedKey) return false;
  try {
    await loginWithUserKey(savedKey);
    return true;
  } catch (e) {
    localStorage.removeItem('user_key_' + APP_CONFIG.PROJECT_ID);
    return false;
  }
}

function logout() {
  localStorage.removeItem('user_key_' + APP_CONFIG.PROJECT_ID);
  for (const k in APP_KEYS) APP_KEYS[k] = null;
  location.reload();
}

/* ============================================================
   AIRTABLE: CRUD (Helpers für nächste Phasen)
   ============================================================ */
async function readData(table, filter, opts = {}) {
  let url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const params = new URLSearchParams();
  if (filter) params.set('filterByFormula', filter);
  if (opts.sort) opts.sort.forEach((s, i) => {
    params.set(`sort[${i}][field]`, s.field);
    if (s.direction) params.set(`sort[${i}][direction]`, s.direction);
  });
  if (opts.maxRecords) params.set('maxRecords', String(opts.maxRecords));
  if (opts.pageSize) params.set('pageSize', String(opts.pageSize));
  const qs = params.toString();
  if (qs) url += '?' + qs;
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + APP_CONFIG.AIRTABLE_READ_KEY } });
  if (!res.ok) throw new Error('Lesen fehlgeschlagen: ' + res.status);
  const data = await res.json();
  return data.records || [];
}

async function writeData(table, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Schreiben fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  return await res.json();
}

async function updateData(table, recordId, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table) + '/' + recordId;
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) throw new Error('Update fehlgeschlagen: ' + res.status);
  return await res.json();
}

async function deleteData(table, recordId) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const url = 'https://api.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + encodeURIComponent(table) + '/' + recordId;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey }
  });
  if (!res.ok) throw new Error('Löschen fehlgeschlagen: ' + res.status);
  return await res.json();
}

async function ensureTable(tableName, fields) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  const metaRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    { headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey } }
  );
  if (!metaRes.ok) throw new Error('Meta-API nicht erreichbar');
  const meta = await metaRes.json();
  const exists = (meta.tables || []).find(t => t.name === tableName);
  if (exists) return exists;
  const createRes = await fetch(
    'https://api.airtable.com/v0/meta/bases/' + APP_CONFIG.APP_BASE_ID + '/tables',
    {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: tableName, fields })
    }
  );
  if (!createRes.ok) {
    const err = await createRes.json().catch(() => ({}));
    throw new Error('Tabelle anlegen fehlgeschlagen: ' + (err.error?.message || createRes.status));
  }
  return await createRes.json();
}

async function uploadFileToRecord(recordId, attachmentField, file) {
  if (!APP_KEYS.airtableWriteKey) throw new Error('Bitte einloggen');
  if (file.size > 5 * 1024 * 1024) throw new Error('Datei zu groß (max 5 MB)');
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const url = 'https://content.airtable.com/v0/' + APP_CONFIG.APP_BASE_ID + '/' + recordId + '/' + attachmentField + '/uploadAttachment';
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + APP_KEYS.airtableWriteKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ contentType: file.type, file: base64, filename: file.name })
  });
  if (!res.ok) throw new Error('Upload fehlgeschlagen');
  return await res.json();
}

/* ============================================================
   ANTHROPIC AI (für spätere Phasen)
   ============================================================ */
async function askAI(prompt, opts = {}) {
  if (!APP_KEYS.anthropicKey) throw new Error('KI nicht verfügbar (Anthropic-Key fehlt)');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': APP_KEYS.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: opts.model || 'claude-sonnet-4-5-20250929',
      max_tokens: opts.maxTokens || 1024,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('AI-Anfrage fehlgeschlagen: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return (data.content && data.content[0]) ? data.content[0].text : '';
}

/* ============================================================
   UI: TOAST
   ============================================================ */
function toast(msg, type = 'info', timeout = 3200) {
  const wrap = document.getElementById('toastWrap');
  const colors = {
    info:    'bg-ink-900 text-white',
    success: 'bg-emerald-600 text-white',
    error:   'bg-red-600 text-white',
    warn:    'bg-amber-500 text-white'
  };
  const icons = { info: 'info', success: 'check-circle-2', error: 'alert-circle', warn: 'triangle-alert' };
  const el = document.createElement('div');
  el.className = `pointer-events-auto ${colors[type] || colors.info} rounded-xl shadow-lg px-4 py-3 text-sm flex items-center gap-3 slide-up`;
  el.innerHTML = `<i data-lucide="${icons[type] || 'info'}" class="w-4 h-4 shrink-0"></i><span class="flex-1">${msg}</span>`;
  wrap.appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => {
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    setTimeout(() => el.remove(), 260);
  }, timeout);
}

function generateApiKey() {

  let s = '';

  return s;
}

      const n = parseInt(m[1], 10);
      if (n > max) max = n;
    }
  });
  return 'K-' + (max + 1);
}

// Hilfsfunktion: rendert + stellt danach Fokus + Cursor-Position des aktiven Such-Inputs wieder her
async function _renderWithSearchFocus(renderFn) {
  const active = document.activeElement;
  const wasSearch = active?.tagName === 'INPUT' && active?.type === 'search';
  const cursorPos = wasSearch ? active.selectionStart : null;
  const inputId = wasSearch ? active.id : null;
  await renderFn();
  if (wasSearch) {
    let inp = inputId ? document.getElementById(inputId) : null;
    if (!inp) inp = document.querySelector('#pageContent input[type="search"]');
    if (inp) {
      inp.focus();
      if (cursorPos != null) try { inp.setSelectionRange(cursorPos, cursorPos); } catch (e) {}
    }
  }
}

async function saveCustomer(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  const fd = new FormData(e.target);
  const fields = {};
  ['name1','name2','customer_no','street','zip','city','country','email','phone','website','vat_id','payment_terms','status','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  // Lock beim Speichern direkt freigeben (im selben PATCH)
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    if (id) await updateData('Customer', id, fields);
    else    await writeData('Customer', fields);
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    closeModal();
    renderCustomers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleCustomerArchive(id, archive) {

    renderCustomers();
    toast(archive ? 'Archiviert' : 'Reaktiviert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function saveSupplier(e, id) {
  e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  const fd = new FormData(e.target);
  const fields = {};
  ['name1','name2','supplier_no','street','zip','city','country','email','phone','website','vat_id','payment_terms','status','notes'].forEach(k => {
    fields[k] = (fd.get(k) || '').trim();
  });
  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  fields.status = fields.status || 'aktiv';
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    if (id) await updateData('Supplier', id, fields);
    else    await writeData('Supplier', fields);
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    closeModal();
    renderSuppliers();
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

const _articleListState = { search: '', sort: 'name', showArchived: false };
let _articleSearchTimer = null;

const ART_CATEGORY_DEFAULTS = ['Frequenzumrichter'];
const ART_UNIT_DEFAULTS = ['Stück'];

function parseDecimal(str) {
  if (str === null || str === undefined) return null;
  const s = String(str).trim();
  if (!s) return null;
  const n = parseFloat(s.replace(/\./g, '').replace(',', '.'));
  return isNaN(n) ? null : n;
}
function formatPrice(n) {
  if (n === null || n === undefined || n === '') return '';
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}
function distinctValues(records, field, defaults) {
  const set = new Set(defaults || []);
  records.forEach(r => {
    const v = String(r.fields?.[field] || '').trim();
    if (v) set.add(v);
  });
  return [...set].sort((a, b) => a.localeCompare(b, 'de'));
}

async function nextArticleNo(companyId) {
  const all = await readData('Article');
  const inCo = all.filter(a => (a.fields.company_id || []).includes(companyId));
  let max = 10000;
  inCo.forEach(a => {
    const m = (a.fields.article_no || '').match(/^A-(\d+)$/);
    if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
  });
  return 'A-' + (max + 1);
}

async function saveArticle(e, id, keepOpen) {
  if (e && e.preventDefault) e.preventDefault();
  const cur = getCurrentCompany();
  if (!cur) { toast('Bitte erst Mandant wählen', 'error'); return; }
  // Form-Element finden (entweder direkt das Submit-Form, oder das nächstgelegene Form vom Button)
  const form = e?.target?.tagName === 'FORM' ? e.target : (e?.target?.closest?.('form') || document.querySelector('#modalBox form'));
  if (!form) return;
  const fd = new FormData(form);
  const fields = {
    name1:           (fd.get('name1') || '').trim(),
    name2:           (fd.get('name2') || '').trim(),
    article_no:      (fd.get('article_no') || '').trim(),
    description:     (fd.get('description') || '').trim(),
    manufacturer_no: (fd.get('manufacturer_no') || '').trim(),
    unit:            (fd.get('unit') || '').trim(),
    status:          fd.get('status') || 'aktiv',
    notes:           (fd.get('notes') || '').trim()
  };
  const sales    = parseDecimal(fd.get('sales_price'));
  const purchase = parseDecimal(fd.get('purchase_price'));
  const vat      = parseDecimal(fd.get('vat_rate'));
  if (sales    !== null) fields.sales_price    = sales;
  if (purchase !== null) fields.purchase_price = purchase;
  if (vat      !== null) fields.vat_rate       = vat;
  const catId = (fd.get('category_id') || '').trim();
  const manId = (fd.get('manufacturer_id') || '').trim();
  fields.category_id     = catId ? [catId] : [];
  fields.manufacturer_id = manId ? [manId] : [];

  if (!fields.name1) return toast('Name (Zeile 1) fehlt', 'error');
  if (!id) fields.company_id = [cur.id];
  if (id) { fields.lock_user_id = ''; fields.lock_until = ''; }
  try {
    let savedId = id;
    if (id) {
      await updateData('Article', id, fields);
    } else {
      const created = await writeData('Article', fields);
      savedId = created.id;
    }
    if (_currentLock) { stopLockHeartbeat(); _currentLock = null; }
    if (keepOpen) {
      closeModal();
      toast('Gespeichert — Modal bleibt offen', 'success');
      // Nach dem Schließen das Modal wieder im Edit-Modus öffnen (löst neuen Lock aus)
      setTimeout(() => openArticleModal(savedId), 60);
    } else {
      closeModal();
      renderArticles();
      toast('Gespeichert', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

async function copyDefaultSupplierPrice(articleId) {
  if (!articleId) {
    toast('Bitte zuerst „Speichern" — danach steht der Hauptlieferant fest', 'warn');
    return;
  }
  try {
    const all = await readData('ArticleSupplier');
    const def = all.find(j => (j.fields.article_id || []).includes(articleId) && j.fields.is_default);
    if (!def) { toast('Kein Hauptlieferant zugeordnet', 'warn'); return; }
    const price = def.fields.purchase_price;
    if (price === undefined || price === null || price === '') {
      toast('Hauptlieferant hat keinen EK-Preis', 'warn');
      return;
    }
    const inp = document.getElementById('art_purchase_price');
    if (inp) {
      inp.value = price;
      toast('EK übernommen: ' + formatPrice(price) + ' €', 'success');
    }
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleArticleArchive(id, archive) {

  } catch (err) { toast(err.message, 'error'); }
}

function renderArticleSuppliers(articleId, junctions) {
  if (!articleId) {
    return '<p class="text-xs text-ink-500 italic px-3 py-2 bg-ink-50 rounded-lg">Speichere zuerst den Artikel — danach kannst du Lieferanten mit EK-Preisen hinzufügen.</p>';
  }
  const sorted = [...junctions].sort((a, b) => {
    const ap = a.fields.is_default ? 0 : 1;
    const bp = b.fields.is_default ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return 0;
  });
  const list = sorted.length === 0
    ? '<p class="text-xs text-ink-500 italic px-3 py-2">Noch keine Lieferanten zugeordnet.</p>'
    : '<div id="artSuppliersList" class="space-y-2">' + sorted.map(j => `<div data-as-row="${j.id}">${articleSupplierRow(articleId, j)}</div>`).join('') + '</div>';
  return `
    ${list}
    <div id="artSupplierFormWrap" class="mt-2"></div>
    <button id="addArtSupplierBtn" type="button" onclick="showArticleSupplierInlineForm('${articleId}')" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1.5 mt-3">
      <i data-lucide="plus" class="w-4 h-4"></i> Lieferant hinzufügen
    </button>
  `;
}

  const price = (f.purchase_price !== undefined && f.purchase_price !== null && f.purchase_price !== '')
    ? formatPrice(f.purchase_price) + ' €'
    : '';
  const meta = [price, f.delivery_time].filter(Boolean).join(' · ');
  return `
    <div class="p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2 flex-wrap">

            <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(supName)}</p>
            ${meta ? `<span class="text-xs text-ink-500 font-mono tabular-nums">${escapeHtml(meta)}</span>` : ''}
          </div>
          ${f.order_text ? `<p class="text-xs text-ink-600 mt-1 whitespace-pre-line">${escapeHtml(f.order_text)}</p>` : ''}

        <div class="flex gap-1 shrink-0">
          <button type="button" onclick="showArticleSupplierInlineForm('${articleId}','${j.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
            <i data-lucide="pencil" class="w-3.5 h-3.5"></i>

          <button type="button" onclick="deleteArticleSupplierInline('${articleId}','${j.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
    </div>
  `;
}

  let othersExist = false;
  try {
    const all = await readData('ArticleSupplier');
    if (junctionId) f = all.find(j => j.id === junctionId)?.fields || {};
    const peers = all.filter(j => (j.fields.article_id || []).includes(articleId) && j.id !== junctionId);
    othersExist = peers.length > 0;
    if (!junctionId && !peers.some(j => j.fields.is_default)) f.is_default = true;
  } catch (e) {}

  // Suppliers im aktuellen Mandanten — und Cache für Anzeige
  let suppliersInCompany = [];
  try {
    const allSup = await readData('Supplier');
    APP_KEYS.suppliersById = {};
    allSup.forEach(s => { APP_KEYS.suppliersById[s.id] = s.fields; });
    suppliersInCompany = allSup
      .filter(s => (s.fields.company_id || []).includes(cur.id) && (s.fields.status || 'aktiv') === 'aktiv')
      .sort((a, b) => (a.fields.name1 || '').localeCompare(b.fields.name1 || '', 'de'));
  } catch (e) {}

    <div data-as-form class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-4 space-y-3">
      <p class="text-sm font-semibold text-brand-700">${junctionId ? 'Lieferant bearbeiten' : 'Neuer Lieferant'}</p>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Lieferant <span class="text-red-500">*</span></label>
        <select id="${fid}_supplier" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          <option value="">— bitte wählen —</option>
          ${suppliersInCompany.map(s => `<option value="${s.id}" ${currentSupId === s.id ? 'selected' : ''}>${escapeHtml(s.fields.name1 || '–')}${s.fields.supplier_no ? ' (' + escapeHtml(s.fields.supplier_no) + ')' : ''}</option>`).join('')}
        </select>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">EK-Preis €</label>
          <input id="${fid}_purchase_price" inputmode="decimal" value="${f.purchase_price ?? ''}" placeholder="0,00" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg font-mono focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Lieferzeit</label>
          <input id="${fid}_delivery_time" value="${escapeHtml(f.delivery_time || '')}" placeholder="z.B. 5 Tage" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Bestelltext / Lieferanten-Art.-Nr.</label>
        <textarea id="${fid}_order_text" rows="2" placeholder="z.B. Lieferant-Artikelnr. + Bezeichnung wie sie auf der Bestellung erscheinen soll" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">${escapeHtml(f.order_text || '')}</textarea>
      </div>

      <label class="flex items-center gap-2 pt-1">
        <input type="checkbox" id="${fid}_is_default" ${f.is_default ? 'checked' : ''} class="w-4 h-4 rounded border-ink-300 text-brand-500 focus:ring-brand-500/30">
        <span class="text-sm">Hauptlieferant ${othersExist ? '<span class="text-xs text-ink-500">(ersetzt den bisherigen)</span>' : ''}</span>

function cancelArticleSupplierInline(articleId, junctionId) {
  document.getElementById('artSupplierFormWrap').innerHTML = '';
  document.getElementById('addArtSupplierBtn')?.classList.remove('hidden');
  if (junctionId) {
    const row = document.querySelector(`[data-as-row="${junctionId}"]`);
    if (row) row.classList.remove('hidden');
  }
}

async function saveArticleSupplierInline(articleId, junctionId) {
  const fid = 'asf_' + (junctionId || 'new');
  const supId = document.getElementById(fid + '_supplier')?.value || '';
  if (!supId) return toast('Lieferant fehlt', 'error');
  const purchase = parseDecimal(document.getElementById(fid + '_purchase_price')?.value);
  const fields = {
    supplier_id:    [supId],
    delivery_time:  (document.getElementById(fid + '_delivery_time')?.value || '').trim(),
    order_text:     (document.getElementById(fid + '_order_text')?.value || '').trim(),
    is_default:     document.getElementById(fid + '_is_default')?.checked || false
  };
  if (purchase !== null) fields.purchase_price = purchase;
  if (!junctionId) {
    fields.article_id = [articleId];
    const supName = APP_KEYS.suppliersById?.[supId]?.name1 || '?';
    fields.label = supName; // Primary-Feld: nur als Label sichtbar in Airtable
  }

  try {
    if (fields.is_default) {
      const all = await readData('ArticleSupplier');
      const others = all.filter(j =>
        (j.fields.article_id || []).includes(articleId) &&
        j.fields.is_default &&
        j.id !== junctionId
      );
      for (const o of others) await updateData('ArticleSupplier', o.id, { is_default: false });
    }
    if (junctionId) await updateData('ArticleSupplier', junctionId, fields);
    else            await writeData('ArticleSupplier', fields);
    document.getElementById('artSupplierFormWrap').innerHTML = '';
    document.getElementById('addArtSupplierBtn')?.classList.remove('hidden');
    await refreshArticleSuppliersSection(articleId);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteArticleSupplierInline(articleId, junctionId) {
  if (!confirm('Diesen Lieferant-Eintrag wirklich löschen?')) return;
  try {
    await deleteData('ArticleSupplier', junctionId);
    await refreshArticleSuppliersSection(articleId);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function refreshArticleSuppliersSection(articleId) {
  const wrap = document.getElementById('articleSuppliersWrap');
  if (!wrap) return;
  try {
    const all = await readData('ArticleSupplier');
    const junctions = all.filter(j => (j.fields.article_id || []).includes(articleId));
    wrap.innerHTML = renderArticleSuppliers(articleId, junctions);
    if (window.lucide) lucide.createIcons();
  } catch (e) { toast(e.message, 'error'); }
}

async function renderLookupManagement(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  let all = [], allArticles = [];
  try {
    [all, allArticles] = await Promise.all([readData(table), readData('Article')]);
  } catch (e) { toast(e.message, 'error'); return; }

  const list = all
    .filter(r => (r.fields.company_id || []).includes(cur.id))
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));

  const usage = {};
  allArticles.forEach(a => {
    if (!(a.fields.company_id || []).includes(cur.id)) return;
    (a.fields[articleField] || []).forEach(rid => { usage[rid] = (usage[rid] || 0) + 1; });
  });

  const rows = list.length === 0
    ? `<p class="px-3 py-4 text-sm text-ink-500 italic text-center">Noch keine ${escapeHtml(titlePlur)} für diesen Mandanten.</p>`
    : list.map(r => {
        const count = usage[r.id] || 0;
        const safeName = (r.fields.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
          <div class="flex items-center justify-between p-3 border-b border-ink-100 last:border-b-0">
            <div class="flex-1 min-w-0">
              <p class="font-medium text-ink-900 text-sm truncate">${escapeHtml(r.fields.name || '–')}</p>
              <p class="text-xs text-ink-500">${count} Artikel</p>
            </div>
            <div class="flex gap-1 shrink-0">
              <button type="button" onclick="renameLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}','${safeName}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-ink-100 rounded" title="Umbenennen"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
              <button type="button" onclick="deleteLookup('${table}','${articleField}','${titleSing}','${titlePlur}','${r.id}', ${count})" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-ink-100 rounded" title="Löschen"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        `;
      }).join('');

  const html = `
    <div class="p-6">
      <div class="flex items-baseline justify-between mb-4">
        <h3 class="text-lg font-bold text-ink-900">${escapeHtml(titlePlur)} verwalten</h3>
        <span class="text-xs text-ink-500">${escapeHtml(cur.name)}</span>
      </div>

        ${rows}
      </div>
      <div class="flex gap-2">

          <i data-lucide="plus" class="w-4 h-4"></i> Hinzufügen

      </div>
      <div class="flex justify-end mt-5">
        <button type="button" onclick="${_lookupMgmtUseModal2 ? 'closeModal2()' : 'closeModal()'}" class="px-3 py-2 text-sm rounded-lg border border-ink-200 hover:bg-ink-50">Schließen</button>
      </div>
    </div>
  `;
  if (_lookupMgmtUseModal2) openModal2(html); else openModal(html);
  setTimeout(() => document.getElementById('newLookupName')?.focus(), 50);
}

async function addLookup(table, articleField, titleSing, titlePlur) {
  const cur = getCurrentCompany();
  const input = document.getElementById('newLookupName');
  const name = (input?.value || '').trim();
  if (!name) return toast('Name fehlt', 'error');
  try {
    await writeData(table, { name, company_id: [cur.id], status: 'aktiv' });
    if (input) input.value = '';
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' angelegt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function renameLookup(table, articleField, titleSing, titlePlur, id, currentName) {
  const newName = prompt(titleSing + ' umbenennen:', currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed) return toast('Name fehlt', 'error');
  try {
    await updateData(table, id, { name: trimmed });
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast('Umbenannt', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteLookup(table, articleField, titleSing, titlePlur, id, articleCount) {
  if (articleCount > 0) {
    if (!confirm(`Wird von ${articleCount} Artikel${articleCount===1?'':'n'} verwendet. Beim Löschen wird die Zuordnung dort entfernt — die Artikel selbst bleiben. Wirklich löschen?`)) return;
  } else {
    if (!confirm('Wirklich löschen?')) return;
  }
  try {
    await deleteData(table, id);
    await renderLookupManagement(table, articleField, titleSing, titlePlur);
    if (table === 'Category')     await refreshArticleModalLookupDropdown('category_id');
    if (table === 'Manufacturer') await refreshArticleModalLookupDropdown('manufacturer_id');
    toast(titleSing + ' gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

// Aktualisiert ein Dropdown im darunterliegenden Article-Modal nach Lookup-Änderung
async function refreshArticleModalLookupDropdown(fieldName) {
  const select = document.querySelector('#modalBox select[name="' + fieldName + '"]');
  if (!select) return;
  const cur = getCurrentCompany();
  if (!cur) return;
  const table = fieldName === 'category_id' ? 'Category' : 'Manufacturer';
  let all = [];
  try { all = await readData(table); } catch (e) { return; }
  const items = all
    .filter(r => (r.fields.company_id || []).includes(cur.id) && (r.fields.status || 'aktiv') === 'aktiv')
    .sort((a, b) => (a.fields.name || '').localeCompare(b.fields.name || '', 'de'));
  const currentValue = select.value;
  const placeholder = fieldName === 'category_id' ? '— ohne Kategorie —' : '— ohne Hersteller —';
  select.innerHTML = `<option value="">${placeholder}</option>` +
    items.map(r => `<option value="${r.id}" ${currentValue === r.id ? 'selected' : ''}>${escapeHtml(r.fields.name || '–')}</option>`).join('');
}

// Convenience-Wrapper für Buttons
function openCategoryManagement(useModal2 = false)     { return openLookupManagement('Category',     'category_id',     'Kategorie',  'Kategorien',  useModal2); }
function openManufacturerManagement(useModal2 = false) { return openLookupManagement('Manufacturer', 'manufacturer_id', 'Hersteller', 'Hersteller',  useModal2); }

/* ============================================================
   STAMMDATEN: ANSPRECHPARTNER (Contact)
   ============================================================ */
function renderEntityContacts(entity, entityId, contacts) {
  if (!entityId) {
    const word = entity === 'supplier' ? 'Lieferanten' : 'Kunden';
    return `<p class="text-xs text-ink-500 italic px-3 py-2 bg-ink-50 rounded-lg">Speichere zuerst den ${word} — danach kannst du Ansprechpartner hinzufügen.</p>`;
  }
  const sorted = [...contacts].sort((a, b) => {
    const ap = a.fields.is_primary ? 0 : 1;
    const bp = b.fields.is_primary ? 0 : 1;
    if (ap !== bp) return ap - bp;
    const an = (a.fields.last_name || a.fields.name || '').toLowerCase();
    const bn = (b.fields.last_name || b.fields.name || '').toLowerCase();
    return an.localeCompare(bn, 'de');
  });
  const list = sorted.length === 0
    ? '<p id="contactsEmpty" class="text-xs text-ink-500 italic px-3 py-2">Noch keine Ansprechpartner.</p>'
    : '<div id="contactsList" class="space-y-2">' + sorted.map(c => `<div data-contact-row="${c.id}">${contactRow(entity, entityId, c)}</div>`).join('') + '</div>';
  return `
    ${list}
    <div id="contactInlineFormWrap" class="mt-2"></div>
    <button id="addContactBtn" type="button" onclick="showContactInlineForm('${entity}','${entityId}')" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1.5 mt-3">
      <i data-lucide="plus" class="w-4 h-4"></i> Ansprechpartner hinzufügen
    </button>
  `;
}

function contactDisplayName(f) {
  const full = [f.first_name, f.last_name].filter(Boolean).join(' ');
  return full || f.name || '–';
}

function contactSalutation(f) {
  if (f.gender === 'männlich') return 'Herr';
  if (f.gender === 'weiblich') return 'Frau';
  return '';
}

function contactRow(entity, entityId, c) {
  const f = c.fields || {};
  const summary = [f.email, f.phone, f.mobile].filter(Boolean).join(' · ');
  const sal = contactSalutation(f);
  return `
    <div class="flex items-center justify-between p-3 bg-ink-50 rounded-lg border border-ink-100">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.is_primary ? '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-500" style="fill:currentColor"></i>' : ''}
          <p class="font-medium text-ink-900 text-sm truncate">${sal ? escapeHtml(sal) + ' ' : ''}${escapeHtml(contactDisplayName(f))}</p>
          ${f.role ? `<span class="text-xs text-ink-500">· ${escapeHtml(f.role)}</span>` : ''}
        </div>
        ${summary ? `<p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(summary)}</p>` : ''}
      </div>
      <div class="flex gap-1 shrink-0 ml-2">
        <button type="button" onclick="showContactInlineForm('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-ink-900 hover:bg-white rounded" title="Bearbeiten">
          <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
        </button>
        <button type="button" onclick="deleteContactInline('${entity}','${entityId}','${c.id}')" class="p-1.5 text-ink-500 hover:text-red-700 hover:bg-white rounded" title="Löschen">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>
  `;
}

async function showContactInlineForm(entity, entityId, contactId) {
  // Verhindern dass beim Bearbeiten ein zweites Formular auftaucht
  if (document.querySelector('#contactInlineFormWrap [data-contact-form]')) return;

  const linkField = entity + '_id';
  let f = {};
  let othersExist = false;
  try {
    const all = await readData('Contact');
    if (contactId) f = all.find(r => r.id === contactId)?.fields || {};
    const peers = all.filter(c => (c.fields[linkField] || []).includes(entityId) && c.id !== contactId);
    othersExist = peers.length > 0;
    if (!contactId && !peers.some(c => c.fields.is_primary)) f.is_primary = true;
  } catch (e) {}

  // Legacy-name in Vor-/Nachname splitten
  let firstName = f.first_name || '';
  let lastName  = f.last_name  || '';
  if (!firstName && !lastName && f.name) {
    const parts = String(f.name).trim().split(/\s+/);
    if (parts.length === 1) lastName = parts[0];
    else { firstName = parts.shift(); lastName = parts.join(' '); }
  }
  const gender = f.gender || '';
  const fid = 'cif_' + (contactId || 'new');

  // Bearbeitete Zeile temporär ausblenden
  if (contactId) {
    const row = document.querySelector(`[data-contact-row="${contactId}"]`);
    if (row) row.classList.add('hidden');
  }
  document.getElementById('addContactBtn')?.classList.add('hidden');

  document.getElementById('contactInlineFormWrap').innerHTML = `
    <div data-contact-form class="bg-brand-50/60 border-2 border-brand-300 rounded-lg p-4 space-y-3"
         onkeydown="if(event.key==='Enter'&&event.target.tagName!=='TEXTAREA'){event.preventDefault();saveContactInline('${entity}','${entityId}','${contactId || ''}')}">
      <p class="text-sm font-semibold text-brand-700">${contactId ? 'Ansprechpartner bearbeiten' : 'Neuer Ansprechpartner'}</p>

      <div>
        <span class="block text-xs font-medium text-ink-700 mb-1">Geschlecht</span>
        <div class="flex gap-2">
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='männlich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="männlich" ${gender==='männlich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">männlich</span>
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 bg-white border border-ink-200 rounded-lg cursor-pointer flex-1 hover:bg-ink-50 ${gender==='weiblich'?'border-brand-400':''}">
            <input type="radio" name="${fid}_gender" value="weiblich" ${gender==='weiblich'?'checked':''} class="w-3.5 h-3.5 text-brand-500">
            <span class="text-sm">weiblich</span>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Vorname</label>
          <input id="${fid}_first_name" value="${escapeHtml(firstName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Nachname <span class="text-red-500">*</span></label>
          <input id="${fid}_last_name" value="${escapeHtml(lastName)}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">Funktion / Position</label>
        <input id="${fid}_role" value="${escapeHtml(f.role || '')}" placeholder="z.B. Geschäftsführung, Einkauf, Buchhaltung" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 mb-1">E-Mail</label>
        <input id="${fid}_email" type="email" value="${escapeHtml(f.email || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Telefon</label>
          <input id="${fid}_phone" value="${escapeHtml(f.phone || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink-700 mb-1">Mobil</label>
          <input id="${fid}_mobile" value="${escapeHtml(f.mobile || '')}" class="w-full px-3 py-1.5 text-sm bg-white border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <label class="flex items-center gap-2 pt-1">
        <input type="checkbox" id="${fid}_is_primary" ${f.is_primary ? 'checked' : ''} class="w-4 h-4 rounded border-ink-300 text-brand-500 focus:ring-brand-500/30">
        <span class="text-sm">Hauptansprechpartner ${othersExist ? '<span class="text-xs text-ink-500">(ersetzt den bisherigen)</span>' : ''}</span>
      </label>

      <div class="flex justify-end gap-2 pt-1">
        <button type="button" onclick="cancelContactInline('${entity}','${entityId}','${contactId || ''}')" class="px-3 py-1.5 text-sm rounded-lg border border-ink-200 bg-white hover:bg-ink-50">Abbrechen</button>
        <button type="button" onclick="saveContactInline('${entity}','${entityId}','${contactId || ''}')" class="px-3 py-1.5 text-sm rounded-lg bg-brand-500 text-white hover:bg-brand-600">Speichern</button>

}

function cancelContactInline(entity, entityId, contactId) {
  document.getElementById('contactInlineFormWrap').innerHTML = '';
  document.getElementById('addContactBtn')?.classList.remove('hidden');
  if (contactId) {
    const row = document.querySelector(`[data-contact-row="${contactId}"]`);
    if (row) row.classList.remove('hidden');
  }
}

async function saveContactInline(entity, entityId, contactId) {
  const linkField = entity + '_id';
  const fid = 'cif_' + (contactId || 'new');
  const $v = id => (document.getElementById(fid + '_' + id)?.value || '').trim();
  const firstName = $v('first_name');
  const lastName  = $v('last_name');
  if (!lastName) return toast('Nachname fehlt', 'error');
  const genderInput = document.querySelector(`input[name="${fid}_gender"]:checked`);
  const fields = {
    first_name: firstName,
    last_name:  lastName,
    name:       [firstName, lastName].filter(Boolean).join(' '),
    role:       $v('role'),
    email:      $v('email'),
    phone:      $v('phone'),
    mobile:     $v('mobile'),
    is_primary: document.getElementById(fid + '_is_primary')?.checked || false
  };
  if (genderInput) fields.gender = genderInput.value;
  if (!contactId) fields[linkField] = [entityId];

  try {
    if (fields.is_primary) {
      const all = await readData('Contact');
      const others = all.filter(c =>
        (c.fields[linkField] || []).includes(entityId) &&
        c.fields.is_primary &&
        c.id !== contactId
      );
      for (const o of others) await updateData('Contact', o.id, { is_primary: false });
    }
    if (contactId) await updateData('Contact', contactId, fields);
    else           await writeData('Contact', fields);
    document.getElementById('contactInlineFormWrap').innerHTML = '';
    document.getElementById('addContactBtn')?.classList.remove('hidden');
    await refreshEntityContactsSection(entity, entityId);
    toast('Gespeichert', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteContactInline(entity, entityId, contactId) {
  if (!confirm('Diesen Ansprechpartner wirklich löschen?')) return;
  try {
    await deleteData('Contact', contactId);
    await refreshEntityContactsSection(entity, entityId);
    toast('Gelöscht', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

/* ============================================================
   STAMMDATEN: ALLE KONTAKTE (mandantenweite Übersicht)
   ============================================================ */
const _contactListState = { search: '', sort: 'last_name' };
let _contactSearchTimer = null;

async function renderContactsList() {
  setPageTitle('Kontakte');
  const cur = getCurrentCompany();
  if (!cur) {
    document.getElementById('pageContent').innerHTML = `
      <div class="max-w-3xl mx-auto"><div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-amber-900">Kein Mandant ausgewählt. Bitte links eine Firma wählen.</div></div>`;
    return;
  }
  document.getElementById('pageContent').innerHTML = '<p class="text-ink-500 text-sm">Lade Kontakte…</p>';

  let customers = [], suppliers = [], contacts = [];
  try {
    [customers, suppliers, contacts] = await Promise.all([readData('Customer'), readData('Supplier'), readData('Contact')]);
  } catch (e) { toast(e.message, 'error'); }

  const custInCompany = customers.filter(c => (c.fields.company_id || []).includes(cur.id));
  const supInCompany  = suppliers.filter(s => (s.fields.company_id || []).includes(cur.id));
  const custMap = {}; custInCompany.forEach(c => { custMap[c.id] = c.fields; });
  const supMap  = {}; supInCompany.forEach (s => { supMap[s.id]  = s.fields; });
  const custIds = new Set(custInCompany.map(c => c.id));
  const supIds  = new Set(supInCompany.map(s => s.id));

  let list = contacts.filter(c => {
    const cid = (c.fields.customer_id || [])[0];
    const sid = (c.fields.supplier_id || [])[0];
    return (cid && custIds.has(cid)) || (sid && supIds.has(sid));
  });

  const ownerOf = c => {
    const cid = (c.fields.customer_id || [])[0];
    const sid = (c.fields.supplier_id || [])[0];
    if (cid && custMap[cid]) return { type: 'customer', id: cid, rec: custMap[cid] };
    if (sid && supMap[sid])  return { type: 'supplier', id: sid, rec: supMap[sid] };
    return null;
  };

  const q = _contactListState.search.trim().toLowerCase();
  if (q) {
    list = list.filter(c => {
      const f = c.fields;
      const o = ownerOf(c);
      const ownerFields = o?.rec || {};
      return [f.first_name, f.last_name, f.name, f.email, f.phone, f.mobile, f.role,
              ownerFields.name1, ownerFields.name2, ownerFields.customer_no, ownerFields.supplier_no]
        .some(v => (v || '').toLowerCase().includes(q));
    });
  }

  const sortKey = _contactListState.sort;
  list.sort((a, b) => {
    if (sortKey === 'customer') {
      const ao = ownerOf(a)?.rec?.name1 || '';
      const bo = ownerOf(b)?.rec?.name1 || '';
      const cmp = ao.toLowerCase().localeCompare(bo.toLowerCase(), 'de');
      if (cmp !== 0) return cmp;
    }
    const av = (a.fields[sortKey === 'first_name' ? 'first_name' : 'last_name'] || a.fields.name || '').toLowerCase();
    const bv = (b.fields[sortKey === 'first_name' ? 'first_name' : 'last_name'] || b.fields.name || '').toLowerCase();
    return av.localeCompare(bv, 'de');
  });

  document.getElementById('pageContent').innerHTML = `
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold text-ink-900">Kontakte</h2>
          <p class="text-xs text-ink-500 mt-0.5">${escapeHtml(cur.name)} · ${list.length} Einträge</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
        <div class="p-3 border-b border-ink-100 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px]">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"></i>
            <input type="search" value="${escapeHtml(_contactListState.search)}" placeholder="Suchen…" oninput="onContactListSearch(this.value)"
                   class="w-full pl-9 pr-3 py-2 text-sm border border-ink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          </div>
          <label class="text-xs text-ink-500">Sortierung:</label>
          <select onchange="_contactListState.sort=this.value;renderContactsList()" class="text-sm border border-ink-200 rounded-lg px-2 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
            <option value="last_name"  ${sortKey==='last_name'?'selected':''}>Nachname</option>
            <option value="first_name" ${sortKey==='first_name'?'selected':''}>Vorname</option>
            <option value="customer"   ${sortKey==='customer'?'selected':''}>Kunde / Lieferant</option>
          </select>
        </div>
        <div class="divide-y divide-ink-100">
          ${list.length === 0
            ? `<div class="p-10 text-center text-ink-500 text-sm">${q ? 'Keine Treffer.' : 'Noch keine Kontakte. Lege sie über einen Kunden oder Lieferanten an.'}</div>`
            : list.map(c => allContactRow(c, ownerOf(c))).join('')}
        </div>
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

function onContactListSearch(value) {
  _contactListState.search = value;
  clearTimeout(_contactSearchTimer);
  _contactSearchTimer = setTimeout(() => _renderWithSearchFocus(renderContactsList), 200);
}

function allContactRow(c, owner) {
  const f = c.fields || {};
  const sal = contactSalutation(f);
  const fullName = (sal ? sal + ' ' : '') + contactDisplayName(f);
  const summary = [f.email, f.phone, f.mobile].filter(Boolean).join(' · ');
  const ownerNo = owner?.rec?.customer_no || owner?.rec?.supplier_no || '';
  const ownerName = owner?.rec?.name1 || '–';
  const ownerLabel = owner ? (ownerNo ? ownerNo + ' · ' : '') + ownerName : '— ohne Zuordnung —';
  const typeBadge = owner?.type === 'customer'
    ? '<span class="text-[10px] uppercase font-bold tracking-wider bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">Kunde</span>'
    : owner?.type === 'supplier'
      ? '<span class="text-[10px] uppercase font-bold tracking-wider bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded">Lieferant</span>'
      : '';
  const onClick = owner?.type === 'customer'
    ? `openCustomerModal('${owner.id}')`
    : owner?.type === 'supplier'
      ? `openSupplierModal('${owner.id}')`
      : '';
  return `
    <div class="flex items-center justify-between p-4 hover:bg-ink-50 transition ${onClick ? 'cursor-pointer' : ''}" ${onClick ? `onclick="${onClick}"` : ''}>
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.is_primary ? '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-500" style="fill:currentColor"></i>' : ''}
          <p class="font-medium text-ink-900 truncate">${escapeHtml(fullName)}</p>
          ${f.role ? `<span class="text-xs text-ink-500">· ${escapeHtml(f.role)}</span>` : ''}
          ${typeBadge}
        </div>
        <p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(ownerLabel)}</p>
        ${summary ? `<p class="text-xs text-ink-500 mt-0.5 truncate">${escapeHtml(summary)}</p>` : ''}
      </div>
      ${onClick ? '<i data-lucide="chevron-right" class="w-4 h-4 text-ink-300 shrink-0"></i>' : ''}
    </div>
  `;
}

async function refreshEntityContactsSection(entity, entityId) {
  const wrap = document.getElementById('entityContactsWrap');
  if (!wrap) return;
  const linkField = entity + '_id';
  try {
    const all = await readData('Contact');
    const contacts = all.filter(c => (c.fields[linkField] || []).includes(entityId));
    wrap.innerHTML = renderEntityContacts(entity, entityId, contacts);
    if (window.lucide) lucide.createIcons();
  } catch (e) { toast(e.message, 'error'); }
}

/* ============================================================
   UI: LOGIN HANDLER
   ============================================================ */
function showLoginScreen() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;
  setTimeout(() => document.getElementById('loginKey')?.focus(), 50);
}

function showApp() {
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('sidebarUserName').textContent = APP_KEYS.user?.name || '–';
  document.getElementById('sidebarUserRole').textContent = APP_KEYS.user?.role || '';
  document.getElementById('topbarVersion').textContent = APP_VERSION;
  if (APP_KEYS.user?.is_admin) document.getElementById('navAdmin')?.classList.remove('hidden');
  initNavSections();
  initNavRouting();
  renderMandantenSwitcher();
  renderWelcome();
  if (window.lucide) lucide.createIcons();
}

function forceAppUpdate() {
  toast('Lade neueste Version…', 'info', 1500);
  // Loader-Cache + alle App-Caches leeren, damit auch der Offline-Fallback keine alte Version zeigt
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('app_cache_') || k.startsWith('cache_')) localStorage.removeItem(k);
    });
  } catch (e) {}
  // Über loader.html: zieht index.html direkt von raw.githubusercontent.com → umgeht GitHub-Pages-CDN komplett
  setTimeout(() => location.replace('loader.html?t=' + Date.now()), 250);
}

// Klick außerhalb schließt das Mandanten-Menü
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('mandantWrap');
  if (!wrap || wrap.contains(e.target)) return;
  document.getElementById('mandantMenu')?.classList.add('hidden');
});

function setLoginLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const spin = document.getElementById('loginSpin');
  btn.disabled = loading;
  spin.classList.toggle('hidden', !loading);
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearLoginError() {
  document.getElementById('loginError').classList.add('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearLoginError();
  const key = document.getElementById('loginKey').value.trim();
  if (!key) return showLoginError('Bitte Key eingeben.');
  setLoginLoading(true);
  try {
    await loginWithUserKey(key);
    toast('Willkommen zurück, ' + (APP_KEYS.user?.name || 'Kollege') + '!', 'success');
    showApp();
  } catch (err) {
    showLoginError(err.message || 'Login fehlgeschlagen');
  } finally {
    setLoginLoading(false);
  }
});

/* ============================================================
   UPDATE-CHECK (raw.githubusercontent.com — bypasst GitHub-Pages-CDN)
   ============================================================ */
async function checkForUpdate() {
  try {
    const url = 'https://raw.githubusercontent.com/' + APP_CONFIG.GITHUB_REPO + '/main/index.html?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return;
    const text = await r.text();
    const m = text.match(/APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
    if (m && m[1] !== APP_VERSION) {
      document.getElementById('updateVersion').textContent = m[1];
      document.getElementById('updateBanner').classList.remove('hidden');
      if (window.lucide) lucide.createIcons();
    }
  } catch (e) { /* still */ }
}

/* ============================================================
   PWA: APP-ICON (FLP Hero-Maskottchen, SVG → Canvas → PNG)
   ============================================================ */
function _heroSvg() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
    <rect width="180" height="180" fill="#FFFFFF"/>
    <path d="M 30 130 L 15 178 L 70 165 L 110 165 L 165 178 L 150 130 Z" fill="#DC2626"/>
    <ellipse cx="90" cy="195" rx="55" ry="35" fill="#1FA8D6"/>
    <rect x="80" y="130" width="20" height="15" fill="#F4C795"/>
    <circle cx="90" cy="100" r="38" fill="#F4C795"/>
    <path d="M 60 95 Q 60 88 70 88 L 110 88 Q 120 88 120 95 L 120 102 Q 120 108 110 108 L 70 108 Q 60 108 60 102 Z" fill="#0F172A"/>
    <ellipse cx="76" cy="98" rx="6" ry="5" fill="#FFFFFF"/>
    <ellipse cx="104" cy="98" rx="6" ry="5" fill="#FFFFFF"/>
    <circle cx="77" cy="99" r="2.5" fill="#0F172A"/>
    <circle cx="105" cy="99" r="2.5" fill="#0F172A"/>
    <path d="M 80 120 Q 90 128 100 120" stroke="#1F2937" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 50 80 Q 50 50 90 50 Q 130 50 130 80 L 130 87 L 50 87 Z" fill="#1FA8D6"/>
    <ellipse cx="115" cy="86" rx="35" ry="6" fill="#157699"/>
  </svg>`;
}

function drawAppIcon(size) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const cv = document.createElement('canvas');
        cv.width = size; cv.height = size;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        // FLP-Schriftzug auf der Cap separat per Canvas zeichnen — funktioniert browser-übergreifend zuverlässiger als <text> in SVG-zu-PNG
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '900 ' + Math.round(size * 0.115) + 'px Impact, "Arial Black", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('FLP', size * 0.5, size * 0.40);
        resolve(cv.toDataURL('image/png'));
      } catch (e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(_heroSvg());
  });
}

async function setupPwaAssets() {
  try {
    const [apple, fav, i192, i512] = await Promise.all([
      drawAppIcon(180), drawAppIcon(64), drawAppIcon(192), drawAppIcon(512)
    ]);
    if (apple) document.getElementById('appleTouchIcon')?.setAttribute('href', apple);
    if (fav) {
      const f = document.getElementById('appFavicon');
      if (f) { f.setAttribute('type', 'image/png'); f.setAttribute('href', fav); }
    }
    if (i192 && i512) {
      const manifest = {
        name: 'ERP Hero',
        short_name: 'ERP Hero',
        description: 'FLP Lift Parts ERP',
        start_url: location.pathname,
        scope: location.pathname,
        display: 'standalone',
        background_color: '#1FA8D6',
        theme_color: '#1FA8D6',
        icons: [
          { src: i192, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: i512, sizes: '512x512', type: 'image/png', purpose: 'any' }
        ]
      };
      const url = 'data:application/json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
      document.getElementById('appManifest')?.setAttribute('href', url);
    }
  } catch (e) { /* still */ }
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  if (window.lucide) lucide.createIcons();
  document.getElementById('loginVersionLabel').textContent = APP_VERSION;
  setupPwaAssets();

  // Auto-Login
  const ok = await tryAutoLogin();
  if (ok) showApp();
  else showLoginScreen();

  // Update-Check: einmal nach UI ready, dann alle 3 Min + bei Tab-Wechsel/Fokus
  setTimeout(checkForUpdate, 1500);
  setInterval(checkForUpdate, 3 * 60 * 1000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForUpdate(); });
  window.addEventListener('focus', checkForUpdate);
}

document.addEventListener('DOMContentLoaded', init);
</script>
